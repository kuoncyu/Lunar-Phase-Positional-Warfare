  <style>
    /* 鎖定全螢幕，徹底防止手機上下拖曳重整與畫面破版 */
    body, html { 
      margin: 0; padding: 0; 
      background-color: #020617;
      overflow: hidden; 
      touch-action: none;
    }

    /* === 響應式完美縮放引擎核心 === */
    .game-wrapper {
      --board-size-portrait: min(calc(100vw - 32px), calc((100dvh - 180px) / var(--portrait-mult)));
      --board-size-landscape: min(calc(100dvh - 100px), calc((100vw - 180px) / var(--landscape-mult)));
    }
    @media (orientation: portrait) { .game-wrapper { --board-size: var(--board-size-portrait); } }
    @media (orientation: landscape) { .game-wrapper { --board-size: var(--board-size-landscape); } }

    .board-container { width: var(--board-size); height: var(--board-size); }
    
    .card-item { 
      width: calc(var(--board-size) * var(--card-scale)); 
      height: calc(var(--board-size) * var(--card-scale) * 1.25); 
      container-type: size; 
    }
    .card-text { font-size: max(10px, 12cqh); }

    /* === 結算特效字體樣式 === */
    .scoring-text { font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif; paint-order: stroke fill; line-height: 1.2; }
    .score-identical { background: linear-gradient(180deg, #a5f3fc 0%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #164e63; filter: drop-shadow(0px 0px 8px rgba(6,182,212,0.9)) drop-shadow(0px 4px 6px rgba(0,0,0,0.8)); }
    .score-num-identical { color: #22d3ee; -webkit-text-stroke: 1px #164e63; }
    .score-complementary { background: linear-gradient(180deg, #fef08a 0%, #eab308 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #713f12; filter: drop-shadow(0px 0px 8px rgba(234,179,8,0.9)) drop-shadow(0px 4px 6px rgba(0,0,0,0.8)); }
    .score-num-complementary { color: #facc15; -webkit-text-stroke: 1px #713f12; }
    .score-sequence { background: linear-gradient(180deg, #f5d0fe 0%, #d946ef 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #4a044e; filter: drop-shadow(0px 0px 8px rgba(217,70,239,0.9)) drop-shadow(0px 4px 6px rgba(0,0,0,0.8)); }
    .score-num-sequence { color: #e879f9; -webkit-text-stroke: 1px #4a044e; }

    @keyframes score-pulse { 0% { transform: scale(1); filter: brightness(1); box-shadow: none; } 20%, 80% { transform: scale(1.15); filter: brightness(1.3); box-shadow: 0 0 40px rgba(254,240,138,1); } 100% { transform: scale(1); filter: brightness(1); box-shadow: none; } }
    .animate-score-pulse { animation: score-pulse 1.5s ease-in-out forwards; }
    @keyframes float-score { 0% { opacity: 0; transform: translateY(30px) scale(0.5); } 15%, 85% { opacity: 1; transform: translateY(0) scale(1.1); } 100% { opacity: 0; transform: translateY(-30px) scale(0.8); } }
    .animate-float-score { animation: float-score 1.5s ease-in-out forwards; }
    
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.5); border-radius: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.8); }
  </style>
</head>

    const findSequences = (boardArray, startIdx, edges) => {
      const getPaths = (currIdx, step, visited) => {
        let paths = []; let expectedPhase = (boardArray[currIdx].phase + step + 8) % 8; let hasNext = false;
        getNeighbors(currIdx, edges).forEach(n => {
          if (boardArray[n] && boardArray[n].phase === expectedPhase && !visited.has(n)) { hasNext = true; let subPaths = getPaths(n, step, new Set([...visited, n])); subPaths.forEach(p => paths.push([currIdx, ...p])); }

        if (!hasNext) paths.push([currIdx]); return paths;
      };
      const pathsUp = getPaths(startIdx, 1, new Set([startIdx])); const pathsDown = getPaths(startIdx, -1, new Set([startIdx])); let sequences = [];

          <h2 className="text-3xl sm:text-4xl font-black mb-8 text-center text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500">📖 遊戲玩法與計分規則</h2>
          <div className="space-y-10 text-slate-200">
            <section className="bg-slate-800/40 p-6 rounded-2xl border border-slate-700">
              <h3 className="text-2xl font-bold mb-4 text-indigo-300 flex items-center gap-2">🎯 基礎佔領 (陣地得分)</h3>
              <p className="mb-4 leading-relaxed text-lg">大家輪流將手牌的「月相卡牌」放置於棋盤空位。遊戲結束結算時，你在棋盤上佔領的<strong className="text-white">每一個格子都會為你帶來 1 分</strong>的陣地得分！</p>
            </section>
            <section className="bg-slate-800/40 p-6 rounded-2xl border border-slate-700">
              <h3 className="text-2xl font-bold mb-4 text-yellow-300 flex items-center gap-2">⚡ 連線加分機制</h3>
              <p className="mb-4 leading-relaxed text-lg">除了基礎佔領，當你放置卡牌時，只要與<strong className="text-white">有實體白線相連</strong>的卡牌滿足以下任一條件，就會觸發強大的得分連鎖，並<strong className="text-rose-400">直接將對方的牌變為你的專屬領地</strong>！(可同時觸發多方向)</p>
              <div className="space-y-6 mt-6">
                <div className="bg-slate-900 p-4 rounded-xl border border-cyan-900/50">
                  <h4 className="text-xl font-bold text-cyan-300 mb-2">🔹 相同月相 (+1 分)</h4>
                  <p className="text-slate-400 mb-4">相連的兩張牌，月相完全相同。</p>
                  <div className="flex items-center justify-center gap-2">
                    <div className="w-16 h-20 bg-slate-800 rounded-xl p-2 border-2 border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.4)]"><MoonSvg phase={4}/></div>
                    <div className="h-1 w-10 bg-cyan-400 shadow-[0_0_10px_cyan]"></div>
                    <div className="w-16 h-20 bg-slate-800 rounded-xl p-2 border-2 border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.4)]"><MoonSvg phase={4}/></div>
                  </div>
                </div>
                <div className="bg-slate-900 p-4 rounded-xl border border-yellow-900/50">
                  <h4 className="text-xl font-bold text-yellow-300 mb-2">🔸 互補滿月 (+2 分)</h4>
                  <p className="text-slate-400 mb-4">相連的兩張牌，形狀剛好可以互補拼成一顆滿月。(在循環中相隔 4 個階段)</p>
                  <div className="flex items-center justify-center gap-2">
                    <div className="w-16 h-20 bg-slate-800 rounded-xl p-2 border-2 border-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.4)]"><MoonSvg phase={1}/></div>
                    <div className="h-1 w-10 bg-yellow-400 shadow-[0_0_10px_yellow]"></div>
                    <div className="w-16 h-20 bg-slate-800 rounded-xl p-2 border-2 border-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.4)]"><MoonSvg phase={5}/></div>
                  </div>
                </div>
                <div className="bg-slate-900 p-4 rounded-xl border border-purple-900/50">
                  <h4 className="text-xl font-bold text-purple-300 mb-2">🟣 月相變化 (+長度 分)</h4>
                  <p className="text-slate-400 mb-4">沿著連線，產生 3 張以上的連續月相 (遞增或遞減循環)。連線越長，獲得的分數越高！</p>
                  <div className="flex items-center justify-center gap-1 sm:gap-2">
                    <div className="w-12 sm:w-16 h-16 sm:h-20 bg-slate-800 rounded-xl p-2 border-2 border-purple-400 shadow-[0_0_15px_rgba(192,38,211,0.4)]"><MoonSvg phase={0}/></div>
                    <div className="h-1 w-6 sm:w-10 bg-purple-400 shadow-[0_0_10px_purple]"></div>
                    <div className="w-12 sm:w-16 h-16 sm:h-20 bg-slate-800 rounded-xl p-2 border-2 border-purple-400 shadow-[0_0_15px_rgba(192,38,211,0.4)]"><MoonSvg phase={1}/></div>
                    <div className="h-1 w-6 sm:w-10 bg-purple-400 shadow-[0_0_10px_purple]"></div>
                    <div className="w-12 sm:w-16 h-16 sm:h-20 bg-slate-800 rounded-xl p-2 border-2 border-purple-400 shadow-[0_0_15px_rgba(192,38,211,0.4)]"><MoonSvg phase={2}/></div>
                  </div>
                </div>
              </div>
            </section>
            <button onClick={onClose} className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold transition-all shadow-lg text-xl">我瞭解了，開始遊戲！</button>
          </div>
        </div>
      </div>
    );

    function App() {
      const [user, setUser] = useState(null);
      const [roomId, setRoomId] = useState('');
      const [joinCode, setJoinCode] = useState('');
      const [myPlayerId, setMyPlayerId] = useState(1);
      const [isPseudoFs, setIsPseudoFs] = useState(false);
      const [nativeFs, setNativeFs] = useState(false);
      
      const [isMuted, setIsMuted] = useState(false);
      const [volume, setVolumeState] = useState(0.8);
      
      // 多人遊戲設定
      const [localPlayerCount, setLocalPlayerCount] = useState(2);
      const [boardTypePref, setBoardTypePref] = useState('random');
      const [aiDifficulty, setAiDifficulty] = useState('medium'); 

      const lastProcessedMoveTs = useRef(0);
      const roomIdRef = useRef('');

      // 新版遊戲狀態支援多達 4 人
      const [gameState, setGameState] = useState({
        mode: 'menu', boardType: 'classic', playerCount: 2, 
        board: Array(9).fill(null),
        decks: { 1: [], 2: [], 3: [], 4: [] }, 
        hands: { 1: [], 2: [], 3: [], 4: [] },
        turn: 1, 
        comboScores: { 1: 0, 2: 0, 3: 0, 4: 0 },
        finalBaseScores: null, 
        isAnimating: false, gameOver: false, tallyState: 'none', 
        selectedCardIdx: null, round: 1, scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null
      });

      const [lobbyData, setLobbyData] = useState(null); // 用於線上大廳等待

      useEffect(() => { roomIdRef.current = roomId; }, [roomId]);

      useEffect(() => {
        const handleFsChange = () => {
          const isNowFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
          setNativeFs(isNowFs); if (!isNowFs) setIsPseudoFs(false);
        };
        document.addEventListener('fullscreenchange', handleFsChange); document.addEventListener('webkitfullscreenchange', handleFsChange);
        return () => { document.removeEventListener('fullscreenchange', handleFsChange); document.removeEventListener('webkitfullscreenchange', handleFsChange); };
      }, []);

      const toggleFullscreen = () => {
        const docElem = document.documentElement; const isNowFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
        if (!isNowFs && !isPseudoFs) { const req = docElem.requestFullscreen || docElem.webkitRequestFullscreen; if (req) req.call(docElem).catch(() => setIsPseudoFs(true)); else setIsPseudoFs(true); } 
        else { const exit = document.exitFullscreen || document.webkitExitFullscreen; if (isNowFs && exit) exit.call(document).catch(() => setIsPseudoFs(false)); setIsPseudoFs(false); }
      };

      const toggleMute = () => { audioManager.init(); audioManager.toggleMute(); setIsMuted(!isMuted); };
      const handleVolumeChange = (e) => { const val = parseFloat(e.target.value); setVolumeState(val); audioManager.init(); audioManager.setVolume(val); if (isMuted && val > 0) { audioManager.isMuted = false; setIsMuted(false); } else if (!isMuted && val === 0) { audioManager.isMuted = true; setIsMuted(true); } };

      useEffect(() => {
        const initAuth = async () => { try { if (auth) { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token); else await signInAnonymously(auth); } } catch (e) { console.error("Auth Error:", e); } };
        initAuth();
        if (auth) { const unsubscribe = onAuthStateChanged(auth, setUser); return () => unsubscribe(); }
      }, []);

      // 監聽並強制鎖定所選地圖的人數
      const handleBoardChange = (e) => {
        const val = e.target.value; setBoardTypePref(val);
        if (val !== 'random') {
          const allowed = BOARDS[val].players;
          if (!allowed.includes(localPlayerCount)) setLocalPlayerCount(allowed[0]);
        }
      };
      const handlePlayerCountChange = (e) => {
        const val = Number(e.target.value); setLocalPlayerCount(val);
        if (boardTypePref !== 'random') {
          const allowed = BOARDS[boardTypePref].players;
          if (!allowed.includes(val)) setBoardTypePref('random');
        }
      };

      // Firebase 同步邏輯
      useEffect(() => {
        if (!roomId || !user || !db) return;
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId);
        const unsubscribe = onSnapshot(roomRef, (snap) => {
          if (!snap.exists()) return;
          const data = snap.data();
          
          if (data.status === 'waiting') {
            setLobbyData(data);
          }

          setGameState(prev => {
            let nextState = { ...prev };
            if (data.status === 'playing' && (nextState.mode !== 'online' || (data.round && data.round !== nextState.round))) {
              lastProcessedMoveTs.current = 0; 
              nextState = { 
                ...nextState, mode: 'online', boardType: data.initialState.boardType || 'classic', ...data.initialState, 
                turn: 1, comboScores: { 1: 0, 2: 0, 3: 0, 4: 0 }, finalBaseScores: null, isAnimating: false, gameOver: false, tallyState: 'none', selectedCardIdx: null, scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null, round: data.round || 1 
              };
            }
            return nextState;
          }, (err) => console.error("Firestore sync error:", err));
          
          if (data.status === 'playing' && data.lastMove && data.lastMove.player !== myPlayerId && data.lastMove.ts > lastProcessedMoveTs.current) {
            lastProcessedMoveTs.current = data.lastMove.ts; playCard(data.lastMove.cardIdx, data.lastMove.boardIdx, true);
          }
        });
        return () => unsubscribe();
      }, [roomId, user, myPlayerId]);

      // 初始化單機遊戲
      const initGame = (mode) => {
        audioManager.init();
        let pCount = mode === 'single' ? 2 : localPlayerCount;
        let actualBoardId = boardTypePref;
        
        // 確保所選地圖與單機模式 (2人) 相容
        if (actualBoardId !== 'random' && !BOARDS[actualBoardId].players.includes(pCount)) {
            actualBoardId = 'random';
        }
        if (actualBoardId === 'random') {
            const validBoards = Object.keys(BOARDS).filter(k => BOARDS[k].players.includes(pCount));
            actualBoardId = validBoards[Math.floor(Math.random() * validBoards.length)];
        }

        const boardConfig = BOARDS[actualBoardId];
        const generateDeck = () => { let deck = []; for(let i=0; i<3; i++) deck.push(0, 1, 2, 3, 4, 5, 6, 7); return deck.sort(() => Math.random() - 0.5); };
        
        let initDecks = {}; let initHands = {};
        for(let i = 1; i <= pCount; i++) {
          const d = generateDeck(); initHands[i] = d.slice(0, 3); initDecks[i] = d.slice(3);
        }

        setGameState(prev => ({
          ...prev, mode, boardType: actualBoardId, playerCount: pCount, board: Array(boardConfig.nodes.length).fill(null),
          decks: initDecks, hands: initHands, turn: 1, comboScores: { 1: 0, 2: 0, 3: 0, 4: 0 }, finalBaseScores: null, 
          isAnimating: false, gameOver: false, tallyState: 'none', selectedCardIdx: null, scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null
        }));
      };

      const drawCard = (deck, hand) => (deck.length === 0 ? { newDeck: deck, finalHand: hand } : { newDeck: deck.slice(1), finalHand: [...hand, deck[0]] });

      const applyResolveTurn = (prevState, captured, newHands, turn) => {
        let newBoard = [...prevState.board];
        captured.forEach(idx => { if (newBoard[idx]) newBoard[idx].player = turn; });
        
        const currentDeck = prevState.decks[turn];
        const { newDeck, finalHand } = drawCard(currentDeck, newHands[turn]);
        
        let nextHands = { ...newHands, [turn]: finalHand };
        let nextDecks = { ...prevState.decks, [turn]: newDeck };
        
        const isBoardFull = !newBoard.includes(null);
        // 當所有參與玩家的手牌都為空，或者棋盤已滿時結束
        let allHandsEmpty = true;
        for(let i=1; i<=prevState.playerCount; i++) { if (nextHands[i] && nextHands[i].length > 0) allHandsEmpty = false; }
        const gameOver = allHandsEmpty || isBoardFull;
        
        let nextTurn = turn;
        if (!gameOver) {
          let attempts = 0;
          do {
            nextTurn = (nextTurn % prevState.playerCount) + 1;
            attempts++;
          } while (nextHands[nextTurn].length === 0 && attempts <= prevState.playerCount);
        }

        let finalBaseScores = prevState.finalBaseScores;
        if (gameOver && !finalBaseScores) {
          finalBaseScores = {};
          for(let i=1; i<=prevState.playerCount; i++) finalBaseScores[i] = prevState.comboScores[i];
        }

        return { board: newBoard, decks: nextDecks, hands: nextHands, isAnimating: false, turn: nextTurn, gameOver, finalBaseScores, tallyState: gameOver ? 'start' : 'none', scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null };
      };

      const playCard = useCallback((cardIdx, boardIdx, isRemote = false) => {
        audioManager.init(); audioManager.playPlaceCard();
        setGameState(prev => {
          if (prev.isAnimating || prev.gameOver || prev.board[boardIdx] !== null) return prev;
          
          const hand = prev.hands[prev.turn];
          if (!hand || hand[cardIdx] === undefined) return prev;
          
          const playedPhase = hand[cardIdx];
          let newHands = { ...prev.hands };
          newHands[prev.turn] = [...hand];
          newHands[prev.turn].splice(cardIdx, 1);

          let newBoard = [...prev.board]; newBoard[boardIdx] = { phase: playedPhase, player: 0 };

          if (!isRemote && prev.mode === 'online' && roomIdRef.current && db) {
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomIdRef.current);
            updateDoc(roomRef, { lastMove: { cardIdx, boardIdx, player: prev.turn, ts: Date.now() } }).catch(console.error);
          }

          const edges = BOARDS[prev.boardType].edges; let events = []; let totalCaptured = new Set();
          getNeighbors(boardIdx, edges).forEach(n => {
            const neighbor = newBoard[n];
            if (neighbor) {
              if (isIdentical(playedPhase, neighbor.phase)) { events.push({ id: `ev-${Date.now()}-${n}`, type: 'identical', cells: [boardIdx, n], points: 1, name: '相同月相' }); totalCaptured.add(boardIdx); totalCaptured.add(n); } 
              else if (isMatch(playedPhase, neighbor.phase)) { events.push({ id: `ev-${Date.now()}-${n}`, type: 'complementary', cells: [boardIdx, n], points: 2, name: '互補滿月' }); totalCaptured.add(boardIdx); totalCaptured.add(n); }
            }
          });
          const sequencesList = findSequences(newBoard, boardIdx, edges);
          sequencesList.forEach((seq, i) => { events.push({ id: `seq-${Date.now()}-${i}`, type: 'sequence', cells: seq, points: seq.length, name: '月相變化' }); seq.forEach(n => totalCaptured.add(n)); });

          return { ...prev, board: newBoard, hands: newHands, selectedCardIdx: null, isAnimating: true, scoringQueue: events.length > 0 ? events.slice(1) : [], currentScoringEvent: events.length > 0 ? events[0] : null, pendingResolveInfo: { captured: Array.from(totalCaptured), newHands, turn: prev.turn } };
        });
      }, []);

      useEffect(() => {
        if (!gameState.isAnimating) return;
        if (gameState.currentScoringEvent) {
          const type = gameState.currentScoringEvent.type;
          if (type === 'identical') audioManager.playIdentical(); else if (type === 'complementary') audioManager.playComplementary(); else if (type === 'sequence') audioManager.playSequence();
          const timer = setTimeout(() => {
            setGameState(prev => { let newScores = { ...prev.comboScores }; newScores[prev.pendingResolveInfo.turn] += prev.currentScoringEvent.points; return { ...prev, comboScores: newScores, currentScoringEvent: null }; });
          }, 1500);
          return () => clearTimeout(timer);
        } else if (gameState.pendingResolveInfo) {
          if (gameState.scoringQueue.length > 0) {
            const gapTimer = setTimeout(() => { setGameState(prev => ({ ...prev, currentScoringEvent: prev.scoringQueue[0], scoringQueue: prev.scoringQueue.slice(1) })); }, 100); return () => clearTimeout(gapTimer);
          } else {
            const finishTimer = setTimeout(() => {
              setGameState(prev => { if (!prev.pendingResolveInfo) return prev; return { ...prev, ...applyResolveTurn(prev, prev.pendingResolveInfo.captured, prev.pendingResolveInfo.newHands, prev.pendingResolveInfo.turn) }; });
            }, 200); return () => clearTimeout(finishTimer);
          }
        }
      }, [gameState.currentScoringEvent, gameState.isAnimating, gameState.scoringQueue.length, gameState.pendingResolveInfo]);

      // 多人結算流程
      useEffect(() => {
        if (gameState.tallyState === 'start') { 
          setTimeout(() => setGameState(p => ({ ...p, tallyState: 'p1' })), 1200); 
        } 
        else if (gameState.tallyState.startsWith('p')) { 
          const pId = parseInt(gameState.tallyState[1]);
          audioManager.playTone(880, 'sine', 0.1, 0.2); 
          setGameState(p => {
            const pTerritory = p.board.filter(c => c && c.player === pId).length;
            return { ...p, comboScores: { ...p.comboScores, [pId]: p.comboScores[pId] + pTerritory } };
          });
          setTimeout(() => {
            setGameState(p => {
              const nextPId = pId + 1;
              if (nextPId <= p.playerCount) {
                return { ...p, tallyState: `p${nextPId}` };
              } else {
                audioManager.playWin();
                return { ...p, tallyState: 'done' };
              }
            });
          }, 1500); 
        }
      }, [gameState.tallyState]);

      // 單人 AI
      useEffect(() => {
        if (gameState.mode === 'single' && gameState.turn === 2 && !gameState.isAnimating && !gameState.gameOver) {
          const timer = setTimeout(() => {
            const edges = BOARDS[gameState.boardType].edges;
            const emptyCells = gameState.board.map((c, i) => c === null ? i : -1).filter(i => i !== -1);
            
            if (gameState.hands[2] && gameState.hands[2].length > 0 && emptyCells.length > 0) {
              let allMoves = [];
              gameState.hands[2].forEach((phase, cardIdx) => {
                emptyCells.forEach(boardIdx => {
                  let simBoard = [...gameState.board]; simBoard[boardIdx] = { phase, player: 0 };
                  let simCapture = new Set(); let comboPts = 0;
                  getNeighbors(boardIdx, edges).forEach(n => {
                    const neighbor = simBoard[n];
                    if (neighbor) {
                      if (isIdentical(phase, neighbor.phase)) { simCapture.add(boardIdx); simCapture.add(n); comboPts += 1; }
                      else if (isMatch(phase, neighbor.phase)) { simCapture.add(boardIdx); simCapture.add(n); comboPts += 2; }
                    }
                  });
                  const seqCellsList = findSequences(simBoard, boardIdx, edges);
                  if (seqCellsList.length > 0) { seqCellsList.forEach(seqCells => { seqCells.forEach(n => simCapture.add(n)); comboPts += seqCells.length; }); }
                  let pts = comboPts; simCapture.forEach(idx => { if (gameState.board[idx] && gameState.board[idx].player === 1) pts += 1.5; });
                  allMoves.push({ cardIdx, boardIdx, score: pts });
                });
              });

              if (allMoves.length > 0) {
                let selectedMove = null;
                if (aiDifficulty === 'low') { selectedMove = allMoves[Math.floor(Math.random() * allMoves.length)]; } 
                else if (aiDifficulty === 'medium') {
                  if (Math.random() < 0.5) { allMoves.sort((a, b) => b.score - a.score); const bestScore = allMoves[0].score; const bestMoves = allMoves.filter(m => m.score === bestScore); selectedMove = bestMoves[Math.floor(Math.random() * bestMoves.length)]; } 
                  else { selectedMove = allMoves[Math.floor(Math.random() * allMoves.length)]; }
                } 
                else { allMoves.sort((a, b) => b.score - a.score); const bestScore = allMoves[0].score; const bestMoves = allMoves.filter(m => m.score === bestScore); selectedMove = bestMoves[Math.floor(Math.random() * bestMoves.length)]; }
                if (selectedMove) playCard(selectedMove.cardIdx, selectedMove.boardIdx);
              }
            }
          }, 1000); return () => clearTimeout(timer);
        }
      }, [gameState.turn, gameState.mode, gameState.isAnimating, gameState.gameOver, gameState.board, gameState.hands, gameState.boardType, playCard, aiDifficulty]); 

      // --- 線上大廳邏輯 ---
      const createRoom = async () => {
        if (!user || !db) return alert("無法連接 Firebase，請檢查設定。");
        const newRoomId = Math.floor(100000 + Math.random() * 900000).toString();
        let actualBoardId = boardTypePref;
        let pCount = localPlayerCount;
        
        // 依照所選棋盤嚴格定義房間人數
        if (actualBoardId !== 'random') {
           pCount = BOARDS[actualBoardId].players[0]; // 如果是3人專屬，房間強制為3人
        } else {
           const validBoards = Object.keys(BOARDS).filter(k => BOARDS[k].players.includes(pCount));
           actualBoardId = validBoards[Math.floor(Math.random() * validBoards.length)];
        }

        try {
          await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', newRoomId), { 
            status: 'waiting', createdAt: Date.now(), host: user.uid, 
            requiredPlayers: pCount, // 儲存該地圖所需人數
            initialState: { boardType: actualBoardId }, // 暫存房主設定
            players: [{ uid: user.uid, id: 1, ready: true, name: '玩家 1 (房主)' }] 
          });
          setRoomId(newRoomId); setMyPlayerId(1); setGameState(prev => ({ ...prev, mode: 'waiting' }));
        } catch (e) { console.error("Create room failed:", e); }
      };

      const joinRoom = async (code) => {
        if (!user || !code || !db) return;
        try {
          const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', code); const snap = await getDoc(roomRef);
          if (snap.exists() && snap.data().status === 'waiting') { 
            const data = snap.data();
            const existing = data.players.find(p => p.uid === user.uid);
            let myId = 2;
            if (existing) { 
              myId = existing.id; 
            } else if (data.players.length < data.requiredPlayers) {
              myId = data.players.length + 1;
              const newPlayers = [...data.players, { uid: user.uid, id: myId, ready: false, name: `玩家 ${myId}` }];
              await updateDoc(roomRef, { players: newPlayers });
            } else { return alert("房間已滿！"); }
            
            setRoomId(code); setMyPlayerId(myId); setGameState(prev => ({ ...prev, mode: 'waiting' })); 
          } else { alert("找不到房間，或遊戲已開始"); }
        } catch (e) { console.error("Join room failed:", e); }
      };

      const toggleReady = async () => {
        if (!roomId || !user || !db || !lobbyData) return;
        try {
          const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId);

          let initDecks = {}; let initHands = {}; for(let i=1; i<=pCount; i++) { const d = generateDeck(); initHands[i] = d.slice(0,3); initDecks[i] = d.slice(3); }
          const initData = { boardType: actualBoardId, playerCount: pCount, board: Array(boardConfig.nodes.length).fill(null), decks: initDecks, hands: initHands };

            <div className="absolute inset-0 z-[200] flex items-center justify-center bg-slate-950/80 backdrop-blur-md overflow-y-auto px-4 py-8">
              <div className="bg-slate-900 border border-indigo-500/50 p-6 sm:p-10 rounded-3xl shadow-[0_0_50px_rgba(99,102,241,0.2)] flex flex-col items-center text-center w-full max-w-2xl mx-auto my-auto relative mt-8">
                <Trophy className="w-16 h-16 text-yellow-400 mb-4 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]" />
                <h2 className="text-3xl sm:text-4xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500">遊戲結算</h2>
                
                {/* 支援 2~4 人的動態計分板格線 */}
                <div className={`grid w-full gap-4 mb-8 ${gameState.playerCount > 2 ? 'grid-cols-2' : 'grid-cols-1 sm:grid-cols-2'}`}>
                  {Array.from({length: gameState.playerCount}, (_, i) => i + 1).map(pId => {
                    const colors = getPlayerColors(pId);
                    return (
                      <div key={pId} className={`flex flex-col items-center flex-1 p-4 rounded-2xl border ${colors.container}`}>
                        <span className={`${colors.text} font-bold mb-3 flex items-center gap-1`}><User className="w-4 h-4"/> {getPlayerLabel(pId).split(' ')[0]}</span>
                        <div className="w-full flex justify-between text-sm text-slate-300 mb-1 px-1">
                          <span>連線得分</span><span className={`font-mono font-bold ${colors.score}`}>+{gameState.finalBaseScores?.[pId] || 0}</span>
                        </div>
                        <div className="w-full flex justify-between text-sm text-slate-300 mb-3 px-1 border-b border-slate-600/50 pb-2">
                          <span>領地佔領</span><span className={`font-mono font-bold ${colors.score}`}>+{gameState.comboScores[pId] - (gameState.finalBaseScores?.[pId] || 0)}</span>
                        </div>
                        <div className="flex items-baseline gap-1 mt-1">
                          <span className="text-xs text-slate-400">總分</span>
                          <span className={`text-4xl sm:text-5xl font-black ${colors.score}`}>{gameState.comboScores[pId]}</span>
                        </div>
                      </div>
                    )
                  })}
                </div>

                <div className="text-xl sm:text-2xl font-bold mb-8 text-white flex flex-col items-center justify-center gap-2">
                  {(() => {
                    const maxScore = Math.max(...Array.from({length: gameState.playerCount}, (_, i) => gameState.comboScores[i + 1]));
                    const winners = Array.from({length: gameState.playerCount}, (_, i) => i + 1).filter(p => gameState.comboScores[p] === maxScore);
                    if (winners.length === 1) {
                      const colors = getPlayerColors(winners[0]);
                      return <span>🏆 恭喜 <span className={colors.nameColor}>{getPlayerLabel(winners[0]).split(' ')[0]} ({colors.name})</span> 獲得勝利！</span>;
                    } else {
                      return <span>🤝 激戰！ {winners.map(w => getPlayerLabel(w).split(' ')[0]).join('、')} 達成平手！</span>;
                    }
                  })()}
                </div>
                
                <div className="flex w-full space-x-4">
                  <button onClick={handlePlayAgain} className="flex-1 py-3 sm:py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold flex items-center justify-center space-x-2 text-lg"><RotateCcw className="w-5 h-5" /> <span>再打一場</span></button>
                  <button onClick={() => setGameState(prev => ({ ...prev, mode: 'menu' }))} className="flex-1 py-3 sm:py-4 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold flex items-center justify-center space-x-2 text-lg"><Home className="w-5 h-5" /> <span>回主畫面</span></button>
                </div>
              </div>
            </div>
          )}

          {/* 頂部系統列 */}
          <div className="z-10 w-full flex justify-between items-center px-4 py-2 shrink-0 max-w-[1400px] mx-auto">
            <div className="flex space-x-2 items-center">
              <button onClick={() => setGameState(prev => ({ ...prev, mode: 'menu' }))} className="p-2 text-indigo-300 hover:text-white bg-slate-900/50 rounded-full border border-white/10 flex-shrink-0"><Home className="w-5 h-5" /></button>
              <VolumeControl />
            </div>
            <div className="flex flex-col items-end">
              {gameState.mode === 'online' && ( <span className={`text-xs sm:text-sm font-bold px-3 py-1 rounded-full border mb-1 ${gameState.turn === myPlayerId ? 'bg-emerald-900 border-emerald-500/30 text-emerald-300 animate-pulse' : 'bg-slate-800 border-slate-600 text-slate-400'}`}>{gameState.turn === myPlayerId ? '輪到你了！' : '等待對手...'} ({roomId})</span> )}
              <span className="text-xs text-indigo-200/50 uppercase tracking-widest">{currentBoardConfig.name}</span>
            </div>
          </div>

          {/* 遊戲主核心區塊 */}
          <div className="z-10 w-full max-w-[1400px] mx-auto flex portrait:flex-col landscape:flex-row justify-center items-center flex-1 min-h-0 pb-2 px-2 gap-4 sm:gap-6 shrink-0">
            
            {/* Top / Left Players (Opponents) */}
            <div className="flex portrait:flex-row landscape:flex-col items-center justify-center gap-2 w-full portrait:h-[14vh] portrait:min-h-[70px] landscape:h-full landscape:w-[20vw] landscape:min-w-[110px] shrink-0 portrait:order-1 landscape:order-1 overflow-auto custom-scroll px-1">
              {topPlayers.map(pId => {
                const isSmall = topPlayers.length > 1;
                return (
                  <div key={pId} className={`flex portrait:flex-col landscape:flex-col items-center justify-center p-2 sm:p-3 rounded-xl sm:rounded-2xl transition-colors shrink-0 w-full ${getPlayerColors(pId).container}`}>
                    <div className={`flex portrait:flex-row landscape:flex-col justify-between w-full portrait:px-2 landscape:py-1 mb-1 portrait:order-1 landscape:order-1 items-center ${isSmall ? 'gap-1' : 'gap-2'}`}>
                      <span className={`font-bold ${isSmall ? 'text-xs' : 'text-sm sm:text-base'} ${getPlayerColors(pId).text}`}>{getPlayerLabel(pId)}</span>
                      <span className={`font-black ${isSmall ? 'text-sm' : 'text-xl sm:text-2xl'} ${getPlayerColors(pId).score}`}>{gameState.comboScores[pId]}分</span>
                    </div>
                    <div className="flex portrait:flex-row landscape:flex-col justify-center gap-1 sm:gap-2 w-full portrait:order-2 landscape:order-2">
                      {gameState.hands[pId] && gameState.hands[pId].map((phase, i) => renderCard(phase, i, pId, false, -1, isSmall))}
                    </div>
                  </div>
                )
              })}
            </div>
            
            {/* 中間棋盤區 */}
            <div className="relative bg-slate-900/60 rounded-[1.5rem] sm:rounded-[2rem] backdrop-blur-lg border border-slate-700/50 shadow-2xl shrink-0 board-container flex items-center justify-center portrait:order-2 landscape:order-2">
              
              {gameState.currentScoringEvent && (
                <div key={gameState.currentScoringEvent.id} className="absolute inset-0 flex items-center justify-center pointer-events-none z-[100]">
                  <div className="animate-float-score flex flex-col items-center">
                    <span className={`text-[length:clamp(2rem,6vmin,4rem)] font-black tracking-widest scoring-text pb-2 ${currentScoreTextClass}`}>
                      {gameState.currentScoringEvent.name}
                    </span>
                    <span className={`text-[length:clamp(2.5rem,7vmin,5rem)] font-black scoring-text mt-1 drop-shadow-md ${currentScoreNumClass}`}>
                      +{gameState.currentScoringEvent.points}
                    </span>
                  </div>
                </div>
              )}
              
              <svg viewBox="0 0 100 100" className="absolute inset-0 w-full h-full pointer-events-none z-0 overflow-visible">
                {currentBoardConfig.edges.map((edge, i) => {
                  const n1 = currentBoardConfig.nodes[edge[0]]; const n2 = currentBoardConfig.nodes[edge[1]];
                  
                  let isScoringEdge = false;
                  if (gameState.currentScoringEvent) {
                    const ev = gameState.currentScoringEvent;
                    if (ev.type === 'sequence') {
                      const idx1 = ev.cells.indexOf(edge[0]); const idx2 = ev.cells.indexOf(edge[1]);
                      if (idx1 !== -1 && idx2 !== -1 && Math.abs(idx1 - idx2) === 1) isScoringEdge = true;
                    } else { isScoringEdge = ev.cells.includes(edge[0]) && ev.cells.includes(edge[1]); }
                  }

                  let strokeColor = "rgba(71, 85, 105, 0.3)"; let strokeW = "1.2";
                  if (isScoringEdge) { strokeColor = getPlayerColors(gameState.turn).edge; strokeW = "2.5"; }
                  return <line key={`edge-${i}`} x1={n1.x} y1={n1.y} x2={n2.x} y2={n2.y} stroke={strokeColor} strokeWidth={strokeW} strokeLinecap="round" className="transition-all duration-500" style={isScoringEdge ? { filter: `drop-shadow(0px 0px 4px ${strokeColor})` } : {}} />;
                })}
              </svg>
              
              {gameState.board.map((cell, idx) => {
                const node = currentBoardConfig.nodes[idx];
                return (
                  <div key={`node-${idx}`} className={`absolute z-10 flex items-center justify-center transition-colors card-item ${cell === null ? 'border-2 border-dashed border-slate-500/50 bg-slate-800/30 hover:bg-slate-700/60 cursor-pointer backdrop-blur-sm shadow-inner rounded-lg sm:rounded-xl md:rounded-2xl' : ''}`} style={{ left: `${node.x}%`, top: `${node.y}%`, transform: 'translate(-50%, -50%)' }} onClick={(e) => { e.stopPropagation(); if (cell === null && gameState.selectedCardIdx !== null && (!gameState.isAnimating)) { const canPlay = gameState.mode === 'single' ? gameState.turn === 1 : (gameState.mode === 'multi' ? true : (gameState.mode === 'online' ? gameState.turn === myPlayerId : false)); if (canPlay) playCard(gameState.selectedCardIdx, idx, false); } }}>
                    {cell && renderCard(cell.phase, -1, cell.player, true, idx)}
                  </div>
                );
              })}
            </div>

            {/* Bottom / Right Player (Me / Current Turn) */}
            <div className={`flex portrait:flex-col landscape:flex-col items-center justify-center p-3 sm:p-4 rounded-2xl sm:rounded-3xl transition-colors shrink-0 portrait:w-full portrait:h-[14vh] portrait:min-h-[70px] landscape:h-full landscape:w-[20vw] landscape:min-w-[110px] portrait:order-3 landscape:order-3 ${getPlayerColors(bottomPlayer).container}`}>
              <div className="flex portrait:flex-row landscape:flex-col justify-center gap-2 sm:gap-4 w-full portrait:order-1 landscape:order-2">
                {gameState.hands[bottomPlayer] && gameState.hands[bottomPlayer].map((phase, i) => renderCard(phase, i, bottomPlayer))}
              </div>
              <div className="flex portrait:flex-row landscape:flex-col justify-between w-full portrait:px-2 landscape:py-2 mt-2 landscape:mt-0 items-center portrait:order-2 landscape:order-1 gap-2">
                <span className={`text-sm sm:text-base font-bold ${getPlayerColors(bottomPlayer).text}`}>{getPlayerLabel(bottomPlayer)}</span>
                <span className={`text-xl sm:text-2xl font-black ${getPlayerColors(bottomPlayer).score}`}>{gameState.comboScores[bottomPlayer]}分</span>
              </div>
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
