  <title>月相陣地戰 - 極限闖關與派對版</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <style>
    body, html { margin: 0; padding: 0; background-color: #020617; overflow: hidden; touch-action: none; font-family: 'Noto Sans TC', sans-serif; }
    
    /* === 響應式棋盤引擎 === */
    .game-wrapper { position: fixed; inset: 0; display: flex; flex-direction: column; }

    /*
      landscape: 卡片高度由可用高度反推，確保3張牌+分數列不超出螢幕
      portrait:  卡片寬度由可用寬度反推，確保橫列面板不超出螢幕
    */

    /* === LANDSCAPE === */
    /*
      --stacked-panels : 左側（最高側）面板垂直堆疊數量
        2人 → 1  (各側只有1個面板)
        3人 → 2  (左側2個面板上下疊)
        4人 → 2  (左右各2個面板上下疊)
      card-h = (avail-h - 頂部padding - stacked個面板的分數列高 - gap) / (stacked × 3張)
    */
    @media (orientation: landscape) {
      .game-wrapper {
        --avail-h: calc(100dvh - 56px - 8px);
        --panel-overhead: calc(44px * var(--stacked-panels) + 8px * (var(--stacked-panels) - 1));
        --card-h:  calc((var(--avail-h) - var(--panel-overhead)) / (3 * var(--stacked-panels)));
        --card-w:  calc(var(--card-h) / 1.25);
        --panel-side-w: calc(var(--card-w) + 20px);
        --board-size: min(
          calc(100dvh - 56px - 8px),
          calc(100vw - 16px - var(--panel-side-w) * var(--landscape-mult) - 16px)
        );
      }
      .game-wrapper.challenge-mode {
        --avail-h: calc(100dvh - 56px - 8px);
        --panel-overhead: calc(44px * var(--stacked-panels) + 8px * (var(--stacked-panels) - 1));
        --card-h:  calc((var(--avail-h) - var(--panel-overhead)) / (3 * var(--stacked-panels)));
        --card-w:  calc(var(--card-h) / 1.25);
        --panel-side-w: calc(var(--card-w) + 20px);
        --board-size: min(
          calc(100dvh - 56px - 8px),
          calc(100vw - 24px - var(--panel-side-w) * var(--landscape-mult) - 24px)
        );
      }
    }

    /* === PORTRAIT === */
    @media (orientation: portrait) {
      .game-wrapper {
        --avail-w: calc(100vw - 8px);
        --card-w:  calc((var(--avail-w) - 12px) / 3.2);
        --card-h:  calc(var(--card-w) * 1.25);
        --panel-side-w: calc(var(--card-w) + 16px);
        --board-size: min(
          var(--avail-w),
          calc(100dvh - 56px - (var(--card-h) + 40px) * var(--portrait-mult) - 12px)
        );
      }
      .game-wrapper.challenge-mode {
        --avail-w: calc(100vw - 16px);
        --card-w:  calc((var(--avail-w) - 12px) / 3.2);
        --card-h:  calc(var(--card-w) * 1.25);
        --panel-side-w: calc(var(--card-w) + 16px);
        --board-size: min(
          var(--avail-w),
          calc(100dvh - 56px - (var(--card-h) + 40px) * var(--portrait-mult) - 24px)
        );
      }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .game-wrapper {
        --avail-h: calc(100dvh - 40px - 8px);
        --panel-overhead: calc(36px * var(--stacked-panels) + 6px * (var(--stacked-panels) - 1));
        --card-h:  calc((var(--avail-h) - var(--panel-overhead)) / (3 * var(--stacked-panels)));
        --card-w:  calc(var(--card-h) / 1.25);
        --panel-side-w: calc(var(--card-w) + 16px);
        --board-size: min(
          var(--avail-h),
          calc(100vw - 16px - var(--panel-side-w) * var(--landscape-mult) - 16px)
        );
      }
    }

    .board-container { width: var(--board-size); height: var(--board-size); flex-shrink: 0; }
    .card-item { width: var(--card-w); height: var(--card-h); }
    .card-text { font-size: max(9px, calc(var(--card-w) * 0.19)); }

    /* === 非遊戲頁面的容器最大寬度 === */
    /* 大螢幕上讓容器充分展開，不再限縮在中央 */
    .max-w-lg  { max-width: min(32rem, 92vw); }
    .max-w-xl  { max-width: min(36rem, 92vw); }
    .max-w-2xl { max-width: min(42rem, 92vw); }
    .max-w-3xl { max-width: min(56rem, 92vw); }
    .max-w-4xl { max-width: min(72rem, 92vw); }

    /* 大廳/選單頁面專用：依螢幕寬度自動放大 */
    @media (min-width: 1024px) {
      .max-w-lg  { max-width: min(46rem, 88vw); }
      .max-w-xl  { max-width: min(52rem, 88vw); }
      .max-w-2xl { max-width: min(64rem, 88vw); }
      .max-w-3xl { max-width: min(76rem, 88vw); }
      .max-w-4xl { max-width: min(90rem, 92vw); }
    }
    @media (min-width: 1400px) {
      .max-w-lg  { max-width: min(52rem, 85vw); }
      .max-w-xl  { max-width: min(60rem, 85vw); }
      .max-w-2xl { max-width: min(72rem, 85vw); }
      .max-w-3xl { max-width: min(88rem, 88vw); }
      .max-w-4xl { max-width: min(100rem, 92vw); }
    }

    /* === 非遊戲頁面響應式字體縮放 === */
    /* 在大螢幕（≥1024px）上字體額外放大，確保空間被充分利用 */
    @media (min-width: 1024px) {
      .text-sm   { font-size: 1.05rem !important; }
      .text-base { font-size: 1.15rem !important; }
      .text-lg   { font-size: 1.3rem !important; }
      .text-xl   { font-size: 1.5rem !important; }
      .text-2xl  { font-size: 1.85rem !important; }
      .text-3xl  { font-size: 2.2rem !important; }
      .text-4xl  { font-size: 2.8rem !important; }
      .text-5xl  { font-size: 3.5rem !important; }
    }
    @media (min-width: 1400px) {
      .text-sm   { font-size: 1.1rem !important; }
      .text-base { font-size: 1.2rem !important; }
      .text-lg   { font-size: 1.4rem !important; }
      .text-xl   { font-size: 1.6rem !important; }
      .text-2xl  { font-size: 2rem !important; }
      .text-3xl  { font-size: 2.5rem !important; }
      .text-4xl  { font-size: 3rem !important; }
      .text-5xl  { font-size: 3.8rem !important; }
    }

    /* === 結算特效文字 === */
    .scoring-text { font-family: 'Zen Maru Gothic', sans-serif; paint-order: stroke fill; line-height: 1.2; }
    .score-identical { background: linear-gradient(180deg, #a5f3fc 0%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #164e63; filter: drop-shadow(0px 0px 8px rgba(6,182,212,0.9)); }
    .score-num-identical { color: #22d3ee; -webkit-text-stroke: 1px #164e63; }
    .score-complementary { background: linear-gradient(180deg, #fef08a 0%, #eab308 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #713f12; filter: drop-shadow(0px 0px 8px rgba(234,179,8,0.9)); }
    .score-num-complementary { color: #facc15; -webkit-text-stroke: 1px #713f12; }
    .score-sequence { background: linear-gradient(180deg, #f5d0fe 0%, #d946ef 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #4a044e; filter: drop-shadow(0px 0px 8px rgba(217,70,239,0.9)); }
    .score-num-sequence { color: #e879f9; -webkit-text-stroke: 1px #4a044e; }

    @keyframes score-pulse { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.15); filter: brightness(1.3); box-shadow: 0 0 40px rgba(254,240,138,1); } 100% { transform: scale(1); filter: brightness(1); } }
    .animate-score-pulse { animation: score-pulse 1.5s ease-in-out forwards; }
    @keyframes float-score { 0% { opacity: 0; transform: translateY(30px) scale(0.5); } 15%, 85% { opacity: 1; transform: translateY(0) scale(1.1); } 100% { opacity: 0; transform: translateY(-30px) scale(0.8); } }
    .animate-float-score { animation: float-score 1.5s ease-in-out forwards; }
    @keyframes ai-think { 0%, 100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
    .animate-ai-think { animation: ai-think 1s infinite ease-in-out; }
    
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.5); border-radius: 4px; }
    
    .keyboard-btn { transition: all 0.1s; border-bottom-width: 4px; }
    .keyboard-btn:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
    
    /* === 全螢幕縮放支援 === */
    @media (max-width: 360px) {
      html { font-size: 13px; }
      /* card-scale-factor removed */
    }
    @media (max-width: 300px) {
      html { font-size: 11px; }
    }
    /* small landscape handled above */
    
    /* 玩家名稱放大 */
    .player-name-text {
      font-size: clamp(11px, 2.2vmin, 16px) !important;
      font-weight: 900 !important;
      letter-spacing: 0.02em;
    }
    .player-score-text {
      font-size: clamp(14px, 2.8vmin, 20px) !important;
      font-weight: 900 !important;
    }

    /* === 大廳背景：淡化月相裝飾 === */
    @keyframes moon-bg-float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-16px) rotate(4deg); } }
    .bg-moon-deco { position: absolute; animation: moon-bg-float ease-in-out infinite; will-change: transform; }
  </style>

    // --- Enhanced Audio Manager ---
    class AudioManager {
      constructor() { 
        this.ctx = null; this.masterNode = null; this.bgmGain = null; this.sfxGain = null;
        this.bgmVolume = 0.5; this.sfxVolume = 0.8; this.bgmPlaying = false; this.bgmTimer = null;
        this.bgmAudio = null; this.bgmMode = ''; this.currentSrc = '';
      }
      // 音樂對應：
      // challenge（單人闖關）→ bgm_challenge.mp3
      // battle（派對/線上）  → bgm_battle.mp3
      // lobby（大廳/選單）  → bgm_lobby.mp3
      _srcForMode(mode) {
        if (mode === 'challenge') return 'bgm_challenge.mp3';
        if (mode === 'battle')    return 'bgm_battle.mp3';
        return 'bgm_lobby.mp3';
      }
      startModeBGM(mode) {
        const src = this._srcForMode(mode);
        if (!this.bgmAudio) {
          this.bgmAudio = new Audio();
          this.bgmAudio.loop = true;
        }
        // 只有在換曲目時才重新載入，避免重複重置
        if (this.currentSrc !== src) {
          this.bgmAudio.pause();
          this.bgmAudio.src = src;
          this.bgmAudio.currentTime = 0;
          this.currentSrc = src;
        }
        this.bgmAudio.loop = true;
        this.bgmAudio.volume = this.bgmVolume;
        this.bgmMode = mode;
        this.bgmPlaying = true;
        this.bgmAudio.play().catch(e => console.warn('BGM play failed:', e));
      }
      startLobbyBGM() { this.startModeBGM('lobby'); }
      startGameOverBGM() {
        if (!this.bgmAudio) { this.bgmAudio = new Audio(); }
        const src = 'bgm_gameover.mp3';
        if (this.currentSrc !== src) {
          this.bgmAudio.src = src;
          this.currentSrc = src;
        }
        this.bgmAudio.loop = false;
        this.bgmAudio.volume = this.bgmVolume;
        this.bgmMode = 'gameover';
        this.bgmPlaying = true;
        this.bgmAudio.play().catch(e => console.warn('BGM play failed:', e));
      }
      init() { 
        if (this.ctx) {
          if (this.ctx.state === 'suspended') this.ctx.resume();
        } else {
          const AudioContext = window.AudioContext || window.webkitAudioContext; 
          if (!AudioContext) return;
          this.ctx = new AudioContext(); 
          this.sfxGain = this.ctx.createGain(); this.sfxGain.gain.value = this.sfxVolume; this.sfxGain.connect(this.ctx.destination);
          this.bgmGain = this.ctx.createGain(); this.bgmGain.gain.value = this.bgmVolume; this.bgmGain.connect(this.ctx.destination);
        }
        // 首次 init（使用者互動後）才開始播大廳音樂
        if (!this.bgmPlaying) this.startLobbyBGM();
      }
      setBgmVolume(val) { this.bgmVolume = val; if (this.bgmGain && this.ctx) this.bgmGain.gain.setTargetAtTime(val, this.ctx.currentTime, 0.1); if (this.bgmAudio) this.bgmAudio.volume = val; }
      setSfxVolume(val) { this.sfxVolume = val; if (this.sfxGain && this.ctx) this.sfxGain.gain.setTargetAtTime(val, this.ctx.currentTime, 0.1); }
      
      playTone(freq, type, duration, vol = 1, slideTo = null) { 
        if (!this.ctx || this.sfxVolume === 0) return; 
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); 
        osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime); 
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, this.ctx.currentTime + duration); 
        gain.gain.setValueAtTime(0, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.05); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration); 
        osc.connect(gain); gain.connect(this.sfxGain); osc.start(); osc.stop(this.ctx.currentTime + duration); 
      }
      playPlaceCard() { this.playTone(150, 'sine', 0.15, 0.6, 50); }
      playIdentical() { this.playTone(523.25, 'sine', 0.4, 0.4); setTimeout(() => this.playTone(659.25, 'sine', 0.6, 0.4), 100); }
      playComplementary() { this.playTone(440, 'triangle', 0.3, 0.4); setTimeout(() => this.playTone(659.25, 'triangle', 0.4, 0.4), 150); setTimeout(() => this.playTone(880, 'triangle', 0.8, 0.4), 300); }
      playSequence() { [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => setTimeout(() => this.playTone(freq, 'sine', 0.6, 0.3), i * 150)); }
      playWin() { [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => setTimeout(() => this.playTone(freq, 'square', 0.5, 0.2), i * 200)); setTimeout(() => this.playTone(1046.50, 'square', 1.5, 0.2), 800); }
      playLose() { [349.23, 329.63, 293.66, 261.63].forEach((freq, i) => setTimeout(() => this.playTone(freq, 'sawtooth', 0.5, 0.3), i * 300)); }
      
      stopBGM() {
        this.bgmPlaying = false;
        if(this.bgmAudio) { this.bgmAudio.pause(); this.bgmAudio.currentTime = 0; }
        if(this.bgmTimer) clearTimeout(this.bgmTimer);
      }
    }

      const drawCard = (deck, hand) => (deck.length === 0 ? { newDeck: deck, finalHand: hand } : { newDeck: deck.slice(1), finalHand: [...hand, deck[0]] });

      const applyResolveTurn = (prevState, captured, newHand, turn) => {
        let newBoard = [...prevState.board]; captured.forEach(idx => { if (newBoard[idx]) newBoard[idx].player = turn; });
        let newHands = {...prevState.hands}; let newDecks = {...prevState.decks};
        const { newDeck, finalHand } = drawCard(prevState.decks[turn]||[], newHand);
        newHands[turn] = finalHand; newDecks[turn] = newDeck;
        
        const isBoardFull = !newBoard.includes(null); const allHandsEmpty = Object.values(newHands).every(h => h.length === 0);
        const gameOver = isBoardFull || allHandsEmpty;
        let finalBaseScores = prevState.finalBaseScores; if (gameOver && !finalBaseScores) finalBaseScores = { ...prevState.scores };
        const nextT = gameOver ? turn : getNextTurn(turn, newHands);

        return { board: newBoard, decks: newDecks, hands: newHands, isAnimating: false, turn: nextT, gameOver, finalBaseScores, tallyState: gameOver ? 'start' : 'none', scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null };

          if (prev.isAnimating || prev.gameOver || !prev.board || prev.board[boardIdx] !== null) return prev;
          const hand = prev.hands[prev.turn]; if (!hand || hand[cardIdx] === undefined) return prev;
          
          const playedPhase = hand[cardIdx]; let newHand = [...hand]; newHand.splice(cardIdx, 1);
          let newBoard = [...prev.board]; newBoard[boardIdx] = { phase: playedPhase, player: 0 }; 

          if (!isRemote && prev.mode === 'online' && roomIdRef.current && db) { updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomIdRef.current), { lastMove: { cardIdx, boardIdx, player: prev.turn, ts: Date.now() } }).catch(console.error); }

          const edges = ALL_BOARDS[prev.boardType]?.edges || []; 
          let events = []; let totalCaptured = new Set();
          getNeighbors(boardIdx, edges).forEach(n => {
            const neighbor = newBoard[n];

                      </button>

                      <button onClick={toggleReadyOnline}
                        className={`w-full py-4 sm:py-5 rounded-2xl font-black transition-all shadow-lg text-base sm:text-xl ${onlineRoomData.players[user.uid]?.ready ? 'bg-slate-700 hover:bg-slate-600 text-slate-300 border border-slate-500' : 'bg-indigo-600 hover:bg-indigo-500 text-white border border-indigo-400/30'}`}>

        );

      const currentBoardConfig = ALL_BOARDS[gameState.boardType] || ALL_BOARDS['classic'];
      let currentScoreTextClass = ''; let currentScoreNumClass = '';
      if (gameState.currentScoringEvent) {
        if (gameState.currentScoringEvent.type === 'identical') { currentScoreTextClass = 'score-identical'; currentScoreNumClass = 'score-num-identical'; }
        else if (gameState.currentScoringEvent.type === 'complementary') { currentScoreTextClass = 'score-complementary'; currentScoreNumClass = 'score-num-complementary'; }
        else { currentScoreTextClass = 'score-sequence'; currentScoreNumClass = 'score-num-sequence'; }
      }
      
      const sortedPlayers = Object.keys(gameState.scores).map(pId => parseInt(pId)).sort((a,b) => gameState.scores[b] - gameState.scores[a]);
      const playerRanks = {};
      let currentRank = 1;
      let prevScore = null;
      sortedPlayers.forEach((pId, idx) => {
        if (gameState.scores[pId] !== prevScore) {
          currentRank = idx + 1;
          prevScore = gameState.scores[pId];
        }
        playerRanks[pId] = currentRank;
      });

      return (
        <div className={`game-wrapper ${gameState.mode === "challenge" ? "challenge-mode" : ""} ${wrapperClass} flex flex-col`}>

          {showSettings && <SettingsModal onClose={() => setShowSettings(false)} lang={lang} setLang={setLang} bgmVol={bgmVol} setBgmVol={setBgmVol} sfxVol={sfxVol} setSfxVol={setSfxVol} toggleFs={toggleFullscreen} showTutorial={showTutorialInner} setShowTutorial={setShowTutorialInner} t={t} />}

          {/* 聊天室（遊戲中） */}
          {user && <ChatPanel open={chatOpen} messages={chatMessages} inputVal={chatInput} setInput={setChatInput} onSend={sendChatMessage} onToggle={toggleChat} unread={chatUnread} chatBoxRef={chatBoxRef} t={t} lang={lang} />}

          {/* === 全新頂部工具列 (Top Toolbar) === */}
          <div className="absolute top-0 left-0 w-full h-14 sm:h-20 landscape:h-12 z-[999] flex items-center justify-between px-3 sm:px-6 pointer-events-none">
            {/* 左側：棋盤名稱 */}
            <div className="pointer-events-auto bg-slate-900/80 px-3 sm:px-4 py-1 sm:py-1.5 rounded-full border border-slate-600/50 shadow-lg backdrop-blur-md flex items-center shrink-0">
              <span className="text-[10px] sm:text-sm text-slate-300 uppercase tracking-widest font-bold">{t.boardNames[gameState.boardType] || gameState.boardType}</span>
            </div>

            {/* 中央：遊戲資訊 (挑戰模式 / 線上模式) */}
            <div className="absolute left-1/2 -translate-x-1/2 pointer-events-auto flex items-center justify-center whitespace-nowrap">
              {gameState.mode === 'challenge' && (
                <div className="bg-slate-900/80 px-3 sm:px-6 py-1 sm:py-2 rounded-full border border-yellow-500/50 shadow-[0_0_20px_rgba(234,179,8,0.2)] backdrop-blur-md flex items-center gap-2 sm:gap-4">
                  <span className="text-xs sm:text-lg font-black text-yellow-400 tracking-widest drop-shadow-md">{t.txtLvl} <span className="text-white text-sm sm:text-xl">{gameState.challengeData.currentLevel}</span> {t.txtLayer}</span>

                  <span className="text-xs sm:text-lg font-bold text-slate-300">{t.totalScore}: <span className="text-emerald-400 text-sm sm:text-xl font-mono">{gameState.challengeData.totalScore}</span></span>
                </div>
              )}
              {gameState.mode === 'online' && (
                <div className="bg-slate-900/80 px-3 sm:px-6 py-1 sm:py-2 rounded-full border border-emerald-500/50 shadow-lg backdrop-blur-md">
                  <span className="text-xs sm:text-base font-bold text-emerald-400">{t.txtRoom} <span className="text-white tracking-widest font-mono ml-1">{roomId}</span></span>
                </div>
              )}
            </div>

            {/* 右側：回首頁與設定 */}
            <div className="pointer-events-auto flex items-center gap-1 sm:gap-2 shrink-0">

                <Home className="w-4 h-4 sm:w-5 sm:h-5 group-hover:scale-110" />
              </button>
              <button onClick={() => setShowSettings(true)} className="p-1.5 sm:p-2.5 text-indigo-300 hover:text-white bg-slate-900/80 hover:bg-indigo-900/80 rounded-full border border-slate-600/50 hover:border-indigo-500/50 shadow-lg backdrop-blur-md transition-all group" title={t.settings}>
                <SettingsIcon className="w-4 h-4 sm:w-5 sm:h-5 group-hover:rotate-90 transition-transform" />
              </button>
            </div>
          </div>
          {/* ================================ */}

          {gameState.tallyState !== 'none' && gameState.tallyState !== 'done' && (
            <div className="absolute inset-0 z-[100] flex items-center justify-center pointer-events-none">
               <div className="bg-slate-900/95 text-white px-6 py-4 rounded-full text-lg sm:text-xl font-bold animate-pulse shadow-2xl border border-slate-500 text-center">
                  {gameState.tallyState === 'start' && <span>{t.gameOver}</span>}
                  {gameState.tallyState.startsWith('tally_') && (() => {

                          <p className="mt-2">{t.totalScore}: <span className="text-yellow-400 font-bold text-2xl">{gameState.challengeData.totalScore + gameState.scores[1]}</span></p>
                        </div>
                        <button onClick={nextChallengeLevel} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg transition-all">{gameState.challengeData.currentLevel >= 100 ? t.btnFinish100 : t.btnNextLvl}</button>

                      <React.Fragment>
                        <div className="w-16 h-16 rounded-full bg-rose-900/50 flex items-center justify-center mb-2 border-2 border-rose-500"><XIcon className="w-8 h-8 text-rose-400" /></div>

                      </React.Fragment>

                ) : (
                  <React.Fragment>
                    <Trophy className="w-12 h-12 text-yellow-400 mb-2 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]" />
                    <h2 className="text-2xl sm:text-3xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500">{t.rankTitle}</h2>
                    <div className="w-full flex flex-col gap-2 mb-6">
                      {sortedPlayers.map((pId, idx) => {
                        const cInfo = P_COLORS[pId];
                        return (
                          <div key={pId} className={`flex justify-between items-center p-3 rounded-xl border ${playerRanks[pId] === 1 ? `bg-${cInfo.base}-900/40 border-${cInfo.base}-400 scale-105 shadow-lg` : 'bg-slate-800/50 border-slate-600'}`}>
                            <div className="flex items-center gap-3"><span className="text-2xl">{playerRanks[pId]===1?'👑':playerRanks[pId]}</span><span className={`font-bold ${cInfo.text}`}>{getPlayerLabel(pId)}</span></div>
                            <span className={`text-2xl font-black ${cInfo.bgText}`}>{gameState.scores[pId]}</span>
                          </div>
                        )
                      })}

                    <div className="flex w-full space-x-4">
                      {((gameState.mode==='online' && myPlayerId===1) || gameState.mode!=='online') && <button onClick={handlePlayAgain} className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold flex items-center justify-center space-x-2"><RotateCcw className="w-5 h-5" /> <span>{t.btnPlayAgain}</span></button>}
                      <button onClick={() => { audioManager.startLobbyBGM(); setGameState(prev => ({ ...prev, mode: 'menu' })); }} className="flex-1 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold flex items-center justify-center space-x-2"><Home className="w-5 h-5" /> <span>{t.back}</span></button>
                    </div>
                  </React.Fragment>
                )}
              </div>
            </div>
          )}

          {/* === 玩家面板渲染函式 === */}
          {(() => {
            const total = gameState.totalPlayers;
            // 決定哪些玩家在哪個區域
            // portrait: p1=底, p2=頂, p3=頂右, p4=頂右
            // landscape: p1=右, p2=左, p3=左下, p4=左下
            const renderPlayerPanel = (pId, dir) => {
              const cInfo = P_COLORS[pId];
              const isAiThinking = aiThinkingPlayer === pId;
              if (!gameState.hands[pId]) return null;
              const isActive = gameState.turn === pId && gameState.tallyState === 'none';
              const isRow = (dir === 'top' || dir === 'bottom');
              return (
                <div key={pId} className={`flex ${isRow ? 'flex-col items-center' : 'flex-row items-center'} gap-1 p-1.5 rounded-2xl transition-all duration-300 shrink-0 ${getPlayerContainerStyle(pId)}`}>
                  {(dir === 'bottom' || dir === 'right') && (
                    <div className={`relative flex flex-row justify-between items-center gap-2 bg-slate-950/60 rounded-full border border-${cInfo.base}-500/30 px-3 py-1 shadow-md ${isRow ? 'w-full' : 'flex-col h-full py-3 px-1'}`}>
                      <span className={`player-name-text font-bold truncate max-w-[100px] sm:max-w-[140px] ${cInfo.text}`}>{getPlayerLabel(pId)}</span>
                      {isAiThinking && <span className="text-[9px] font-bold text-yellow-300 animate-ai-think whitespace-nowrap bg-slate-900/80 px-1.5 py-0.5 rounded-full border border-yellow-500/50">{t.txtThinking}</span>}
                      <span className={`player-score-text font-black ${cInfo.bgText}`}>{gameState.scores[pId]}</span>
                    </div>
                  )}
                  <div className={`flex ${isRow ? 'flex-row' : 'flex-col'} justify-center gap-1 sm:gap-1.5`}>
                    {gameState.hands[pId].map((phase, i) => renderCard(phase, i, pId))}
                  </div>
                  {(dir === 'top' || dir === 'left') && (
                    <div className={`relative flex flex-row justify-between items-center gap-2 bg-slate-950/60 rounded-full border border-${cInfo.base}-500/30 px-3 py-1 shadow-md ${isRow ? 'w-full' : 'flex-col h-full py-3 px-1'}`}>
                      <span className={`player-name-text font-bold truncate max-w-[100px] sm:max-w-[140px] ${cInfo.text}`}>{getPlayerLabel(pId)}</span>
                      {isAiThinking && <span className="text-[9px] font-bold text-yellow-300 animate-ai-think whitespace-nowrap bg-slate-900/80 px-1.5 py-0.5 rounded-full border border-yellow-500/50">{t.txtThinking}</span>}
                      <span className={`player-score-text font-black ${cInfo.bgText}`}>{gameState.scores[pId]}</span>
                    </div>
                  )}
                </div>
              );
            };

            // 棋盤元件
            const boardEl = (
              <div className="relative bg-slate-900/40 rounded-[2rem] sm:rounded-[3rem] backdrop-blur-md border border-slate-700/50 shadow-2xl shrink-0 board-container flex items-center justify-center">
                {gameState.currentScoringEvent && (
                  <div key={gameState.currentScoringEvent.id} className="absolute inset-0 flex items-center justify-center pointer-events-none z-[100]">
                    <div className="animate-float-score flex flex-col items-center">
                      <span className={`text-[length:clamp(1.5rem,5vmin,3rem)] font-black tracking-widest scoring-text pb-1 ${currentScoreTextClass}`}>{gameState.currentScoringEvent.name}</span>
                      <span className={`text-[length:clamp(2rem,6vmin,4rem)] font-black scoring-text mt-0 drop-shadow-md ${currentScoreNumClass}`}>+{gameState.currentScoringEvent.points}</span>
                    </div>
                  </div>
                )}
                <svg viewBox="0 0 100 100" className="absolute inset-0 w-full h-full pointer-events-none z-0 overflow-visible">
                  {currentBoardConfig.edges.map((edge, i) => {
                    const n1 = currentBoardConfig.nodes[edge[0]]; const n2 = currentBoardConfig.nodes[edge[1]];
                    let isScoringEdge = false;
                    if (gameState.currentScoringEvent) {
                      const ev = gameState.currentScoringEvent;
                      if (ev.type === 'sequence') { const idx1 = ev.cells.indexOf(edge[0]); const idx2 = ev.cells.indexOf(edge[1]); if (idx1 !== -1 && idx2 !== -1 && Math.abs(idx1 - idx2) === 1) isScoringEdge = true; }
                      else { isScoringEdge = ev.cells.includes(edge[0]) && ev.cells.includes(edge[1]); }
                    }
                    let strokeColor = "rgba(71, 85, 105, 0.3)"; let strokeW = "1.2";
                    if (isScoringEdge) { strokeColor = `rgba(${P_COLORS[gameState.turn].hex}, 0.9)`; strokeW = "2.5"; }
                    return <line key={`edge-${i}`} x1={n1.x} y1={n1.y} x2={n2.x} y2={n2.y} stroke={strokeColor} strokeWidth={strokeW} strokeLinecap="round" className="transition-all duration-500" style={isScoringEdge ? { filter: `drop-shadow(0px 0px 4px ${strokeColor})` } : {}} />;
                  })}
                </svg>
                {gameState.board.map((cell, idx) => {
                  const node = currentBoardConfig.nodes[idx];
                  return (
                    <div key={`node-${idx}`} className={`absolute z-10 flex items-center justify-center transition-colors card-item ${cell === null ? 'border-2 border-dashed border-slate-500/50 bg-slate-800/30 hover:bg-slate-700/60 cursor-pointer backdrop-blur-sm shadow-inner rounded-full sm:rounded-2xl' : ''}`} style={{ left: `${node.x}%`, top: `${node.y}%`, transform: 'translate(-50%, -50%)' }} onClick={(e) => { e.stopPropagation(); if (cell === null && gameState.selectedCardIdx !== null && (!gameState.isAnimating)) { const pType = gameState.playersInfo[gameState.turn].type; const canPlay = (gameState.mode === 'online') ? gameState.turn === myPlayerId : pType !== 'ai'; if (canPlay) playCard(gameState.selectedCardIdx, idx, false); } }}>
                      {cell && renderCard(cell.phase, -1, cell.player, true, idx)}
                    </div>
                  );
                })}
              </div>
            );

            if (total === 2) {
              // portrait: 上(p2) 棋盤 下(p1) — flex-col
              // landscape: 左(p2) 棋盤 右(p1) — flex-row
              return (
                <React.Fragment>
                  {/* portrait */}
                  <div className="portrait:flex landscape:hidden z-10 w-full flex-1 min-h-0 flex flex-col items-center justify-center gap-2 overflow-visible pt-14 sm:pt-20 pb-2 px-2">
                    {renderPlayerPanel(2, 'top')}
                    {boardEl}
                    {renderPlayerPanel(1, 'bottom')}
                  </div>
                  {/* landscape */}
                  <div className="portrait:hidden landscape:flex z-10 w-full flex-1 min-h-0 flex flex-row items-center justify-center gap-2 overflow-visible pt-14 pb-2 px-2">
                    <div className="flex flex-col justify-center shrink-0">{renderPlayerPanel(2, 'left')}</div>
                    {boardEl}
                    <div className="flex flex-col justify-center shrink-0">{renderPlayerPanel(1, 'right')}</div>
                  </div>
                </React.Fragment>
              );
            }
            if (total === 3) {
              return (
                <React.Fragment>
                  {/* portrait: 上列(p2,p3) + 棋盤 + 下(p1) */}
                  <div className="portrait:flex landscape:hidden z-10 w-full flex-1 min-h-0 flex flex-col items-center justify-center gap-1.5 overflow-visible pt-14 sm:pt-20 pb-2 px-2">
                    <div className="flex flex-row gap-2 justify-center w-full">
                      {renderPlayerPanel(2, 'top')}
                      {renderPlayerPanel(3, 'top')}
                    </div>
                    {boardEl}
                    {renderPlayerPanel(1, 'bottom')}
                  </div>
                  {/* landscape: 左(p2上,p3下) + 棋盤 + 右(p1) */}
                  <div className="portrait:hidden landscape:flex z-10 w-full flex-1 min-h-0 flex flex-row items-center justify-center gap-2 overflow-visible pt-14 pb-2 px-2">
                    <div className="flex flex-col gap-2 justify-center shrink-0">
                      {renderPlayerPanel(2, 'left')}
                      {renderPlayerPanel(3, 'left')}
                    </div>
                    {boardEl}
                    <div className="flex flex-col justify-center shrink-0">{renderPlayerPanel(1, 'right')}</div>
                  </div>
                </React.Fragment>
              );
            }
            // total === 4
            return (
              <React.Fragment>
                {/* portrait: 上列(p3,p4) + 棋盤 + 下列(p1,p2) */}
                <div className="portrait:flex landscape:hidden z-10 w-full flex-1 min-h-0 flex flex-col items-center justify-center gap-1.5 overflow-visible pt-14 sm:pt-20 pb-2 px-2">
                  <div className="flex flex-row gap-2 justify-center w-full">
                    {renderPlayerPanel(3, 'top')}
                    {renderPlayerPanel(4, 'top')}
                  </div>
                  {boardEl}
                  <div className="flex flex-row gap-2 justify-center w-full">
                    {renderPlayerPanel(1, 'bottom')}
                    {renderPlayerPanel(2, 'bottom')}
                  </div>
                </div>
                {/* landscape: 左列(p2,p3) + 棋盤 + 右列(p1,p4) */}
                <div className="portrait:hidden landscape:flex z-10 w-full flex-1 min-h-0 flex flex-row items-center justify-center gap-2 overflow-visible pt-14 pb-2 px-2">
                  <div className="flex flex-col gap-2 justify-center shrink-0">
                    {renderPlayerPanel(2, 'left')}
                    {renderPlayerPanel(3, 'left')}
                  </div>
                  {boardEl}
                  <div className="flex flex-col gap-2 justify-center shrink-0">
                    {renderPlayerPanel(1, 'right')}
                    {renderPlayerPanel(4, 'right')}
                  </div>
                </div>
              </React.Fragment>
            );
          })()}
        </div>
      );
    }

    function mountApp() {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }
    mountApp();
  </script>

  <script type="module">
    // Wait for Firebase module to load, then manually transpile and run the app
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, getDocs, addDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    window._firebase = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, getDocs, addDoc };

    function runApp() {
      try {
        const src = document.getElementById('app-src').textContent;
        const compiled = Babel.transform(src, {
          presets: [['react', { runtime: 'classic' }]]
        }).code;
        // eslint-disable-next-line no-eval
        (0, eval)(compiled);
      } catch(e) {
        document.getElementById('root').innerHTML = '<div style="color:red;padding:20px;font-family:monospace">錯誤：' + e.message + '</div>';
        console.error(e);
      }
    }

    if (typeof Babel !== 'undefined') {
      runApp();
    } else {
      // Wait for Babel to load
      const babelScript = document.querySelector('script[src*="babel"]');
      babelScript.addEventListener('load', runApp);
    }
  </script>
  <script>
    // 動態縮放：確保遊戲在極小螢幕上也能完整顯示
    (function() {
      function applyScale() {
        const minW = 320; // minimum design width
        const w = window.innerWidth;
        if (w < minW) {
          const scale = w / minW;
          document.documentElement.style.fontSize = (13 * scale) + 'px';
        } else {
          document.documentElement.style.fontSize = '';
        }
      }
      applyScale();
      window.addEventListener('resize', applyScale);
      window.addEventListener('orientationchange', function() { setTimeout(applyScale, 200); });
    })();
  </script>

</body>
</html>
