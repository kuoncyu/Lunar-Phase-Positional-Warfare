  <style>
    body, html { margin: 0; padding: 0; background-color: #020617; overflow: hidden; touch-action: none; font-family: 'Noto Sans TC', sans-serif; }
    
    /* === 響應式棋盤引擎 (已優化空間最大化) === */
    .game-wrapper {
      /* 扣除頂部工具列(~80px)與上下/左右玩家面板的空間，確保不重疊且最大化 */
      --board-size-portrait: min(calc(100vw - 32px), calc((100dvh - 360px) / var(--portrait-mult)));
      --board-size-landscape: min(calc(100dvh - 110px), calc((100vw - 340px) / var(--landscape-mult)));
    }
    @media (orientation: portrait) { .game-wrapper { --board-size: var(--board-size-portrait); } }
    @media (orientation: landscape) { .game-wrapper { --board-size: var(--board-size-landscape); } }
    
    .board-container { width: var(--board-size); height: var(--board-size); }
    .card-item { width: calc(var(--board-size) * var(--card-scale)); height: calc(var(--board-size) * var(--card-scale) * 1.25); }
    .card-text { font-size: max(9px, calc(var(--board-size) * var(--card-scale) * 0.15)); }

    /* === 結算特效文字 === */
    .scoring-text { font-family: 'Zen Maru Gothic', sans-serif; paint-order: stroke fill; line-height: 1.2; }
    .score-identical { background: linear-gradient(180deg, #a5f3fc 0%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #164e63; filter: drop-shadow(0px 0px 8px rgba(6,182,212,0.9)); }
    .score-num-identical { color: #22d3ee; -webkit-text-stroke: 1px #164e63; }
    .score-complementary { background: linear-gradient(180deg, #fef08a 0%, #eab308 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #713f12; filter: drop-shadow(0px 0px 8px rgba(234,179,8,0.9)); }
    .score-num-complementary { color: #facc15; -webkit-text-stroke: 1px #713f12; }
    .score-sequence { background: linear-gradient(180deg, #f5d0fe 0%, #d946ef 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #4a044e; filter: drop-shadow(0px 0px 8px rgba(217,70,239,0.9)); }
    .score-num-sequence { color: #e879f9; -webkit-text-stroke: 1px #4a044e; }

    @keyframes score-pulse { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.15); filter: brightness(1.3); box-shadow: 0 0 40px rgba(254,240,138,1); } 100% { transform: scale(1); filter: brightness(1); } }
    .animate-score-pulse { animation: score-pulse 1.5s ease-in-out forwards; }
    @keyframes float-score { 0% { opacity: 0; transform: translateY(30px) scale(0.5); } 15%, 85% { opacity: 1; transform: translateY(0) scale(1.1); } 100% { opacity: 0; transform: translateY(-30px) scale(0.8); } }
    .animate-float-score { animation: float-score 1.5s ease-in-out forwards; }
    @keyframes ai-think { 0%, 100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
    .animate-ai-think { animation: ai-think 1s infinite ease-in-out; }
    
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.5); border-radius: 4px; }
    
    .keyboard-btn { transition: all 0.1s; border-bottom-width: 4px; }
    .keyboard-btn:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }

          <div className="bg-slate-900 border border-slate-600 rounded-3xl p-6 w-full max-w-md relative text-slate-200 shadow-2xl">
            <button onClick={onClose} className="absolute top-4 right-4 p-2 bg-slate-800 rounded-full hover:bg-slate-700 text-white"><XIcon className="w-6 h-6"/></button>
            <h2 className="text-3xl font-black mb-6 text-center text-indigo-300">{t.settings}</h2>
            
            <div className="space-y-5">
              <div><label className="block text-sm font-bold mb-2">{t.language}</label>
                <select value={lang} onChange={e => setLang(e.target.value)} className="w-full bg-slate-800 border border-slate-600 text-white rounded-lg px-3 py-2 outline-none">
                  <option value="zh">繁體中文</option><option value="en">English</option><option value="ja">日本語</option>
                </select>
              </div>
              
              <div><label className="block text-sm font-bold mb-2">{t.bgmTrack}</label>
                <select value={bgmTrack} onChange={e => setBgmTrack(parseInt(e.target.value))} className="w-full bg-slate-800 border border-slate-600 text-white rounded-lg px-3 py-2 outline-none">
                  <option value={1}>{t.track1}</option><option value={2}>{t.track2}</option><option value={3}>{t.track3}</option>
                </select>
              </div>

              <div className="flex gap-4">
                <div className="flex-1"><label className="block text-sm font-bold mb-2">{t.bgmVol}</label><input type="range" min="0" max="1" step="0.01" value={bgmVol} onChange={e => setBgmVol(parseFloat(e.target.value))} className="w-full accent-indigo-500" /></div>
                <div className="flex-1"><label className="block text-sm font-bold mb-2">{t.sfxVol}</label><input type="range" min="0" max="1" step="0.01" value={sfxVol} onChange={e => setSfxVol(parseFloat(e.target.value))} className="w-full accent-rose-500" /></div>
              </div>

              <div className="flex gap-3">
                <button onClick={() => setShowTutorial(true)} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold border border-slate-600">{t.howToPlay}</button>
                <button onClick={toggleFs} className="flex-1 py-3 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold border border-slate-600">{t.fullscreen}</button>
              </div>

              <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 mt-4">
                <h3 className="font-bold text-slate-400 mb-2">{t.about}</h3>
                <p className="text-xs text-slate-500 whitespace-pre-line leading-relaxed">{t.aboutText}</p>
              </div>
            </div>
          </div>
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(null);
      const [roomId, setRoomId] = useState('');
      const [joinCode, setJoinCode] = useState('');
      const [myPlayerId, setMyPlayerId] = useState(1);
      const [isPseudoFs, setIsPseudoFs] = useState(false);
      const [nativeFs, setNativeFs] = useState(false);
      
      const [lang, setLang] = useState('zh');
      const [bgmTrack, setBgmTrack] = useState(1);
      const [bgmVol, setBgmVol] = useState(0.4);
      const [sfxVol, setSfxVol] = useState(0.8);
      const [showSettings, setShowSettings] = useState(false);
      const [showTutorialInner, setShowTutorialInner] = useState(false);

      const [localTotalPlayers, setLocalTotalPlayers] = useState(2);
      const [localHumanCount, setLocalHumanCount] = useState(1);
      const [aiDifficulty, setAiDifficulty] = useState('medium'); 
      const [boardTypePref, setBoardTypePref] = useState('random');

      const [onlineMaxPlayers, setOnlineMaxPlayers] = useState(4);
      const [onlineRoomData, setOnlineRoomData] = useState(null);

      const [playerName, setPlayerName] = useState('');
      const [leaderboard, setLeaderboard] = useState([]);
      const [isLoadingLb, setIsLoadingLb] = useState(false);
      const [aiThinkingPlayer, setAiThinkingPlayer] = useState(null);
      const [uploadStatus, setUploadStatus] = useState('idle'); // idle, uploading, success, restart

      const lastProcessedMoveTs = useRef(0);
      const roomIdRef = useRef('');

      const [gameState, setGameState] = useState({
        mode: 'menu', boardType: 'classic', board: [], totalPlayers: 2, playersInfo: {}, hands: {}, decks: {}, scores: {},
        turn: 1, finalBaseScores: null, isAnimating: false, gameOver: false, tallyState: 'none', selectedCardIdx: null, scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null,
        challengeData: { currentLevel: 1, totalScore: 0 }
      });

      const t = TRANSLATIONS[lang] || TRANSLATIONS.zh;

      useEffect(() => { roomIdRef.current = roomId; }, [roomId]);

      useEffect(() => {
        const handleFsChange = () => { const isNowFs = !!(document.fullscreenElement || document.webkitFullscreenElement); setNativeFs(isNowFs); if (!isNowFs) setIsPseudoFs(false); };
        document.addEventListener('fullscreenchange', handleFsChange); document.addEventListener('webkitfullscreenchange', handleFsChange);
        return () => { document.removeEventListener('fullscreenchange', handleFsChange); document.removeEventListener('webkitfullscreenchange', handleFsChange); };
      }, []);
      const toggleFullscreen = () => { const docElem = document.documentElement; const isNowFs = !!(document.fullscreenElement || document.webkitFullscreenElement); if (!isNowFs && !isPseudoFs) { const req = docElem.requestFullscreen || docElem.webkitRequestFullscreen; if (req) req.call(docElem).catch(() => setIsPseudoFs(true)); else setIsPseudoFs(true); } else { const exit = document.exitFullscreen || document.webkitExitFullscreen; if (isNowFs && exit) exit.call(document).catch(() => setIsPseudoFs(false)); setIsPseudoFs(false); } };
      
      useEffect(() => { audioManager.setBgmVolume(bgmVol); }, [bgmVol]);
      useEffect(() => { audioManager.setSfxVolume(sfxVol); }, [sfxVol]);
      useEffect(() => { audioManager.setTrack(bgmTrack); }, [bgmTrack]);

      useEffect(() => { const initAuth = async () => { try { if (auth) { if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await signInWithCustomToken(auth, __initial_auth_token); } else { await signInAnonymously(auth); } } } catch (e) { console.error(e); } }; initAuth(); if (auth) { const unsubscribe = onAuthStateChanged(auth, setUser); return () => unsubscribe(); } }, []);

      useEffect(() => {
        if (!roomId || !user || !db || (gameState.mode !== 'online' && gameState.mode !== 'lobby_wait')) return;
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId);
        const unsubscribe = onSnapshot(roomRef, (snap) => {
          if (!snap.exists()) return; const data = snap.data();
          setOnlineRoomData(data);
          if (data.status === 'playing') {
            setGameState(prev => {
              if (prev.mode !== 'online' || (data.round && data.round !== prev.round)) {
                lastProcessedMoveTs.current = 0; 
                return { ...prev, mode: 'online', boardType: data.initialState.boardType, ...data.initialState, turn: 1, finalBaseScores: null, isAnimating: false, gameOver: false, tallyState: 'none', selectedCardIdx: null, scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null, round: data.round || 1 };
              }
              return prev;
            });
            if (data.lastMove && data.lastMove.player !== myPlayerId && data.lastMove.ts > lastProcessedMoveTs.current) { lastProcessedMoveTs.current = data.lastMove.ts; playCard(data.lastMove.cardIdx, data.lastMove.boardIdx, true); }
          }
        });
        return () => unsubscribe();
      }, [roomId, user, myPlayerId, gameState.mode]);

      const fetchLeaderboard = async () => {
        if (!user || !db) return; setIsLoadingLb(true);
        try {
          const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'moonphase_leaderboard'));
          let data = []; snap.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => { if (b.level !== a.level) return b.level - a.level; return b.totalScore - a.totalScore; });
          
          data.forEach((entry, index) => {
            if (index > 0 && entry.level === data[index - 1].level && entry.totalScore === data[index - 1].totalScore) {
              entry.rank = data[index - 1].rank;
            } else {
              entry.rank = index + 1;
            }
          });

          setLeaderboard(data.slice(0, 50));
        } catch(e) { console.error(e); } setIsLoadingLb(false);
      };
      useEffect(() => { if (gameState.mode === 'leaderboard') fetchLeaderboard(); }, [gameState.mode]);

      const getActualBoardId = (playerCount) => {
        const pool = getBoardPool(playerCount);
        if (boardTypePref !== 'random' && pool[boardTypePref]) return boardTypePref;
        const choices = Object.keys(pool); return choices[Math.floor(Math.random() * choices.length)];
      };

      const getChallengeBoardId = (level) => {
        const boardIndex = Math.floor((level - 1) / 5);
        return CHALLENGE_BOARDS_ORDERED[Math.min(boardIndex, 19)];
      };
      
      const getChallengeAiDifficulty = (level) => {
        const cycle = (level - 1) % 5;
        if (cycle <= 1) return 'low'; if (cycle <= 3) return 'medium'; return 'high';
      };

      const generateInitData = (mode, totalPlayers, humanCount, boardId) => {
        const boardConfig = ALL_BOARDS[boardId] || ALL_BOARDS['classic'];
        const genDeck = () => { let d = []; for(let i=0; i<3; i++) d.push(0,1,2,3,4,5,6,7); return d.sort(()=>Math.random()-0.5); };
        let decks = {}, hands = {}, scores = {}, playersInfo = {};
        for (let i = 1; i <= totalPlayers; i++) {
          let d = genDeck(); decks[i] = d.slice(3); hands[i] = d.slice(0,3); scores[i] = 0;
          if (mode === 'challenge') { playersInfo[i] = { type: i === 1 ? 'human' : 'ai', difficulty: getChallengeAiDifficulty(1) }; }
          else if (mode === 'local') { playersInfo[i] = { type: i <= humanCount ? 'human' : 'ai', difficulty: aiDifficulty }; }
        }
        return { boardType: boardId, board: Array(boardConfig.nodes.length).fill(null), totalPlayers, playersInfo, hands, decks, scores };
      };

      const initGame = (mode) => {
        audioManager.init(); let newChallengeData = { currentLevel: 1, totalScore: 0 }; let totalP = localTotalPlayers; let humanC = localHumanCount;
        if (mode === 'challenge') { totalP = 2; humanC = 1; }
        let bId = mode === 'challenge' ? getChallengeBoardId(1) : getActualBoardId(totalP);
        const initData = generateInitData(mode, totalP, humanC, bId);
        setAiThinkingPlayer(null);
        setUploadStatus('idle');
        setGameState(prev => ({ ...prev, mode, ...initData, turn: 1, finalBaseScores: null, isAnimating: false, gameOver: false, tallyState: 'none', selectedCardIdx: null, scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null, challengeData: newChallengeData }));
      };

      const nextChallengeLevel = () => {
        const nextLevel = gameState.challengeData.currentLevel + 1; const accScore = gameState.challengeData.totalScore + gameState.scores[1];
        if (nextLevel > 100) { 
          setUploadStatus('idle');
          setGameState(prev => ({ ...prev, mode: 'name_input', challengeData: { currentLevel: 100, totalScore: accScore } })); return; 
        }
        const nextBId = getChallengeBoardId(nextLevel);
        const initData = generateInitData('challenge', 2, 1, nextBId);
        initData.playersInfo[2].difficulty = getChallengeAiDifficulty(nextLevel);
        setAiThinkingPlayer(null);
        setGameState(prev => ({ ...prev, ...initData, turn: 1, finalBaseScores: null, isAnimating: false, gameOver: false, tallyState: 'none', challengeData: { currentLevel: nextLevel, totalScore: accScore } }));
      };

      const submitChallengeScore = async () => {
        if (!user || !db || playerName.trim().length < 3 || uploadStatus !== 'idle') return;
        setUploadStatus('uploading');
        try { 
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'moonphase_leaderboard'), { name: playerName.toUpperCase(), level: gameState.challengeData.currentLevel, totalScore: gameState.challengeData.totalScore, uid: user.uid, ts: Date.now() }); 
          setUploadStatus('success');
          setTimeout(() => {
            setUploadStatus('restart');
          }, 2000);
        } catch(e) { 
          console.error(e); 
          setUploadStatus('idle');
        }
      };

      const handleKeyboardAction = () => {
        if (uploadStatus === 'restart') {
           setUploadStatus('idle');
           setPlayerName('');
           initGame('challenge');
        } else {
           submitChallengeScore();
        }
      };

      const createRoom = async () => {
        if (!user || !db) return alert("Firebase Offline");
        const newRoomId = Math.floor(100000 + Math.random() * 900000).toString();
        try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', newRoomId), { status: 'waiting', createdAt: Date.now(), host: user.uid, maxPlayers: onlineMaxPlayers, players: { [user.uid]: { pId: 1, ready: true } }, round: 1 }); setRoomId(newRoomId); setMyPlayerId(1); setGameState(prev => ({ ...prev, mode: 'lobby_wait' })); } catch (e) { console.error(e); }
      };
      
      const joinRoom = async (code) => {
        if (!user || !code || !db) return;
        try {
          const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', code); const snap = await getDoc(roomRef);
          if (snap.exists() && snap.data().status === 'waiting') {
            const data = snap.data(); const currentPlayers = Object.keys(data.players).length;
            if (currentPlayers >= data.maxPlayers) return alert("Room Full");
            let usedPids = Object.values(data.players).map(p=>p.pId); let newPid = 2; while(usedPids.includes(newPid)) newPid++;
            await updateDoc(roomRef, { [`players.${user.uid}`]: { pId: newPid, ready: false } });
            setRoomId(code); setMyPlayerId(newPid); setGameState(prev => ({ ...prev, mode: 'lobby_wait' }));
          } else { alert("Not Found"); }
        } catch (e) { console.error(e); }
      };

      const toggleReadyOnline = async () => {
        if (!roomId || !user || !db || !onlineRoomData) return;
        const isReady = onlineRoomData.players[user.uid].ready;
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId), { [`players.${user.uid}.ready`]: !isReady });
      };

      const startOnlineGame = async () => {
        if (!roomId || !user || !db || !onlineRoomData) return;
        const humanCount = Object.keys(onlineRoomData.players).length; const totalP = onlineRoomData.maxPlayers;
        let bId = getActualBoardId(totalP); const initData = generateInitData('online', totalP, humanCount, bId);
        for(let i=1; i<=totalP; i++) initData.playersInfo[i] = { type: 'ai', difficulty: 'medium' };
        Object.entries(onlineRoomData.players).forEach(([uid, p]) => { initData.playersInfo[p.pId] = { type: 'human', uid }; });
        try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId), { status: 'playing', initialState: initData, round: (onlineRoomData.round || 1) + 1, lastMove: null }); } catch (e) { console.error(e); }
      };

      const handlePlayAgain = () => { if (gameState.mode === 'online' && myPlayerId === 1) { startOnlineGame(); } else if (gameState.mode !== 'online') { initGame(gameState.mode); } };

      const getNextTurn = (curr, hands) => { let n = curr; let count = 0; do { n = (n % gameState.totalPlayers) + 1; count++; } while (hands[n] && hands[n].length === 0 && count < gameState.totalPlayers); return n; };
      const drawCard = (deck, hand) => (deck.length === 0 ? { newDeck: deck, finalHand: hand } : { newDeck: deck.slice(1), finalHand: [...hand, deck[0]] });

      const applyResolveTurn = (prevState, captured, newHand, turn) => {
        let newBoard = [...prevState.board]; captured.forEach(idx => { if (newBoard[idx]) newBoard[idx].player = turn; });
        let newHands = {...prevState.hands}; let newDecks = {...prevState.decks};
        const { newDeck, finalHand } = drawCard(prevState.decks[turn]||[], newHand);
        newHands[turn] = finalHand; newDecks[turn] = newDeck;
        
        const isBoardFull = !newBoard.includes(null); const allHandsEmpty = Object.values(newHands).every(h => h.length === 0);
        const gameOver = isBoardFull || allHandsEmpty;
        let finalBaseScores = prevState.finalBaseScores; if (gameOver && !finalBaseScores) finalBaseScores = { ...prevState.scores };
        const nextT = gameOver ? turn : getNextTurn(turn, newHands);

        return { board: newBoard, decks: newDecks, hands: newHands, isAnimating: false, turn: nextT, gameOver, finalBaseScores, tallyState: gameOver ? 'start' : 'none', scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null };
      };

      const playCard = useCallback((cardIdx, boardIdx, isRemote = false) => {
        audioManager.init(); audioManager.playPlaceCard();
        setGameState(prev => {
          if (prev.isAnimating || prev.gameOver || !prev.board || prev.board[boardIdx] !== null) return prev;
          const hand = prev.hands[prev.turn]; if (!hand || hand[cardIdx] === undefined) return prev;
          
          const playedPhase = hand[cardIdx]; let newHand = [...hand]; newHand.splice(cardIdx, 1);
          let newBoard = [...prev.board]; newBoard[boardIdx] = { phase: playedPhase, player: 0 }; 

          if (!isRemote && prev.mode === 'online' && roomIdRef.current && db) { updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomIdRef.current), { lastMove: { cardIdx, boardIdx, player: prev.turn, ts: Date.now() } }).catch(console.error); }

          const edges = ALL_BOARDS[prev.boardType]?.edges || []; 
          let events = []; let totalCaptured = new Set();
          getNeighbors(boardIdx, edges).forEach(n => {
            const neighbor = newBoard[n];
            if (neighbor) {
              if (isIdentical(playedPhase, neighbor.phase)) { events.push({ id: `ev-${Date.now()}-${n}`, type: 'identical', cells: [boardIdx, n], points: 1, name: t.phaseSame }); totalCaptured.add(boardIdx); totalCaptured.add(n); } 
              else if (isMatch(playedPhase, neighbor.phase)) { events.push({ id: `ev-${Date.now()}-${n}`, type: 'complementary', cells: [boardIdx, n], points: 2, name: t.phaseComp }); totalCaptured.add(boardIdx); totalCaptured.add(n); }
            }
          });
          findSequences(newBoard, boardIdx, edges).forEach((seq, i) => { events.push({ id: `seq-${Date.now()}-${i}`, type: 'sequence', cells: seq, points: seq.length, name: t.phaseSeq }); seq.forEach(n => totalCaptured.add(n)); });

          return { ...prev, board: newBoard, hands: {...prev.hands, [prev.turn]: newHand}, selectedCardIdx: null, isAnimating: true, scoringQueue: events.length > 0 ? events.slice(1) : [], currentScoringEvent: events.length > 0 ? events[0] : null, pendingResolveInfo: { captured: Array.from(totalCaptured), newHand, turn: prev.turn } };
        });
      }, [t]);

      useEffect(() => {
        if (!gameState.isAnimating) return;
        if (gameState.currentScoringEvent) {
          const type = gameState.currentScoringEvent.type;
          if (type === 'identical') audioManager.playIdentical(); else if (type === 'complementary') audioManager.playComplementary(); else if (type === 'sequence') audioManager.playSequence();
          const timer = setTimeout(() => { setGameState(prev => { let newS = { ...prev.scores }; newS[prev.pendingResolveInfo.turn] += prev.currentScoringEvent.points; return { ...prev, scores: newS, currentScoringEvent: null }; }); }, 1500); return () => clearTimeout(timer);
        } else if (gameState.pendingResolveInfo) {
          if (gameState.scoringQueue.length > 0) { const gapTimer = setTimeout(() => { setGameState(prev => ({ ...prev, currentScoringEvent: prev.scoringQueue[0], scoringQueue: prev.scoringQueue.slice(1) })); }, 100); return () => clearTimeout(gapTimer); } 
          else { const finishTimer = setTimeout(() => { setGameState(prev => { if (!prev.pendingResolveInfo) return prev; return { ...prev, ...applyResolveTurn(prev, prev.pendingResolveInfo.captured, prev.pendingResolveInfo.newHand, prev.pendingResolveInfo.turn) }; }); }, 200); return () => clearTimeout(finishTimer); }
        }
      }, [gameState.currentScoringEvent, gameState.isAnimating, gameState.scoringQueue.length, gameState.pendingResolveInfo]);

      useEffect(() => {
        if (gameState.tallyState === 'start') { setTimeout(() => setGameState(p => ({ ...p, tallyState: 'tally_1' })), 1000); } 
        else if (gameState.tallyState && gameState.tallyState.startsWith('tally_')) {
          const pId = parseInt(gameState.tallyState.split('_')[1]);
          audioManager.playTone(880, 'sine', 0.1, 0.2); 
          setGameState(p => { const territory = p.board.filter(c => c && c.player === pId).length; return { ...p, scores: { ...p.scores, [pId]: (p.scores[pId]||0) + territory } }; });
          setTimeout(() => {
            const nextP = pId + 1;
            if (nextP <= gameState.totalPlayers) setGameState(p => ({ ...p, tallyState: `tally_${nextP}` }));
            else { 
              setGameState(p => ({ ...p, tallyState: 'done' })); 
              if (gameState.mode === 'challenge') { if(gameState.scores[1] + gameState.board.filter(c=>c&&c.player===1).length <= gameState.scores[2] + gameState.board.filter(c=>c&&c.player===2).length) audioManager.playLose(); else audioManager.playWin(); }
              else { audioManager.playWin(); }
            }
          }, 1200);
        }
      }, [gameState.tallyState, gameState.totalPlayers, gameState.mode]);

      useEffect(() => {
        if (gameState.gameOver || gameState.isAnimating || gameState.mode === 'menu') { setAiThinkingPlayer(null); return; }
        const currentP = gameState.playersInfo[gameState.turn];
        if (currentP && currentP.type === 'ai') {
          setAiThinkingPlayer(gameState.turn);
          const thinkTime = Math.random() * 1500 + 1000; 
          const timer = setTimeout(() => {
            const edges = ALL_BOARDS[gameState.boardType]?.edges || [];
            const emptyCells = gameState.board.map((c, i) => c === null ? i : -1).filter(i => i !== -1);
            const myHand = gameState.hands[gameState.turn];
            if (myHand && myHand.length > 0 && emptyCells.length > 0) {
              let allMoves = [];
              myHand.forEach((phase, cardIdx) => {
                emptyCells.forEach(boardIdx => {
                  let simBoard = [...gameState.board]; simBoard[boardIdx] = { phase, player: 0 };
                  let simCapture = new Set(); let comboPts = 0;
                  getNeighbors(boardIdx, edges).forEach(n => {
                    const neighbor = simBoard[n];
                    if (neighbor) {
                      if (isIdentical(phase, neighbor.phase)) { simCapture.add(boardIdx); simCapture.add(n); comboPts += 1; }
                      else if (isMatch(phase, neighbor.phase)) { simCapture.add(boardIdx); simCapture.add(n); comboPts += 2; }
                    }
                  });
                  findSequences(simBoard, boardIdx, edges).forEach(seqCells => { seqCells.forEach(n => simCapture.add(n)); comboPts += seqCells.length; });
                  let pts = comboPts; simCapture.forEach(idx => { if (gameState.board[idx] && gameState.board[idx].player !== gameState.turn) pts += 1.5; });
                  allMoves.push({ cardIdx, boardIdx, score: pts });
                });
              });

              if (allMoves.length > 0) {
                let selectedMove = null; const diff = currentP.difficulty;
                if (diff === 'low') { selectedMove = allMoves[Math.floor(Math.random() * allMoves.length)]; } 
                else if (diff === 'medium') { if (Math.random() < 0.5) { allMoves.sort((a, b) => b.score - a.score); const bests = allMoves.filter(m => m.score === allMoves[0].score); selectedMove = bests[Math.floor(Math.random() * bests.length)]; } else { selectedMove = allMoves[Math.floor(Math.random() * allMoves.length)]; } } 
                else { allMoves.sort((a, b) => b.score - a.score); const bests = allMoves.filter(m => m.score === allMoves[0].score); selectedMove = bests[Math.floor(Math.random() * bests.length)]; }
                if (selectedMove) { setAiThinkingPlayer(null); playCard(selectedMove.cardIdx, selectedMove.boardIdx); }
              }
            }
          }, thinkTime); 
          return () => clearTimeout(timer);
        } else { setAiThinkingPlayer(null); }
      }, [gameState.turn, gameState.mode, gameState.isAnimating, gameState.gameOver, gameState.board, gameState.hands, gameState.boardType, playCard, gameState.playersInfo, gameState.totalPlayers]); 

      const P_COLORS = {
        1: { base: 'indigo', hex: '99,102,241', text: 'text-indigo-300', bgText: 'text-indigo-100', border: 'border-indigo-500', ring: 'ring-indigo-400', bg: 'bg-indigo-900', shadow: 'rgba(99,102,241,0.5)' },
        2: { base: 'rose', hex: '244,63,94', text: 'text-rose-300', bgText: 'text-rose-100', border: 'border-rose-500', ring: 'ring-rose-400', bg: 'bg-rose-900', shadow: 'rgba(244,63,94,0.5)' },

                <VirtualKeyboard onKeyPress={(k) => setPlayerName(p => p.length < 8 ? p + k : p)} onDelete={() => setPlayerName(p => p.slice(0, -1))} onSubmit={handleKeyboardAction} disabledSubmit={playerName.length < 3 && uploadStatus === 'idle'} uploadStatus={uploadStatus} t={t} />
                <button onClick={() => { setUploadStatus('idle'); setGameState(prev => ({...prev, mode: 'menu'})); }} className="mt-6 text-slate-400 hover:text-white underline text-sm">{(uploadStatus === 'success' || uploadStatus === 'restart') ? t.btnBackMenu : t.btnSkip}</button>
              </div>

            {gameState.mode === 'leaderboard' && (

              </div>

                       <button onClick={() => joinRoom(joinCode)} className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold">{t.btnJoin}</button>

                <button onClick={() => setGameState(prev => ({ ...prev, mode: 'menu' }))} className="mt-8 text-slate-400 hover:text-white flex items-center space-x-2"><Home className="w-4 h-4" /> <span>{t.back}</span></button>

              <div className="z-10 flex flex-col items-center p-8 bg-slate-900/60 backdrop-blur-xl rounded-3xl border border-emerald-500/30 shadow-2xl relative w-full max-w-md my-10 mx-4">
                <h2 className="text-xl font-bold text-slate-300">{t.roomCode}</h2>

                          <span className={`font-bold flex items-center gap-2 ${pEntry ? cInfo.text : 'text-slate-600'}`}>

                          </span>
                          {pEntry && (

      const currentBoardConfig = ALL_BOARDS[gameState.boardType] || ALL_BOARDS['classic'];

      if (gameState.currentScoringEvent) {

        else if (gameState.currentScoringEvent.type === 'complementary') { currentScoreTextClass = 'score-complementary'; currentScoreNumClass = 'score-num-complementary'; }
        else { currentScoreTextClass = 'score-sequence'; currentScoreNumClass = 'score-num-sequence'; }

      const portraitMult = 1.2 + 2 * ((currentBoardConfig.cardScale||0.2) * 1.25);
      const landscapeMult = 1.2 + 2 * (currentBoardConfig.cardScale||0.2);
      
      const sortedPlayers = Object.keys(gameState.scores).map(pId => parseInt(pId)).sort((a,b) => gameState.scores[b] - gameState.scores[a]);
      const playerRanks = {};
      let currentRank = 1;
      let prevScore = null;
      sortedPlayers.forEach((pId, idx) => {
        if (gameState.scores[pId] !== prevScore) {
          currentRank = idx + 1;
          prevScore = gameState.scores[pId];
        }
        playerRanks[pId] = currentRank;
      });

      return (
        <div className={`game-wrapper ${wrapperClass} flex flex-col`} style={{ '--card-scale': currentBoardConfig.cardScale||0.2, '--portrait-mult': portraitMult, '--landscape-mult': landscapeMult }}>
          <StarryBackground />
          
          {showSettings && <SettingsModal onClose={() => setShowSettings(false)} lang={lang} setLang={setLang} bgmTrack={bgmTrack} setBgmTrack={setBgmTrack} bgmVol={bgmVol} setBgmVol={setBgmVol} sfxVol={sfxVol} setSfxVol={setSfxVol} toggleFs={toggleFullscreen} showTutorial={showTutorialInner} setShowTutorial={setShowTutorialInner} t={t} />}

          {/* === 全新頂部工具列 (Top Toolbar) === */}
          <div className="absolute top-0 left-0 w-full h-16 sm:h-20 z-[999] flex items-center justify-between px-3 sm:px-6 pointer-events-none">
            {/* 左側：棋盤名稱 */}
            <div className="pointer-events-auto bg-slate-900/80 px-3 sm:px-4 py-1.5 rounded-full border border-slate-600/50 shadow-lg backdrop-blur-md flex items-center shrink-0">
              <span className="text-[10px] sm:text-sm text-slate-300 uppercase tracking-widest font-bold">{t.boardNames[gameState.boardType] || gameState.boardType}</span>
            </div>

            {/* 中央：遊戲資訊 (挑戰模式 / 線上模式) */}
            <div className="absolute left-1/2 -translate-x-1/2 pointer-events-auto flex items-center justify-center whitespace-nowrap">
              {gameState.mode === 'challenge' && (
                <div className="bg-slate-900/80 px-4 sm:px-6 py-1.5 sm:py-2 rounded-full border border-yellow-500/50 shadow-[0_0_20px_rgba(234,179,8,0.2)] backdrop-blur-md flex items-center gap-2 sm:gap-4">
                  <span className="text-xs sm:text-lg font-black text-yellow-400 tracking-widest drop-shadow-md">{t.txtLvl} <span className="text-white text-sm sm:text-xl">{gameState.challengeData.currentLevel}</span> {t.txtLayer}</span>
                  <div className="w-px h-3 sm:h-5 bg-slate-600"></div>
                  <span className="text-xs sm:text-lg font-bold text-slate-300">{t.totalScore}: <span className="text-emerald-400 text-sm sm:text-xl font-mono">{gameState.challengeData.totalScore}</span></span>
                </div>
              )}
              {gameState.mode === 'online' && (
                <div className="bg-slate-900/80 px-4 sm:px-6 py-1.5 sm:py-2 rounded-full border border-emerald-500/50 shadow-lg backdrop-blur-md">
                  <span className="text-xs sm:text-base font-bold text-emerald-400">{t.txtRoom} <span className="text-white tracking-widest font-mono ml-1">{roomId}</span></span>
                </div>
              )}
            </div>

            {/* 右側：回首頁與設定 */}
            <div className="pointer-events-auto flex items-center gap-2 shrink-0">
              <button onClick={() => setGameState(prev => ({ ...prev, mode: 'menu' }))} className="p-2 sm:p-2.5 text-slate-300 hover:text-white bg-slate-900/80 hover:bg-rose-900/80 rounded-full border border-slate-600/50 hover:border-rose-500/50 shadow-lg backdrop-blur-md transition-all group" title={t.back}>
                <Home className="w-4 h-4 sm:w-5 sm:h-5 group-hover:scale-110" />
              </button>
              <button onClick={() => setShowSettings(true)} className="p-2 sm:p-2.5 text-indigo-300 hover:text-white bg-slate-900/80 hover:bg-indigo-900/80 rounded-full border border-slate-600/50 hover:border-indigo-500/50 shadow-lg backdrop-blur-md transition-all group" title={t.settings}>
                <SettingsIcon className="w-4 h-4 sm:w-5 sm:h-5 group-hover:rotate-90 transition-transform" />
              </button>
            </div>
          </div>
          {/* ================================ */}

          {gameState.tallyState !== 'none' && gameState.tallyState !== 'done' && (
            <div className="absolute inset-0 z-[100] flex items-center justify-center pointer-events-none">
               <div className="bg-slate-900/95 text-white px-6 py-4 rounded-full text-lg sm:text-xl font-bold animate-pulse shadow-2xl border border-slate-500 text-center">
                  {gameState.tallyState === 'start' && <span>{t.gameOver}</span>}
                  {gameState.tallyState.startsWith('tally_') && (() => {
                    const tId = parseInt(gameState.tallyState.split('_')[1]); const cInfo = P_COLORS[tId];
                    return <span>{t.tallyBase} {getPlayerLabel(tId)}... <span className={`${cInfo.text} ml-2`}>+{gameState.board.filter(c => c && c.player === tId).length}</span></span>;
                  })()}
               </div>
            </div>
          )}

          {gameState.tallyState === 'done' && (
            <div className="absolute inset-0 z-[200] flex items-center justify-center bg-slate-950/80 backdrop-blur-md">
              <div className="bg-slate-900 border border-indigo-500/50 p-6 sm:p-8 rounded-3xl shadow-[0_0_50px_rgba(99,102,241,0.2)] flex flex-col items-center text-center w-full max-w-xl mx-4 max-h-[90vh] overflow-y-auto">
                {gameState.mode === 'challenge' ? (
                  <React.Fragment>
                    {sortedPlayers[0] === 1 && gameState.scores[1] >= gameState.scores[2] ? (
                      <React.Fragment>
                        <Trophy className="w-16 h-16 text-emerald-400 mb-2 drop-shadow-[0_0_15px_rgba(52,211,153,0.5)]" />
                        <h2 className="text-3xl font-black mb-4 text-emerald-300">{t.challengeSuccess}</h2>
                        <div className="text-lg text-slate-300 mb-6 bg-slate-800/50 px-6 py-4 rounded-xl border border-slate-600 w-full">
                          <p>{t.txtYou} <span className="text-indigo-300 font-bold">{gameState.scores[1]}</span> {t.txtVsAI} <span className="text-rose-300">{gameState.scores[2]}</span></p>
                          <p className="mt-2">{t.totalScore}: <span className="text-yellow-400 font-bold text-2xl">{gameState.challengeData.totalScore + gameState.scores[1]}</span></p>
                        </div>
                        <button onClick={nextChallengeLevel} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg transition-all">{gameState.challengeData.currentLevel >= 100 ? t.btnFinish100 : t.btnNextLvl}</button>
                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        <div className="w-16 h-16 rounded-full bg-rose-900/50 flex items-center justify-center mb-2 border-2 border-rose-500"><XIcon className="w-8 h-8 text-rose-400" /></div>
                        <h2 className="text-3xl font-black mb-4 text-rose-400">{t.challengeFail}</h2>
                        <div className="text-lg text-slate-300 mb-6 bg-slate-800/50 px-6 py-4 rounded-xl border border-slate-600 w-full">
                          <p>{t.totalScore}: <span className="text-yellow-400 font-bold text-2xl">{gameState.challengeData.totalScore + gameState.scores[1]}</span></p>
                        </div>
                        <button onClick={() => { setUploadStatus('idle'); setGameState(prev => ({...prev, mode: 'name_input', challengeData: {...prev.challengeData, totalScore: prev.challengeData.totalScore + gameState.scores[1]}})); }} className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-lg transition-all">{t.btnSaveRecord}</button>
                      </React.Fragment>
                    )}
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <Trophy className="w-12 h-12 text-yellow-400 mb-2 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]" />
                    <h2 className="text-2xl sm:text-3xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500">{t.rankTitle}</h2>
                    <div className="w-full flex flex-col gap-2 mb-6">
                      {sortedPlayers.map((pId, idx) => {
                        const cInfo = P_COLORS[pId];
                        return (
                          <div key={pId} className={`flex justify-between items-center p-3 rounded-xl border ${playerRanks[pId] === 1 ? `bg-${cInfo.base}-900/40 border-${cInfo.base}-400 scale-105 shadow-lg` : 'bg-slate-800/50 border-slate-600'}`}>
                            <div className="flex items-center gap-3"><span className="text-2xl">{playerRanks[pId]===1?'👑':playerRanks[pId]}</span><span className={`font-bold ${cInfo.text}`}>{getPlayerLabel(pId)}</span></div>
                            <span className={`text-2xl font-black ${cInfo.bgText}`}>{gameState.scores[pId]}</span>
                          </div>
                        )
                      })}
                    </div>
                    <div className="flex w-full space-x-4">
                      {((gameState.mode==='online' && myPlayerId===1) || gameState.mode!=='online') && <button onClick={handlePlayAgain} className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold flex items-center justify-center space-x-2"><RotateCcw className="w-5 h-5" /> <span>{t.btnPlayAgain}</span></button>}
                      <button onClick={() => setGameState(prev => ({ ...prev, mode: 'menu' }))} className="flex-1 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold flex items-center justify-center space-x-2"><Home className="w-5 h-5" /> <span>{t.back}</span></button>
                    </div>
                  </React.Fragment>
                )}
              </div>
            </div>
          )}

          <div className="z-10 w-full max-w-[1400px] mx-auto flex flex-1 min-h-0 relative items-center justify-center overflow-hidden pt-16 sm:pt-20">
            {Array.from({length: gameState.totalPlayers}, (_,i)=>i+1).map(pId => {
              const posClass = getPlayerLayoutClasses(pId, gameState.totalPlayers);
              const cInfo = P_COLORS[pId];
              const isAiThinking = aiThinkingPlayer === pId;
              if(!gameState.hands[pId]) return null;
              
              return (
                <div key={pId} className={`absolute z-20 flex items-center p-1.5 sm:p-2 rounded-2xl transition-all duration-300 ${getPlayerContainerStyle(pId)} ${posClass}`}>
                  <div className={`flex flex-row justify-center gap-1 sm:gap-2 mb-1 mt-1`}>
                    {gameState.hands[pId].map((phase, i) => renderCard(phase, i, pId))}
                  </div>
                  <div className={`relative flex flex-row justify-between w-full items-center gap-2 bg-slate-950/60 rounded-full border border-${cInfo.base}-500/30 px-3 py-1 shadow-md`}>
                    <span className={`text-[10px] sm:text-xs font-bold truncate max-w-[80px] sm:max-w-[120px] ${cInfo.text}`}>{getPlayerLabel(pId)}</span>
                    {isAiThinking && <span className="absolute left-1/2 -translate-x-1/2 text-xs font-bold text-yellow-300 animate-ai-think whitespace-nowrap bg-slate-900/80 px-2 py-0.5 rounded-full border border-yellow-500/50 shadow-lg">{t.txtThinking}</span>}
                    <span className={`text-sm sm:text-base font-black ${cInfo.bgText}`}>{gameState.scores[pId]}</span>
                  </div>
                </div>
              );
            })}

            <div className="relative bg-slate-900/40 rounded-[2rem] sm:rounded-[3rem] backdrop-blur-md border border-slate-700/50 shadow-2xl shrink-0 board-container flex items-center justify-center">
              {gameState.currentScoringEvent && (
                <div key={gameState.currentScoringEvent.id} className="absolute inset-0 flex items-center justify-center pointer-events-none z-[100]">
                  <div className="animate-float-score flex flex-col items-center">
                    <span className={`text-[length:clamp(1.5rem,5vmin,3rem)] font-black tracking-widest scoring-text pb-1 ${currentScoreTextClass}`}>{gameState.currentScoringEvent.name}</span>
                    <span className={`text-[length:clamp(2rem,6vmin,4rem)] font-black scoring-text mt-0 drop-shadow-md ${currentScoreNumClass}`}>+{gameState.currentScoringEvent.points}</span>
                  </div>
                </div>
              )}
              <svg viewBox="0 0 100 100" className="absolute inset-0 w-full h-full pointer-events-none z-0 overflow-visible">
                {currentBoardConfig.edges.map((edge, i) => {
                  const n1 = currentBoardConfig.nodes[edge[0]]; const n2 = currentBoardConfig.nodes[edge[1]];
                  let isScoringEdge = false;
                  if (gameState.currentScoringEvent) {
                    const ev = gameState.currentScoringEvent;
                    if (ev.type === 'sequence') { const idx1 = ev.cells.indexOf(edge[0]); const idx2 = ev.cells.indexOf(edge[1]); if (idx1 !== -1 && idx2 !== -1 && Math.abs(idx1 - idx2) === 1) isScoringEdge = true; } 
                    else { isScoringEdge = ev.cells.includes(edge[0]) && ev.cells.includes(edge[1]); }
                  }
                  let strokeColor = "rgba(71, 85, 105, 0.3)"; let strokeW = "1.2";
                  if (isScoringEdge) { strokeColor = `rgba(${P_COLORS[gameState.turn].hex}, 0.9)`; strokeW = "2.5"; }
                  return <line key={`edge-${i}`} x1={n1.x} y1={n1.y} x2={n2.x} y2={n2.y} stroke={strokeColor} strokeWidth={strokeW} strokeLinecap="round" className="transition-all duration-500" style={isScoringEdge ? { filter: `drop-shadow(0px 0px 4px ${strokeColor})` } : {}} />;
                })}
              </svg>
              {gameState.board.map((cell, idx) => {
                const node = currentBoardConfig.nodes[idx];
                return (
                  <div key={`node-${idx}`} className={`absolute z-10 flex items-center justify-center transition-colors card-item ${cell === null ? 'border-2 border-dashed border-slate-500/50 bg-slate-800/30 hover:bg-slate-700/60 cursor-pointer backdrop-blur-sm shadow-inner rounded-full sm:rounded-2xl' : ''}`} style={{ left: `${node.x}%`, top: `${node.y}%`, transform: 'translate(-50%, -50%)' }} onClick={(e) => { e.stopPropagation(); if (cell === null && gameState.selectedCardIdx !== null && (!gameState.isAnimating)) { const pType = gameState.playersInfo[gameState.turn].type; const canPlay = (gameState.mode === 'online') ? gameState.turn === myPlayerId : pType !== 'ai'; if (canPlay) playCard(gameState.selectedCardIdx, idx, false); } }}>
                    {cell && renderCard(cell.phase, -1, cell.player, true, idx)}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
