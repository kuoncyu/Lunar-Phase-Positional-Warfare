<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">

  <title>月相牌卡 - 月相陣地戰</title>

<body class="text-slate-100 font-sans selection:bg-indigo-500/30">
  <div id="app" class="min-h-screen relative transition-all duration-300 flex flex-col items-center">
    <!-- 內容將由 JavaScript 渲染 -->
  </div>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // ==========================================
    // 🌟 Firebase 設定 (已替換為您的設定) 🌟
    // ==========================================
    let firebaseConfig = {
      apiKey: "AIzaSyDs8L6uD0SvtUYn4A6iC2jGB_uHLYXS-1o",
      authDomain: "moonphasegame.firebaseapp.com",
      projectId: "moonphasegame",
      storageBucket: "moonphasegame.firebasestorage.app",
      messagingSenderId: "412480594259",
      appId: "1:412480594259:web:b8e31530e807c0c7f4c1a6",
      measurementId: "G-MEQX9ZZM75"
    };
    
    // 系統要求的前置路徑設定
    let appId = 'moonphasegame'; 
    let app, auth, db;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.warn("Firebase 初始化失敗。線上功能將無法使用。", e);
    }

    // --- 遊戲常數與棋盤定義 ---
    const PHASES = [
      { id: 0, name: '新月' }, { id: 1, name: '眉月' }, { id: 2, name: '上弦月' }, { id: 3, name: '盈凸月' },
      { id: 4, name: '滿月' }, { id: 5, name: '虧凸月' }, { id: 6, name: '下弦月' }, { id: 7, name: '殘月' },
    ];

    // 棋盤定義：nodes 為節點座標(百分比)，edges 為相連的節點索引(決定是否能連線)
    const BOARD_CONFIGS = {
      classic: {
        name: '經典九宮格 (基礎)',
        nodes: [
          {x: 20, y: 15}, {x: 50, y: 15}, {x: 80, y: 15},
          {x: 20, y: 50}, {x: 50, y: 50}, {x: 80, y: 50},
          {x: 20, y: 85}, {x: 50, y: 85}, {x: 80, y: 85}
        ],
        edges: [
          [0,1], [1,2], [3,4], [4,5], [6,7], [7,8],
          [0,3], [3,6], [1,4], [4,7], [2,5], [5,8]
        ]
      },
      butterfly: {
        name: '星際展翼 (高錯綜)',
        nodes: [
          {x: 15, y: 15}, {x: 85, y: 15}, // 0, 1
          {x: 10, y: 50}, {x: 30, y: 50}, {x: 50, y: 50}, {x: 70, y: 50}, {x: 90, y: 50}, // 2,3,4,5,6
          {x: 20, y: 85}, {x: 40, y: 85}, {x: 60, y: 85}, {x: 80, y: 85} // 7,8,9,10
        ],
        edges: [
          [0,2], [1,6],
          [2,3], [3,4], [4,5], [5,6],
          [2,7], [3,7], [3,8], [4,8], [4,9], [5,9], [5,10], [6,10],
          [7,8], [8,9], [9,10]
        ]
      },
      arch: {
        name: '月牙拱門 (深防禦)',
        nodes: [
          {x: 50, y: 10}, // 0
          {x: 30, y: 25}, {x: 70, y: 25}, // 1, 2
          {x: 15, y: 45}, {x: 50, y: 50}, {x: 85, y: 45}, // 3, 4, 5
          {x: 15, y: 85}, {x: 35, y: 85}, {x: 65, y: 85}, {x: 85, y: 85}, // 6, 7, 8, 9
        ],
        edges: [
          [0,1], [0,2],
          [1,3], [1,4], [2,5], [2,4],
          [3,6], [3,7], [5,8], [5,9],
          [4,7], [4,8],
          [6,7], [8,9]
        ]
      }
    };

    let user = null;
    let roomId = '';
    let errorMsg = '';
    let myPlayerId = 1;
    let lastProcessedMoveTs = 0;
    let roomUnsubscribe = null;
    let selectedBoardSetting = 'random'; // 玩家在介面選擇的設定

    let isFullscreen = false;
    let usePseudoFallback = false;

    let gameState = {
      mode: 'menu', 
      boardType: 'classic', // 實際遊玩的棋盤種類
      board: Array(9).fill(null),
      p1Deck: [], p2Deck: [], p1Hand: [], p2Hand: [],
      turn: 1, comboScores: { 1: 0, 2: 0 },
      matchingCells: [], isAnimating: false, gameOver: false,
      tallyState: 'none', selectedCardIdx: null, lastPlayInfo: null, round: 1
    };

    // --- 核心邏輯函式 ---
    const isMatch = (phase1, phase2) => (phase1 + 4) % 8 === phase2;
    const isIdentical = (phase1, phase2) => phase1 === phase2;

    // ✨ 更新：嚴格依賴定義好的連線 (edges) 來尋找鄰居 ✨
    const getNeighbors = (boardType, idx) => {
      const edges = BOARD_CONFIGS[boardType].edges;
      let neighbors = [];
      for (let i = 0; i < edges.length; i++) {
        if (edges[i][0] === idx) neighbors.push(edges[i][1]);
        if (edges[i][1] === idx) neighbors.push(edges[i][0]);
      }
      return neighbors;
    };

    // 依據連線尋找月相變化路徑
    const getPath = (boardArray, boardType, currIdx, step) => {
      let capturedNodes = new Set([currIdx]);
      let currentLayer = [currIdx];
      let depth = 0; 
      while (currentLayer.length > 0) {
        let nextLayer = [];
        let expectedPhase = (boardArray[currentLayer[0]].phase + step + 8) % 8;
        currentLayer.forEach(node => {
          getNeighbors(boardType, node).forEach(n => {
            if (boardArray[n] && boardArray[n].phase === expectedPhase && !capturedNodes.has(n)) {
              nextLayer.push(n);
              capturedNodes.add(n);
            }
          });
        });
        if (nextLayer.length > 0) {
          depth++;
          currentLayer = nextLayer;
        } else break; 
      }
      return { nodes: Array.from(capturedNodes), depth };
    };

    const findSequence = (boardArray, boardType, startIdx) => {
      const pathUp = getPath(boardArray, boardType, startIdx, 1);
      const pathDown = getPath(boardArray, boardType, startIdx, -1);
      const sequenceLength = pathUp.depth + pathDown.depth + 1;
      if (sequenceLength >= 3) {
        return Array.from(new Set([...pathUp.nodes, ...pathDown.nodes]));
      }
      return [];
    };

    const drawCard = (deck, hand) => {
      if (deck.length === 0) return { newDeck: deck, newHand: hand };
      return { newDeck: deck.slice(1), newHand: [...hand, deck[0]] };
    };

    // --- SVG 與圖標生成 ---
    const getMoonSvg = (phase, className = "") => {
      let inner = '';
      if (phase === 1) inner = '<path d="M 50,2 A 48,48 0 0,1 50,98 A 24,48 0 0,0 50,2 Z" fill="#fef08a" />';
      if (phase === 2) inner = '<path d="M 50,2 A 48,48 0 0,1 50,98 L 50,2 Z" fill="#fef08a" />';
      if (phase === 3) inner = '<path d="M 50,2 A 48,48 0 0,1 50,98 A 24,48 0 0,1 50,2 Z" fill="#fef08a" />';
      if (phase === 4) inner = '<circle cx="50" cy="50" r="48" fill="#fef08a" />';
      if (phase === 5) inner = '<path d="M 50,2 A 48,48 0 0,0 50,98 A 24,48 0 0,0 50,2 Z" fill="#fef08a" />';
      if (phase === 6) inner = '<path d="M 50,2 A 48,48 0 0,0 50,98 L 50,2 Z" fill="#fef08a" />';
      if (phase === 7) inner = '<path d="M 50,2 A 48,48 0 0,0 50,98 A 24,48 0 0,1 50,2 Z" fill="#fef08a" />';
      const dot = phase !== 0 ? `<circle cx="${phase > 0 && phase < 4 ? 70 : phase > 4 ? 30 : 50}" cy="40" r="3" fill="#ca8a04" opacity="0.3" />` : '';
      return `<svg viewBox="0 0 100 100" class="${className}" style="filter: drop-shadow(0px 0px 6px rgba(254, 240, 138, 0.5))">
        <circle cx="50" cy="50" r="48" fill="#1e1b4b" stroke="#312e81" stroke-width="2" />
        ${inner}${dot}
      </svg>`;
    };

    const getIcon = (name, className = "w-6 h-6") => {
      const base = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}">`;
      const paths = {
        'User': '<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>',
        'Users': '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
        'RotateCcw': '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>',
        'Home': '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
        'Trophy': '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7c0 6 6 10 6 10s6-4 6-10Z"/>',
        'Globe': '<circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>',
        'Maximize': '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>',
        'Minimize': '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>'
      };
      return base + paths[name] + '</svg>';
    };

    const StarryBackground = `<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none bg-gradient-to-b from-slate-950 via-indigo-950 to-slate-900"><div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIxIiBmaWxsPSIjZmZmIiBvcGFjaXR5PSIwLjMiLz48Y2lyY2xlIGN4PSIyNTAiIGN5PSIxNTAiIHI9IjEuNSIgZmlsbD0iI2ZmZiIgb3BhY2l0eT0iMC41Ii8+PGNpcmNsZSBjeD0iMzUwIiBjeT0iMzIwIiByPSIxIiBmaWxsPSIjZmZmIiBvcGFjaXR5PSIwLjIiLz48L3N2Zz4=')] bg-repeat opacity-50 animate-pulse"></div></div>`;

    // --- 全螢幕與 UI 邏輯 ---
    window.toggleFullscreen = async () => {
      const docElem = document.documentElement;
      if (!document.fullscreenElement) {
        try {
          if (docElem.requestFullscreen) await docElem.requestFullscreen();
          else if (docElem.webkitRequestFullscreen) await docElem.webkitRequestFullscreen();
          isFullscreen = true; usePseudoFallback = false;
        } catch (err) {
          usePseudoFallback = true; isFullscreen = true;
        }
      } else {
        try {
          if (document.exitFullscreen) await document.exitFullscreen();
          else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
          isFullscreen = false;
        } catch (err) {}
        usePseudoFallback = false; isFullscreen = false;
      }
      render();
    };

    document.addEventListener('fullscreenchange', () => { isFullscreen = !!document.fullscreenElement; if(isFullscreen) usePseudoFallback = false; render(); });
    document.addEventListener('webkitfullscreenchange', () => { isFullscreen = !!document.webkitFullscreenElement; if(isFullscreen) usePseudoFallback = false; render(); });

    const render = () => {
      const appDiv = document.getElementById('app');
      if (usePseudoFallback) {
        appDiv.classList.add('fixed', 'inset-0', 'z-[9999]', 'bg-slate-950', 'overflow-y-auto', 'w-full', 'h-full');
        appDiv.classList.remove('min-h-screen', 'relative');
      } else {
        appDiv.classList.remove('fixed', 'inset-0', 'z-[9999]', 'bg-slate-950', 'overflow-y-auto', 'w-full', 'h-full');
        appDiv.classList.add('min-h-screen', 'relative');
      }

      if (gameState.mode === 'menu') appDiv.innerHTML = renderMenu();
      else if (gameState.mode === 'lobby') appDiv.innerHTML = renderLobby();
      else if (gameState.mode === 'waiting') appDiv.innerHTML = renderWaiting();
      else appDiv.innerHTML = renderGame();
    };

    const updateState = (newState) => { gameState = { ...gameState, ...newState }; render(); };
    window.setBoardSetting = (val) => { selectedBoardSetting = val; render(); };

    // --- 遊戲運作邏輯 ---
    const handleAITurn = () => {
      if (gameState.mode === 'single' && gameState.turn === 2 && !gameState.isAnimating && !gameState.gameOver) {
        setTimeout(() => {
          if (gameState.turn !== 2 || gameState.isAnimating || gameState.gameOver) return;
          
          const emptyCells = gameState.board.map((c, i) => c === null ? i : -1).filter(i => i !== -1);
          if (gameState.p2Hand.length > 0 && emptyCells.length > 0) {
            let bestMove = null; let maxPoints = -1;
            gameState.p2Hand.forEach((phase, cardIdx) => {
              emptyCells.forEach(boardIdx => {
                let simBoard = [...gameState.board];
                simBoard[boardIdx] = { phase: phase, player: 0 };
                let simCapture = new Set();
                let comboPts = 0;
                getNeighbors(gameState.boardType, boardIdx).forEach(n => {
                  const neighbor = simBoard[n];
                  if (neighbor) {
                    if (isIdentical(phase, neighbor.phase)) { simCapture.add(boardIdx); simCapture.add(n); comboPts += 1; }
                    else if (isMatch(phase, neighbor.phase)) { simCapture.add(boardIdx); simCapture.add(n); comboPts += 2; }
                  }
                });
                const seqCells = findSequence(simBoard, gameState.boardType, boardIdx);
                if (seqCells.length > 0) { seqCells.forEach(n => simCapture.add(n)); comboPts += seqCells.length; }
                let pts = comboPts;
                simCapture.forEach(idx => { if (gameState.board[idx] && gameState.board[idx].player === 1) pts += 1.5; });
                pts += Math.random() * 0.5;
                if (pts > maxPoints) { maxPoints = pts; bestMove = { cardIdx, boardIdx }; }
              });
            });
            if (bestMove) window.playCard(bestMove.cardIdx, bestMove.boardIdx, false);
          }
        }, 1000);
      }
    };

    const resolveTurn = (cellsToCapture, comboPoints, updatedHandWithoutCard, currentPlayer) => {
      let newBoard = [...gameState.board];
      cellsToCapture.forEach(idx => { if (newBoard[idx]) newBoard[idx].player = currentPlayer; });
      let newComboScores = { ...gameState.comboScores };
      newComboScores[currentPlayer] += comboPoints;
      
      const isP1 = gameState.turn === 1;
      const currentDeck = isP1 ? gameState.p1Deck : gameState.p2Deck;
      const { newDeck, newHand } = drawCard(currentDeck, updatedHandWithoutCard);
      const nextP1Hand = isP1 ? newHand : gameState.p1Hand;
      const nextP2Hand = isP1 ? gameState.p2Hand : newHand;
      
      const isBoardFull = !newBoard.includes(null);
      const isOutOFCards = nextP1Hand.length === 0 && nextP2Hand.length === 0;
      const gameOver = isOutOFCards || isBoardFull;
      
      updateState({
        board: newBoard, p1Deck: isP1 ? newDeck : gameState.p1Deck, p2Deck: isP1 ? gameState.p2Deck : newDeck,
        p1Hand: nextP1Hand, p2Hand: nextP2Hand, comboScores: newComboScores, matchingCells: [],
        isAnimating: false, turn: gameState.turn === 1 ? 2 : 1, gameOver: gameOver, 
        tallyState: gameOver ? 'start' : 'none', lastPlayInfo: null,
      });

      if (gameOver) triggerTallyAnimation(); else handleAITurn();
    };

    const triggerTallyAnimation = () => {
      setTimeout(() => { updateState({ tallyState: 'p1' }); 
        setTimeout(() => { updateState({ tallyState: 'p2' });
          setTimeout(() => { updateState({ tallyState: 'done' }); }, 1500);
        }, 1500);
      }, 1200);
    };

    window.playCard = (cardIdx, boardIdx, isRemote = false) => {
      if (gameState.isAnimating || gameState.gameOver || gameState.board[boardIdx] !== null) return;
      const isP1 = gameState.turn === 1;
      const hand = isP1 ? gameState.p1Hand : gameState.p2Hand;
      if (hand[cardIdx] === undefined) return;
      
      const playedPhase = hand[cardIdx];
      let newHand = [...hand]; newHand.splice(cardIdx, 1);
      
      let newBoard = [...gameState.board];
      newBoard[boardIdx] = { phase: playedPhase, player: 0 };
      
      if (!isRemote && gameState.mode === 'online' && roomId && db) {
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId);
        updateDoc(roomRef, { lastMove: { cardIdx, boardIdx, player: gameState.turn, ts: Date.now() } }).catch(err => console.error(err));
      }
      
      let cellsToCapture = new Set();
      let comboPoints = 0;
      
      // 僅計算與目前節點有「連線」的鄰居
      getNeighbors(gameState.boardType, boardIdx).forEach(n => {
        const neighbor = newBoard[n];
        if (neighbor) {
          if (isIdentical(playedPhase, neighbor.phase)) { cellsToCapture.add(boardIdx); cellsToCapture.add(n); comboPoints += 1; }
          else if (isMatch(playedPhase, neighbor.phase)) { cellsToCapture.add(boardIdx); cellsToCapture.add(n); comboPoints += 2; }
        }
      });
      
      const seqCells = findSequence(newBoard, gameState.boardType, boardIdx);
      if (seqCells.length > 0) { seqCells.forEach(n => cellsToCapture.add(n)); comboPoints += seqCells.length; }
      const captureArray = Array.from(cellsToCapture);
      
      if (captureArray.length > 0) {
        updateState({ board: newBoard, p1Hand: isP1 ? newHand : gameState.p1Hand, p2Hand: isP1 ? gameState.p2Hand : newHand,
          matchingCells: captureArray, isAnimating: true, selectedCardIdx: null, lastPlayInfo: { idx: boardIdx, pts: comboPoints } });
        setTimeout(() => resolveTurn(captureArray, comboPoints, newHand, gameState.turn), 1200);
      } else {
        updateState({ board: newBoard, p1Hand: isP1 ? newHand : gameState.p1Hand, p2Hand: isP1 ? gameState.p2Hand : newHand,
          selectedCardIdx: null, isAnimating: true });
        setTimeout(() => resolveTurn([], 0, newHand, gameState.turn), 500);
      }
    };

    window.initGame = (mode) => {
      const generateDeck = () => { let deck = []; for(let i=0; i<3; i++) deck.push(0, 1, 2, 3, 4, 5, 6, 7); return deck.sort(() => Math.random() - 0.5); };
      
      // 決定棋盤種類
      let actualBoardType = selectedBoardSetting;
      if (selectedBoardSetting === 'random') {
        const types = ['classic', 'butterfly', 'arch'];
        actualBoardType = types[Math.floor(Math.random() * types.length)];
      }

      const numNodes = BOARD_CONFIGS[actualBoardType].nodes.length;
      let deck1 = generateDeck(), deck2 = generateDeck();
      
      updateState({
        mode, boardType: actualBoardType, board: Array(numNodes).fill(null),
        p1Deck: deck1.slice(3), p2Deck: deck2.slice(3), p1Hand: deck1.slice(0, 3), p2Hand: deck2.slice(0, 3),
        turn: 1, comboScores: { 1: 0, 2: 0 }, matchingCells: [], isAnimating: false, gameOver: false,
        tallyState: 'none', selectedCardIdx: null, lastPlayInfo: null,
      });
    };

    window.setMode = (mode) => { updateState({ mode }); errorMsg = ''; };

    // --- Firebase 連線邏輯 ---
    const listenToRoom = () => {
      if (roomUnsubscribe) roomUnsubscribe();
      if (!roomId || !user || !db) return;
      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId);
      roomUnsubscribe = onSnapshot(roomRef, (snap) => {
        if (!snap.exists()) return;
        const data = snap.data();
        let nextState = { ...gameState };
        
        if (data.status === 'playing' && (nextState.mode === 'waiting' || (data.round && data.round !== nextState.round))) {
          lastProcessedMoveTs = 0; 
          nextState = {
            ...nextState, mode: 'online', ...data.initialState, turn: 1, comboScores: { 1: 0, 2: 0 },
            matchingCells: [], isAnimating: false, gameOver: false, tallyState: 'none', selectedCardIdx: null, lastPlayInfo: null, round: data.round || 1
          };
          updateState(nextState);
        }

        if (data.lastMove && data.lastMove.player !== myPlayerId) {
          if (data.lastMove.ts > lastProcessedMoveTs) {
            lastProcessedMoveTs = data.lastMove.ts;
            window.playCard(data.lastMove.cardIdx, data.lastMove.boardIdx, true);
          }
        }
      }, (err) => console.error("Snapshot error:", err));
    };

    window.createRoom = async () => {
      if (!user || !db) { errorMsg = "Firebase 未連接"; render(); return; }
      const code = Math.random().toString(36).substring(2, 6).toUpperCase();
      const hostRole = Math.random() < 0.5 ? 1 : 2;
      const generateDeck = () => { let deck = []; for(let i=0; i<3; i++) deck.push(0, 1, 2, 3, 4, 5, 6, 7); return deck.sort(() => Math.random() - 0.5); };
      
      let actualBoardType = selectedBoardSetting;
      if (selectedBoardSetting === 'random') {
        const types = ['classic', 'butterfly', 'arch'];
        actualBoardType = types[Math.floor(Math.random() * types.length)];
      }

      const numNodes = BOARD_CONFIGS[actualBoardType].nodes.length;
      let deck1 = generateDeck(), deck2 = generateDeck();
      
      const initialState = {
        boardType: actualBoardType, board: Array(numNodes).fill(null),
        p1Deck: deck1.slice(3), p2Deck: deck2.slice(3), p1Hand: deck1.slice(0, 3), p2Hand: deck2.slice(0, 3),
      };
      
      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', code);
      await setDoc(roomRef, { status: 'waiting', hostId: user.uid, guestId: null, initialState, lastMove: null, hostRole, round: 1 });
      roomId = code; myPlayerId = hostRole;
      updateState({ mode: 'waiting' }); listenToRoom();
    };

    window.joinRoom = async () => {
      const codeInput = document.getElementById('joinCodeInput');
      const code = codeInput ? codeInput.value.toUpperCase() : '';
      if (!user || !code || !db) return;
      
      const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', code);
      const snap = await getDoc(roomRef);
      if (snap.exists() && snap.data().status === 'waiting') {
        const data = snap.data();
        const guestRole = data.hostRole === 1 ? 2 : 1; 
        await updateDoc(roomRef, { status: 'playing', guestId: user.uid });
        roomId = code; myPlayerId = guestRole;
        updateState({ mode: 'online', ...data.initialState, turn: 1, comboScores: { 1: 0, 2: 0 },
          matchingCells: [], isAnimating: false, gameOver: false, tallyState: 'none', selectedCardIdx: null, lastPlayInfo: null, round: data.round || 1 });
        listenToRoom();
      } else { errorMsg = '找不到房間或遊戲已開始！'; render(); }
    };

    window.handlePlayAgain = async () => {
      if (gameState.mode === 'online' && roomId && db) {
        let actualBoardType = selectedBoardSetting;
        if (selectedBoardSetting === 'random') {
          const types = ['classic', 'butterfly', 'arch'];
          actualBoardType = types[Math.floor(Math.random() * types.length)];
        }
        const generateDeck = () => { let deck = []; for(let i=0; i<3; i++) deck.push(0, 1, 2, 3, 4, 5, 6, 7); return deck.sort(() => Math.random() - 0.5); };
        let deck1 = generateDeck(), deck2 = generateDeck();
        const numNodes = BOARD_CONFIGS[actualBoardType].nodes.length;
        const initialState = {
          boardType: actualBoardType, board: Array(numNodes).fill(null),
          p1Deck: deck1.slice(3), p2Deck: deck2.slice(3), p1Hand: deck1.slice(0, 3), p2Hand: deck2.slice(0, 3),
        };
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId);
        await updateDoc(roomRef, { initialState, lastMove: null, status: 'playing', round: Date.now() });
      } else { window.initGame(gameState.mode); }
    };

    window.handleCardClick = (isBoard, boardIdx, player, index) => {
      const isMyTurn = (gameState.mode === 'online') ? (gameState.turn === myPlayerId && player === myPlayerId) : (player === gameState.turn);
      if (!isBoard && isMyTurn && !gameState.isAnimating && gameState.tallyState === 'none') {
        updateState({ selectedCardIdx: gameState.selectedCardIdx === index ? null : index });
      }
      if (isBoard && gameState.selectedCardIdx !== null) {
        const canPlay = gameState.mode === 'single' ? gameState.turn === 1 : (gameState.mode === 'multi' ? true : (gameState.mode === 'online' ? gameState.turn === myPlayerId : false));
        if (canPlay) window.playCard(gameState.selectedCardIdx, boardIdx, false);
      }
    };

    // --- UI 渲染區塊 ---
    const renderCard = (phase, index, player, isBoard = false, boardIdx = -1) => {
      if (phase === undefined || phase === null) return '';
      const isNeutral = !isBoard || player === 0;
      const isTallyingP1 = gameState.tallyState === 'p1' && isBoard && player === 1;
      const isTallyingP2 = gameState.tallyState === 'p2' && isBoard && player === 2;
      const isDimmed = isBoard && (gameState.tallyState === 'p1' || gameState.tallyState === 'p2') && !isTallyingP1 && !isTallyingP2;
      const isSelected = !isBoard && gameState.selectedCardIdx === index && player === gameState.turn;
      const isMatching = isBoard && gameState.matchingCells.includes(boardIdx);
      
      let isHidden = false;
      if (!isBoard && index >= 0 && !gameState.gameOver) {
        if (gameState.mode === 'single') isHidden = player === 2; 
        else if (gameState.mode === 'multi') isHidden = player !== gameState.turn;
        else if (gameState.mode === 'online') isHidden = player !== myPlayerId; 
      }

      let colorClasses = '';
      if (isNeutral) colorClasses = isBoard ? 'bg-slate-800/80 border-slate-500/50 ring-1 ring-slate-500 shadow-[inset_0_0_15px_rgba(0,0,0,0.5)]' : 'bg-gradient-to-br from-slate-700/80 to-slate-800 border-slate-500 shadow-lg hover:border-slate-400';
      else if (player === 1) colorClasses = 'bg-indigo-900/90 border-indigo-400 ring-2 ring-indigo-400 shadow-[0_0_15px_rgba(99,102,241,0.5)]';
      else if (player === 2) colorClasses = 'bg-rose-900/90 border-rose-400 ring-2 ring-rose-400 shadow-[0_0_15px_rgba(244,63,94,0.5)]';

      if (isHidden) colorClasses = 'bg-slate-800 border-slate-600 shadow-inner';

      let animClasses = '';
      if (isTallyingP1) animClasses = 'scale-110 shadow-[0_0_40px_rgba(129,140,248,1)] z-20 ring-4 ring-indigo-300 transition-all duration-300';
      else if (isTallyingP2) animClasses = 'scale-110 shadow-[0_0_40px_rgba(251,113,133,1)] z-20 ring-4 ring-rose-300 transition-all duration-300';
      else if (isDimmed) animClasses = 'opacity-30 grayscale transition-all duration-500';

      const sizeClasses = isBoard ? 'w-full h-full absolute inset-0' : 'w-16 h-20 sm:w-24 sm:h-28 cursor-pointer shrink-0';
      const selectClasses = isSelected ? 'ring-2 ring-yellow-400 -translate-y-4 shadow-[0_10px_20px_rgba(250,204,21,0.4)]' : '';
      const matchClasses = isMatching ? 'brightness-125 scale-105 shadow-[0_0_30px_rgba(254,240,138,1)] ring-2 ring-yellow-300 z-10' : '';

      const svgClasses = isBoard ? 'w-[55%] h-[55%] mb-1' : 'w-10 h-10 sm:w-16 sm:h-16 mb-1 sm:mb-2';
      const textClasses = isBoard ? 'text-[0.6rem] sm:text-[0.7rem] leading-none' : 'text-[10px] sm:text-xs';

      const content = !isHidden ? `
        ${getMoonSvg(phase, svgClasses)}
        <span class="${textClasses} font-medium tracking-wide ${isNeutral ? 'text-slate-300' : player === 1 ? 'text-indigo-200' : 'text-rose-200'}">${PHASES[phase].name}</span>
      ` : `<div class="w-[55%] h-[55%] rounded-full bg-slate-700/50 border border-slate-600/50 flex items-center justify-center"><span class="text-slate-400 opacity-50 font-bold">?</span></div>`;

      return `<div onclick="window.handleCardClick(${isBoard}, ${boardIdx}, ${player}, ${index})" class="relative flex flex-col items-center justify-center rounded-xl sm:rounded-2xl transition-all duration-300 ${sizeClasses} ${colorClasses} border ${selectClasses} ${matchClasses} ${animClasses}">${content}</div>`;
    };

    const renderBoardSelector = (idPrefix) => `

        <label class="block text-indigo-300 text-sm font-bold mb-2 ml-1">選擇星際戰場</label>
        <select id="${idPrefix}Selector" onchange="window.setBoardSetting(this.value)" class="w-full px-4 py-3 bg-slate-800/80 border border-indigo-500/40 rounded-xl text-white font-medium focus:outline-none focus:border-indigo-400 shadow-inner">
          <option value="random" ${selectedBoardSetting === 'random' ? 'selected' : ''}>🎲 隨機配置棋盤</option>
          <option value="classic" ${selectedBoardSetting === 'classic' ? 'selected' : ''}>📦 經典九宮格 (基礎)</option>
          <option value="butterfly" ${selectedBoardSetting === 'butterfly' ? 'selected' : ''}>🦋 星際展翼 (高錯綜)</option>
          <option value="arch" ${selectedBoardSetting === 'arch' ? 'selected' : ''}>⛩️ 月牙拱門 (深防禦)</option>
        </select>

          <button onclick="window.toggleFullscreen()" class="absolute top-4 right-4 p-2 text-indigo-300 hover:text-white bg-slate-800/50 rounded-full border border-white/10 transition-colors" title="切換全螢幕">
            ${getIcon(isFullscreen ? 'Minimize' : 'Maximize', 'w-5 h-5')}
          </button>
          <div class="flex items-center space-x-4 mb-6 mt-4">

          </div>
          <h1 class="text-4xl md:text-5xl font-extrabold mb-2 tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-yellow-200 to-yellow-500 drop-shadow-lg text-center">月相陣地戰</h1>

              <button onclick="window.setMode('lobby')" class="flex items-center justify-center space-x-3 w-full py-4 bg-emerald-700 hover:bg-emerald-600 text-white border border-emerald-500/50 rounded-xl font-bold transition-all">${getIcon('Globe')}<span>連線對戰 (線上雙人)</span></button>

          <button onclick="window.toggleFullscreen()" class="absolute top-4 right-4 p-2 text-indigo-300 hover:text-white bg-slate-800/50 rounded-full border border-white/10 transition-colors" title="切換全螢幕">

                  ${errorMsg ? `<p class="text-rose-400 text-sm text-center mb-2">${errorMsg}</p>` : ''}
                  <button onclick="window.joinRoom()" class="w-full py-4 bg-emerald-700 hover:bg-emerald-600 text-white rounded-xl font-bold shadow-lg">加入房間</button>
               </div>
             </div>
          `}
          <button onclick="window.setMode('menu')" class="mt-6 text-slate-400 hover:text-white flex items-center space-x-2">${getIcon('Home', 'w-4 h-4')} <span>返回首頁</span></button>
        </div>
      </div>
    `;

    const renderWaiting = () => `
      ${StarryBackground}
      <div class="z-10 flex flex-col items-center justify-center flex-1 w-full p-4">
        <div class="flex flex-col items-center p-8 bg-slate-900/60 backdrop-blur-xl rounded-3xl border border-indigo-500/30 shadow-2xl text-center my-10 relative min-w-[300px]">
          <button onclick="window.toggleFullscreen()" class="absolute top-4 right-4 p-2 text-indigo-300 hover:text-white bg-slate-800/50 rounded-full border border-white/10 transition-colors" title="切換全螢幕">
            ${getIcon(isFullscreen ? 'Minimize' : 'Maximize', 'w-5 h-5')}
          </button>
          <h2 class="text-2xl font-bold mb-2 text-indigo-200 mt-4">你的房間代碼</h2>
          <div class="text-xs text-indigo-400 mb-4 bg-indigo-900/30 px-3 py-1 rounded-full border border-indigo-500/20">戰場配置: ${BOARD_CONFIGS[gameState.boardType].name}</div>
          <div class="text-6xl font-black tracking-widest text-yellow-400 mb-8 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]">${roomId}</div>
          <p class="text-slate-300 animate-pulse mb-8">等待對手加入...</p>
          <button onclick="window.setMode('menu')" class="text-slate-400 hover:text-white flex items-center space-x-2">${getIcon('RotateCcw', 'w-4 h-4')} <span>取消並返回</span></button>
        </div>
      </div>
    `;

    const renderGame = () => {
      const getPlayerLabel = (playerId) => {
        if (gameState.mode === 'single') return playerId === 1 ? '玩家 1' : '電腦 (AI)';
        if (gameState.mode === 'online') return playerId === myPlayerId ? `玩家 ${playerId} (你)` : `玩家 ${playerId} (對手)`;
        return `玩家 ${playerId}`;
      };

      let bottomPlayer = 1, topPlayer = 2;
      if (gameState.mode === 'online') { bottomPlayer = myPlayerId; topPlayer = myPlayerId === 1 ? 2 : 1; }

      const topHand = topPlayer === 1 ? gameState.p1Hand : gameState.p2Hand;
      const bottomHand = bottomPlayer === 1 ? gameState.p1Hand : gameState.p2Hand;
      const topScore = gameState.comboScores[topPlayer];
      const bottomScore = gameState.comboScores[bottomPlayer];
      const isTopScoring = gameState.isAnimating && gameState.lastPlayInfo && gameState.turn === topPlayer;
      const isBottomScoring = gameState.isAnimating && gameState.lastPlayInfo && gameState.turn === bottomPlayer;

      const getPlayerContainerStyle = (player) => {
        if (gameState.turn !== player || gameState.tallyState !== 'none') return 'bg-transparent border border-transparent';
        return player === 1 ? 'bg-indigo-900/20 border border-indigo-500/30 shadow-[0_0_20px_rgba(99,102,241,0.1)]' : 'bg-rose-900/20 border border-rose-500/30 shadow-[0_0_20px_rgba(244,63,94,0.1)]';
      };

      const currentBoardConfig = BOARD_CONFIGS[gameState.boardType] || BOARD_CONFIGS['classic'];

      let html = StarryBackground;

      // 結算提示
      if (['start', 'p1', 'p2'].includes(gameState.tallyState)) {
        let msg = '';
        if (gameState.tallyState === 'start') msg = '遊戲結束！開始結算領地...';
        else if (gameState.tallyState === 'p1') msg = '結算 玩家 1 領地...';
        else msg = '結算 ' + getPlayerLabel(2).split(' ')[0] + ' 領地...';

        html += `<div class="absolute inset-0 z-[100] flex items-center justify-center pointer-events-none px-4">
           <div class="bg-slate-900/90 text-white px-6 sm:px-8 py-4 sm:py-5 rounded-full text-xl sm:text-2xl font-bold animate-bounce shadow-2xl border border-slate-500 text-center">${msg}</div>
        </div>`;
      }

      // 產生邊線 SVG 內容
      const edgesSvgContent = currentBoardConfig.edges.map(([u, v]) => {
        const n1 = currentBoardConfig.nodes[u];
        const n2 = currentBoardConfig.nodes[v];
        return `<line x1="${n1.x}%" y1="${n1.y}%" x2="${n2.x}%" y2="${n2.y}%" stroke="#475569" stroke-width="3" stroke-linecap="round" class="line-flow" />`;
      }).join('');

      // 產生節點卡片內容
      const nodesHtmlContent = gameState.board.map((cell, idx) => {
        const node = currentBoardConfig.nodes[idx];
        const cellHtml = cell ? renderCard(cell.phase, -1, cell.player, true, idx) : '';
        const scorePopHtml = (gameState.isAnimating && gameState.lastPlayInfo && gameState.lastPlayInfo.idx === idx) 
            ? `<div class="absolute inset-0 flex items-center justify-center z-50 pointer-events-none animate-bounce"><span class="text-4xl sm:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-t from-yellow-500 to-yellow-100 drop-shadow-[0_0_15px_rgba(250,204,21,1)]" style="-webkit-text-stroke: 1.5px #a16207;">+${gameState.lastPlayInfo.pts}</span></div>` 
            : '';
        const nodeBgClasses = cell === null 
            ? 'border-2 border-dashed border-slate-500/50 bg-slate-800/80 hover:bg-slate-700/90 cursor-pointer shadow-[inset_0_4px_10px_rgba(0,0,0,0.5)]' 
            : 'shadow-xl';

        return `
          <div onclick="if(${cell === null} && ${gameState.selectedCardIdx !== null} && !${gameState.isAnimating}) { window.handleCardClick(true, ${idx}, 0, 0); }" 
               class="absolute z-10 flex items-center justify-center rounded-xl sm:rounded-2xl transition-all duration-300 ${nodeBgClasses}"
               style="left: ${node.x}%; top: ${node.y}%; transform: translate(-50%, -50%); width: 15%; height: 25%;">
            ${cellHtml}
            ${scorePopHtml}
          </div>
        `;
      }).join('');

      // 主畫面骨架
      html += `
      <div class="w-full flex-1 flex flex-col p-2 sm:p-6 overflow-hidden max-w-[1200px] mx-auto">
        <div class="z-10 w-full flex justify-between items-center mx-auto mb-2 sm:mb-4 px-2 shrink-0">
          <div class="flex space-x-2">
            <button onclick="window.setMode('menu')" class="flex items-center space-x-2 text-indigo-300 hover:text-white bg-slate-900/50 px-3 py-2 rounded-full border border-white/10 transition-colors">${getIcon('Home', 'w-4 h-4')} <span class="text-sm font-bold hidden sm:inline">退出</span></button>
            <button onclick="window.toggleFullscreen()" class="flex items-center justify-center p-2 text-indigo-300 hover:text-white bg-slate-900/50 rounded-full border border-white/10 transition-colors" title="切換全螢幕">${getIcon(isFullscreen ? 'Minimize' : 'Maximize', 'w-4 h-4')}</button>
          </div>
          ${gameState.mode === 'online' ? `<span class="text-xs sm:text-sm font-bold px-3 py-1.5 sm:px-4 sm:py-2 rounded-full border border-emerald-500/30 ${gameState.turn === myPlayerId ? 'bg-emerald-900 text-emerald-300 shadow-lg animate-pulse' : 'bg-slate-800 text-slate-400'}">${gameState.turn === myPlayerId ? '輪到你了！' : '等待對手...'} <span class="hidden sm:inline">(房: ${roomId})</span></span>` : ''}
          <div class="flex space-x-2 sm:space-x-4 text-xs sm:text-sm text-slate-400 bg-slate-900/50 px-3 py-1.5 sm:px-4 sm:py-2 rounded-full border border-white/10">
            <span class="${topPlayer === 1 ? 'text-indigo-300' : 'text-rose-300'}">上: ${topPlayer === 1 ? gameState.p1Deck.length : gameState.p2Deck.length}</span>
            <span>|</span>
            <span class="${bottomPlayer === 1 ? 'text-indigo-300' : 'text-rose-300'}">下: ${bottomPlayer === 1 ? gameState.p1Deck.length : gameState.p2Deck.length}</span>
          </div>
        </div>

        <div class="z-10 flex flex-col w-full h-full items-center justify-between pb-6 sm:pb-10 flex-1 min-h-0">
          <!-- Top Player Area -->
          <div class="flex flex-col items-center w-full max-w-lg p-3 sm:p-4 rounded-3xl transition-colors shrink-0 ${getPlayerContainerStyle(topPlayer)}">
            <div class="flex justify-between w-full px-4 sm:px-6 mb-2 sm:mb-3 items-center">
              <span class="font-bold text-sm sm:text-base ${topPlayer === 1 ? 'text-indigo-300' : 'text-rose-300'}">${getPlayerLabel(topPlayer)}</span>
              <span class="text-xl sm:text-2xl font-black transition-all duration-300 flex items-baseline ${isTopScoring ? 'text-yellow-300 scale-110' : (topPlayer === 1 ? 'text-indigo-100' : 'text-rose-100')}">${topScore}${isTopScoring ? `<span class="ml-2 text-lg sm:text-xl animate-pulse text-yellow-400">+${gameState.lastPlayInfo.pts}</span>` : ''}<span class="text-xs sm:text-sm font-normal ml-1 ${topPlayer === 1 ? 'text-indigo-400' : 'text-rose-400'}">分</span></span>
            </div>
            <div class="flex space-x-2 sm:space-x-4 h-16 sm:h-24">${topHand.map((phase, i) => renderCard(phase, i, topPlayer)).join('')}</div>
          </div>

          <!-- Board Area (動態圖形連線系統) -->
          <div class="relative w-full max-w-lg aspect-[4/3] bg-slate-900/60 rounded-[2rem] backdrop-blur-md border border-slate-700/50 shadow-2xl shrink overflow-visible my-4">
            ${gameState.mode === 'online' && gameState.turn !== myPlayerId ? `<div class="absolute top-2 right-2 sm:top-4 sm:right-4 bg-slate-800 text-yellow-300 text-xs px-3 py-1 rounded-full animate-pulse border border-slate-600 z-30 shadow-lg">等待對方出牌...</div>` : ''}
            <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-indigo-950 text-indigo-300 text-[10px] sm:text-xs px-4 py-1 rounded-full border border-indigo-500/50 tracking-wider shadow-lg z-20 opacity-80">${currentBoardConfig.name}</div>

            <div class="flex space-x-2 sm:space-x-4 h-16 sm:h-24">${bottomHand.map((phase, i) => renderCard(phase, i, bottomPlayer)).join('')}</div>

            </div>
          </div>
        </div>
      </div>
      `;

      // 結束畫面
      if (gameState.gameOver && gameState.tallyState === 'done') {
        const currentScore1 = gameState.comboScores[1], currentScore2 = gameState.comboScores[2];
        const territory1 = gameState.board.filter(c => c !== null && c.player === 1).length;
        const territory2 = gameState.board.filter(c => c !== null && c.player === 2).length;
        const finalScore1 = currentScore1 + territory1, finalScore2 = currentScore2 + territory2;
        
        let winnerText = '平分秋色！';
        if (finalScore1 > finalScore2) {
          winnerText = '玩家 1 獲勝！';
        } else if (finalScore2 > finalScore1) {
          winnerText = getPlayerLabel(2).split(' ')[0] + ' 獲勝！';
        }

        html += `
        <div class="fixed inset-0 z-[99999] flex items-center justify-center bg-slate-950/80 backdrop-blur-sm px-4">
          <div class="bg-gradient-to-b from-slate-900 to-indigo-950 p-6 sm:p-8 rounded-3xl max-w-sm w-full shadow-2xl border border-indigo-500/30 text-center animate-in zoom-in duration-500">
            <div class="flex justify-center mb-4 text-yellow-400 drop-shadow-lg">${getIcon('Trophy', 'w-16 h-16')}</div>
            <h2 class="text-2xl sm:text-3xl font-bold mb-6 text-white">結算星辰分數</h2>
            <div class="my-6 space-y-4 text-base sm:text-lg bg-slate-900/50 p-4 sm:p-6 rounded-2xl">
               <div class="flex justify-between items-center"><span class="text-indigo-300">${getPlayerLabel(1)}</span><div class="text-right"><div class="text-[10px] sm:text-xs text-indigo-400/70 mb-1">連鎖 ${currentScore1} + 領地 ${territory1}</div><span class="${finalScore1 > finalScore2 ? 'text-yellow-300 font-bold text-2xl sm:text-3xl' : 'text-indigo-100 font-bold text-xl sm:text-2xl'}">${finalScore1}</span></div></div>
               <div class="flex justify-between items-center border-t border-slate-700/50 pt-4"><span class="text-rose-300">${getPlayerLabel(2)}</span><div class="text-right"><div class="text-[10px] sm:text-xs text-rose-400/70 mb-1">連鎖 ${currentScore2} + 領地 ${territory2}</div><span class="${finalScore2 > finalScore1 ? 'text-yellow-300 font-bold text-2xl sm:text-3xl' : 'text-rose-100 font-bold text-xl sm:text-2xl'}">${finalScore2}</span></div></div>
            </div>
            <p class="text-lg sm:text-xl font-bold mb-8 text-yellow-100 bg-white/10 py-3 rounded-xl">${winnerText}</p>
            <div class="flex space-x-3 sm:space-x-4">
               <button onclick="window.handlePlayAgain()" class="flex-1 flex items-center justify-center space-x-2 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold transition-all shadow-lg text-sm sm:text-base">${getIcon('RotateCcw', 'w-5 h-5')}<span>再戰一局</span></button>
               <button onclick="window.setMode('menu')" class="flex-1 flex items-center justify-center space-x-2 py-3 bg-slate-800 hover:bg-slate-700 text-white border border-slate-600/50 rounded-xl font-bold transition-all text-sm sm:text-base">${getIcon('Home', 'w-5 h-5')}<span>退出</span></button>
            </div>
          </div>
        </div>
        `;
      }
      return html;
    };

    // --- 初始化執行 ---
    if (auth) {
      const initAuth = async () => {
        try {
          await signInAnonymously(auth);
        } catch (e) { console.error("Firebase Auth Error:", e); }
      };
      initAuth();
      onAuthStateChanged(auth, (u) => { user = u; render(); });
    }

    render(); // 首次渲染
  </script>
</body>
</html>
