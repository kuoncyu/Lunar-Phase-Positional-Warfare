  <title>月相陣地戰 - 極限闖關與派對版</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Zen+Maru+Gothic:wght@700;900&family=Rubik:wght@700&display=swap" rel="stylesheet">

  <style>
    body, html { margin: 0; padding: 0; background-color: #020617; overflow: hidden; touch-action: none; font-family: 'Noto Sans TC', sans-serif; }
    
    /* === 響應式棋盤引擎 === */
    .game-wrapper { position: fixed; inset: 0; display: flex; flex-direction: column; }

    /*
      landscape: 卡片高度由可用高度反推，確保3張牌+分數列不超出螢幕
      portrait:  卡片寬度由可用寬度反推，確保橫列面板不超出螢幕
    */

    /* === LANDSCAPE === */
    /*
      --stacked-panels : 左側（最高側）面板垂直堆疊數量
        2人 → 1  (各側只有1個面板)
        3人 → 2  (左側2個面板上下疊)
        4人 → 2  (左右各2個面板上下疊)
      card-h = (avail-h - 頂部padding - stacked個面板的分數列高 - gap) / (stacked × 3張)
    */
    @media (orientation: landscape) {
      .game-wrapper {
        --avail-h: calc(100dvh - 56px - 8px);
        --panel-overhead: calc(44px * var(--stacked-panels) + 8px * (var(--stacked-panels) - 1));
        --card-h:  calc((var(--avail-h) - var(--panel-overhead)) / (3 * var(--stacked-panels)));
        --card-w:  calc(var(--card-h) / 1.25);
        --panel-side-w: calc(var(--card-w) + 20px);
        --board-size: min(
          calc(100dvh - 56px - 8px),
          calc(100vw - 16px - var(--panel-side-w) * var(--landscape-mult) - 16px)
        );
      }
      .game-wrapper.challenge-mode {
        --avail-h: calc(100dvh - 56px - 8px);
        --panel-overhead: calc(44px * var(--stacked-panels) + 8px * (var(--stacked-panels) - 1));
        --card-h:  calc((var(--avail-h) - var(--panel-overhead)) / (3 * var(--stacked-panels)));
        --card-w:  calc(var(--card-h) / 1.25);
        --panel-side-w: calc(var(--card-w) + 20px);
        --board-size: min(
          calc(100dvh - 56px - 8px),
          calc(100vw - 24px - var(--panel-side-w) * var(--landscape-mult) - 24px)
        );
      }
    }

    /* === PORTRAIT === */
    /*
      修正：原本卡片寬度只依螢幕寬度反推（/3.2），完全沒考慮直屏下
      永遠存在「上排面板 + 棋盤 + 下排面板」共用垂直空間，導致卡片與棋盤
      在直屏下遠比橫屏大、甚至可能超出畫面高度。
      現在改為「依寬度算出的卡寬」與「依高度反推可用卡寬上限」取最小值，
      並讓 board-size 一律扣除上下兩排面板高度，比例與橫屏模式一致。
    */
    @media (orientation: portrait) {
      .game-wrapper {
        --avail-w: calc(100vw - 8px);
        --card-w-by-width: calc((var(--avail-w) - 12px) / 4);
        --card-w-by-height: calc((100dvh - 56px - 12px) / 12);
        --card-w:  min(var(--card-w-by-width), var(--card-w-by-height));
        --card-h:  calc(var(--card-w) * 1.25);
        --panel-side-w: calc(var(--card-w) + 16px);
        --board-size: min(
          var(--avail-w),
          calc(100dvh - 56px - (var(--card-h) + 18px) * 2 - 12px)
        );
      }
      .game-wrapper.challenge-mode {
        --avail-w: calc(100vw - 16px);
        --card-w-by-width: calc((var(--avail-w) - 12px) / 4);
        --card-w-by-height: calc((100dvh - 56px - 24px) / 12);
        --card-w:  min(var(--card-w-by-width), var(--card-w-by-height));
        --card-h:  calc(var(--card-w) * 1.25);
        --panel-side-w: calc(var(--card-w) + 16px);
        --board-size: min(
          var(--avail-w),
          calc(100dvh - 56px - (var(--card-h) + 18px) * 2 - 24px)
        );
      }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .game-wrapper {
        --avail-h: calc(100dvh - 40px - 8px);
        --panel-overhead: calc(36px * var(--stacked-panels) + 6px * (var(--stacked-panels) - 1));
        --card-h:  calc((var(--avail-h) - var(--panel-overhead)) / (3 * var(--stacked-panels)));
        --card-w:  calc(var(--card-h) / 1.25);
        --panel-side-w: calc(var(--card-w) + 16px);
        --board-size: min(
          var(--avail-h),
          calc(100vw - 16px - var(--panel-side-w) * var(--landscape-mult) - 16px)
        );
      }
    }

    .board-container { width: var(--board-size); height: var(--board-size); flex-shrink: 0; }
    .card-item { width: var(--card-w); height: var(--card-h); }
    .card-text { font-size: max(8px, calc(var(--cell-w, var(--card-w)) * 0.19)); }

    /* === 非遊戲頁面的容器最大寬度 === */
    /* 大螢幕上讓容器充分展開，不再限縮在中央 */
    .max-w-lg  { max-width: min(32rem, 92vw); }
    .max-w-xl  { max-width: min(36rem, 92vw); }
    .max-w-2xl { max-width: min(42rem, 92vw); }
    .max-w-3xl { max-width: min(56rem, 92vw); }
    .max-w-4xl { max-width: min(72rem, 92vw); }

    /* 大廳/選單頁面專用：依螢幕寬度自動放大 */
    @media (min-width: 1024px) {
      .max-w-lg  { max-width: min(46rem, 88vw); }
      .max-w-xl  { max-width: min(52rem, 88vw); }
      .max-w-2xl { max-width: min(64rem, 88vw); }
      .max-w-3xl { max-width: min(76rem, 88vw); }
      .max-w-4xl { max-width: min(90rem, 92vw); }
    }
    @media (min-width: 1400px) {
      .max-w-lg  { max-width: min(52rem, 85vw); }
      .max-w-xl  { max-width: min(60rem, 85vw); }
      .max-w-2xl { max-width: min(72rem, 85vw); }
      .max-w-3xl { max-width: min(88rem, 88vw); }
      .max-w-4xl { max-width: min(100rem, 92vw); }
    }

    /* === 非遊戲頁面響應式字體縮放 === */
    /* 在大螢幕（≥1024px）上字體額外放大，確保空間被充分利用 */
    @media (min-width: 1024px) {
      .text-sm   { font-size: 1.05rem !important; }
      .text-base { font-size: 1.15rem !important; }
      .text-lg   { font-size: 1.3rem !important; }
      .text-xl   { font-size: 1.5rem !important; }
      .text-2xl  { font-size: 1.85rem !important; }
      .text-3xl  { font-size: 2.2rem !important; }
      .text-4xl  { font-size: 2.8rem !important; }
      .text-5xl  { font-size: 3.5rem !important; }
    }
    @media (min-width: 1400px) {
      .text-sm   { font-size: 1.1rem !important; }
      .text-base { font-size: 1.2rem !important; }
      .text-lg   { font-size: 1.4rem !important; }
      .text-xl   { font-size: 1.6rem !important; }
      .text-2xl  { font-size: 2rem !important; }
      .text-3xl  { font-size: 2.5rem !important; }
      .text-4xl  { font-size: 3rem !important; }
      .text-5xl  { font-size: 3.8rem !important; }
    }

    /* === 結算特效文字 === */
    .scoring-text { font-family: 'Zen Maru Gothic', sans-serif; paint-order: stroke fill; line-height: 1.2; }
    .score-identical { background: linear-gradient(180deg, #a5f3fc 0%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #164e63; filter: drop-shadow(0px 0px 8px rgba(6,182,212,0.9)); }
    .score-num-identical { color: #22d3ee; -webkit-text-stroke: 1px #164e63; }
    .score-complementary { background: linear-gradient(180deg, #fef08a 0%, #eab308 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #713f12; filter: drop-shadow(0px 0px 8px rgba(234,179,8,0.9)); }
    .score-num-complementary { color: #facc15; -webkit-text-stroke: 1px #713f12; }
    .score-sequence { background: linear-gradient(180deg, #f5d0fe 0%, #d946ef 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #4a044e; filter: drop-shadow(0px 0px 8px rgba(217,70,239,0.9)); }
    .score-teambonus { background: linear-gradient(180deg, #fed7aa 0%, #ea580c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #7c2d12; filter: drop-shadow(0px 0px 8px rgba(234,88,12,0.9)); }
    .score-num-sequence { color: #e879f9; -webkit-text-stroke: 1px #4a044e; }
    .score-num-teambonus { color: #fb923c; -webkit-text-stroke: 1px #7c2d12; }

    @keyframes score-pulse { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.15); filter: brightness(1.3); box-shadow: 0 0 40px rgba(254,240,138,1); } 100% { transform: scale(1); filter: brightness(1); } }
    .animate-score-pulse { animation: score-pulse 1.5s ease-in-out forwards; }
    @keyframes float-score { 0% { opacity: 0; transform: translateY(30px) scale(0.5); } 15%, 85% { opacity: 1; transform: translateY(0) scale(1.1); } 100% { opacity: 0; transform: translateY(-30px) scale(0.8); } }
    .animate-float-score { animation: float-score 1.5s ease-in-out forwards; }
    @keyframes ai-think { 0%, 100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
    .animate-ai-think { animation: ai-think 1s infinite ease-in-out; }
    
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.5); border-radius: 4px; }
    
    .keyboard-btn { transition: all 0.1s; border-bottom-width: 4px; }
    .keyboard-btn:active:not(:disabled) { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
    
    /* === 全螢幕縮放支援 === */
    @media (max-width: 360px) {
      html { font-size: 13px; }
      /* card-scale-factor removed */
    }
    @media (max-width: 300px) {
      html { font-size: 11px; }
    }
    /* small landscape handled above */
    
    /* 玩家名稱放大 */
    .player-name-text {
      font-size: clamp(11px, 2.2vmin, 16px) !important;
      font-weight: 900 !important;
      letter-spacing: 0.02em;
    }
    .player-score-text {
      font-size: clamp(14px, 2.8vmin, 20px) !important;
      font-weight: 900 !important;
    }

    /* === 大廳背景：淡化月相裝飾 === */
    @keyframes moon-bg-float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-16px) rotate(4deg); } }
    .bg-moon-deco { position: absolute; animation: moon-bg-float ease-in-out infinite; will-change: transform; }
  </style>

    // --- Enhanced Audio Manager ---
    class AudioManager {
      constructor() { 
        this.ctx = null; this.masterNode = null; this.bgmGain = null; this.sfxGain = null;
        this.bgmVolume = 0.5; this.sfxVolume = 0.8; this.bgmPlaying = false; this.bgmTimer = null;
        this.bgmAudio = null; this.bgmMode = ''; this.currentSrc = '';
      }
      // 音樂對應：
      // challenge（單人闖關）→ bgm_challenge.mp3
      // battle（派對/線上）  → bgm_battle.mp3
      // lobby（大廳/選單）  → bgm_lobby.mp3
      _srcForMode(mode) {
        if (mode === 'challenge') return 'bgm_challenge.mp3';
        if (mode === 'battle')    return 'bgm_battle.mp3';
        return 'bgm_lobby.mp3';
      }
      startModeBGM(mode) {
        const src = this._srcForMode(mode);
        if (!this.bgmAudio) {
          this.bgmAudio = new Audio();
          this.bgmAudio.loop = true;
        }
        // 只有在換曲目時才重新載入，避免重複重置
        if (this.currentSrc !== src) {
          this.bgmAudio.pause();
          this.bgmAudio.src = src;
          this.bgmAudio.currentTime = 0;
          this.currentSrc = src;
        }
        this.bgmAudio.loop = true;
        this.bgmAudio.volume = this.bgmVolume;
        this.bgmMode = mode;
        this.bgmPlaying = true;
        this.bgmAudio.play().catch(e => console.warn('BGM play failed:', e));
      }
      startLobbyBGM() { this.startModeBGM('lobby'); }
      startGameOverBGM() {
        if (!this.bgmAudio) { this.bgmAudio = new Audio(); }
        const src = 'bgm_gameover.mp3';
        if (this.currentSrc !== src) {
          this.bgmAudio.src = src;
          this.currentSrc = src;
        }
        this.bgmAudio.loop = false;
        this.bgmAudio.volume = this.bgmVolume;
        this.bgmMode = 'gameover';
        this.bgmPlaying = true;
        this.bgmAudio.play().catch(e => console.warn('BGM play failed:', e));
      }
      init() { 
        if (this.ctx) {
          if (this.ctx.state === 'suspended') this.ctx.resume();
        } else {
          const AudioContext = window.AudioContext || window.webkitAudioContext; 
          if (!AudioContext) return;
          this.ctx = new AudioContext(); 
          this.sfxGain = this.ctx.createGain(); this.sfxGain.gain.value = this.sfxVolume; this.sfxGain.connect(this.ctx.destination);
          this.bgmGain = this.ctx.createGain(); this.bgmGain.gain.value = this.bgmVolume; this.bgmGain.connect(this.ctx.destination);
        }
        // 首次 init（使用者互動後）才開始播大廳音樂
        if (!this.bgmPlaying) this.startLobbyBGM();
      }
      setBgmVolume(val) { this.bgmVolume = val; if (this.bgmGain && this.ctx) this.bgmGain.gain.setTargetAtTime(val, this.ctx.currentTime, 0.1); if (this.bgmAudio) this.bgmAudio.volume = val; }
      setSfxVolume(val) { this.sfxVolume = val; if (this.sfxGain && this.ctx) this.sfxGain.gain.setTargetAtTime(val, this.ctx.currentTime, 0.1); }
      
      playTone(freq, type, duration, vol = 1, slideTo = null) { 
        if (!this.ctx || this.sfxVolume === 0) return; 
        const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); 
        osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime); 
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, this.ctx.currentTime + duration); 
        gain.gain.setValueAtTime(0, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(vol, this.ctx.currentTime + 0.05); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration); 
        osc.connect(gain); gain.connect(this.sfxGain); osc.start(); osc.stop(this.ctx.currentTime + duration); 
      }
      playPlaceCard() { this.playTone(150, 'sine', 0.15, 0.6, 50); }
      playIdentical() { this.playTone(523.25, 'sine', 0.4, 0.4); setTimeout(() => this.playTone(659.25, 'sine', 0.6, 0.4), 100); }
      playComplementary() { this.playTone(440, 'triangle', 0.3, 0.4); setTimeout(() => this.playTone(659.25, 'triangle', 0.4, 0.4), 150); setTimeout(() => this.playTone(880, 'triangle', 0.8, 0.4), 300); }
      playSequence() { [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => setTimeout(() => this.playTone(freq, 'sine', 0.6, 0.3), i * 150)); }
      playWin() { [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => setTimeout(() => this.playTone(freq, 'square', 0.5, 0.2), i * 200)); setTimeout(() => this.playTone(1046.50, 'square', 1.5, 0.2), 800); }
      playLose() { [349.23, 329.63, 293.66, 261.63].forEach((freq, i) => setTimeout(() => this.playTone(freq, 'sawtooth', 0.5, 0.3), i * 300)); }
      
      stopBGM() {
        this.bgmPlaying = false;
        if(this.bgmAudio) { this.bgmAudio.pause(); this.bgmAudio.currentTime = 0; }
        if(this.bgmTimer) clearTimeout(this.bgmTimer);
      }
    }
    // === 聊天室元件 ===
    const CHANNEL_COLORS = { world: '#818cf8', battle: '#fbbf24', team: '#34d399' };
    const ChatPanel = ({ open, messages, inputVal, setInput, onSend, onToggle, unread, chatBoxRef, t, lang, channel, setChannel, canBattle, canTeam, quickMessages, onQuickSend, divider }) => {
      const [quickOpen, setQuickOpen] = useState(false);
      const [quickTab, setQuickTab] = useState('msg'); // msg | emoji | moon | dir
      // 未讀分隔線／捲動控制：
      // - followBottom：true 代表目前應該「跟隨」最新訊息（有新訊息就自動捲到底）；
      //   打開面板時若有未讀，先設為 false（停在分隔線位置，不要被新訊息硬拉到底），使用者捲到底或按下↓按鈕後才恢復 true。
      // - pendingScroll：面板剛開啟／切換分頁時，訊息可能還沒非同步載入完成，用這個 ref 記住「還沒完成這次該做的捲動」，
      //   等訊息實際渲染出來後才真正執行一次，執行完就清掉，之後新訊息進來就不會再被這個初始捲動邏輯影響。
      const [followBottom, setFollowBottom] = useState(true);
      const dividerElRef = useRef(null);
      const pendingScrollRef = useRef(null); // 'bottom' | 'divider' | null
      const showDivider = !!(divider && divider.channel === channel);
      const dividerIndex = showDivider ? messages.findIndex(m => !m.isLocalRule && m.time > divider.beforeTs && m.uid !== window._currentUid) : -1;
      const dividerActive = showDivider && dividerIndex !== -1;

      // 拖曳移動：null 代表使用預設 CSS 位置（右下角），一旦拖曳過則改用 left/top 絕對定位
      // 按鈕（收合狀態）與面板（展開狀態）各自記住自己的拖曳位置，避免兩者互相干擾
      const [btnDragPos, setBtnDragPos] = useState(null); // { left, top }
      const [dragPos, setDragPos] = useState(null); // { left, top }（面板用）
      const panelRef = useRef(null);
      const btnRef = useRef(null);
      const dragInfo = useRef({ dragging: false, target: 'panel', startX: 0, startY: 0, origLeft: 0, origTop: 0, moved: false });

      const clamp = (val, min, max) => Math.min(Math.max(val, min), max);

      const handlePointerMove = useCallback((e) => {
        if (!dragInfo.current.dragging) return;
        const dx = e.clientX - dragInfo.current.startX;
        const dy = e.clientY - dragInfo.current.startY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragInfo.current.moved = true;
        const isBtn = dragInfo.current.target === 'btn';
        const el = isBtn ? btnRef.current : panelRef.current;
        const w = el ? el.offsetWidth : (isBtn ? 48 : 300);
        const h = el ? el.offsetHeight : (isBtn ? 48 : 400);
        const newLeft = clamp(dragInfo.current.origLeft + dx, 4, window.innerWidth - w - 4);
        const newTop = clamp(dragInfo.current.origTop + dy, 4, window.innerHeight - h - 4);
        if (isBtn) setBtnDragPos({ left: newLeft, top: newTop }); else setDragPos({ left: newLeft, top: newTop });
      }, []);

      const handlePointerUp = useCallback(() => {
        dragInfo.current.dragging = false;
        window.removeEventListener('pointermove', handlePointerMove);
        window.removeEventListener('pointerup', handlePointerUp);
      }, [handlePointerMove]);

      const handleDragStart = useCallback((e) => {
        const panel = panelRef.current;
        if (!panel) return;
        const rect = panel.getBoundingClientRect();
        dragInfo.current = { dragging: true, target: 'panel', startX: e.clientX, startY: e.clientY, origLeft: rect.left, origTop: rect.top, moved: false };
        window.addEventListener('pointermove', handlePointerMove);
        window.addEventListener('pointerup', handlePointerUp);
      }, [handlePointerMove, handlePointerUp]);

      // 收合狀態下的圓形按鈕也可直接拖曳；放開時若幾乎沒有移動，視為一般點擊，照常觸發開關
      const handleBtnDragStart = useCallback((e) => {
        const btn = btnRef.current;
        if (!btn) return;
        const rect = btn.getBoundingClientRect();
        dragInfo.current = { dragging: true, target: 'btn', startX: e.clientX, startY: e.clientY, origLeft: rect.left, origTop: rect.top, moved: false };
        window.addEventListener('pointermove', handlePointerMove);
        window.addEventListener('pointerup', handlePointerUp);
      }, [handlePointerMove, handlePointerUp]);

      const handleBtnClick = useCallback(() => {
        if (dragInfo.current.moved) { dragInfo.current.moved = false; return; } // 剛拖曳完，這次點擊不算數
        onToggle();
      }, [onToggle]);

      // 視窗縮放時，確保面板／按鈕仍在可視範圍內
      useEffect(() => {
        const handleResize = () => {
          if (dragPos) {
            const panel = panelRef.current; const w = panel ? panel.offsetWidth : 300; const h = panel ? panel.offsetHeight : 400;
            setDragPos(prev => prev ? { left: clamp(prev.left, 4, window.innerWidth - w - 4), top: clamp(prev.top, 4, window.innerHeight - h - 4) } : prev);
          }
          if (btnDragPos) {
            const btn = btnRef.current; const w = btn ? btn.offsetWidth : 48; const h = btn ? btn.offsetHeight : 48;
            setBtnDragPos(prev => prev ? { left: clamp(prev.left, 4, window.innerWidth - w - 4), top: clamp(prev.top, 4, window.innerHeight - h - 4) } : prev);
          }
        };
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, [dragPos, btnDragPos]);

      // 若使用者先拖過收合按鈕、才第一次展開面板，讓面板直接出現在按鈕附近，而不是跳回預設角落
      useEffect(() => {
        if (open && dragPos === null && btnDragPos !== null) {
          const w = 300, h = 400;
          const left = clamp(btnDragPos.left - (w - 48), 4, window.innerWidth - w - 4);
          const top = clamp(btnDragPos.top - h - 8, 4, window.innerHeight - h - 4);
          setDragPos({ left, top });
        }
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [open]);

      // 面板開啟、切換分頁、或未讀分隔線內容改變時，決定這次該捲到哪裡：有未讀就捲到分隔線位置並暫停跟隨；沒有就捲到底部並跟隨。
      useEffect(() => {
        if (!open) return;
        pendingScrollRef.current = dividerActive ? 'divider' : 'bottom';
        setFollowBottom(!dividerActive);
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [open, channel, divider]);

      // 訊息是非同步載入的，剛開啟時列表可能還是空的；這裡持續嘗試，直到目標元素真的出現才執行一次捲動，執行後即清除，
      // 之後同一次開啟期間新進的訊息就不會再被這段初始捲動邏輯影響（改由下面的「跟隨捲動」effect 處理）。
      useEffect(() => {
        if (!pendingScrollRef.current) return;
        const action = pendingScrollRef.current;
        const id = setTimeout(() => {
          if (action === 'divider' && dividerElRef.current) {
            dividerElRef.current.scrollIntoView({ block: 'start' });
            pendingScrollRef.current = null;
          } else if (action === 'bottom' && chatBoxRef.current) {
            chatBoxRef.current.scrollTop = chatBoxRef.current.scrollHeight;
            pendingScrollRef.current = null;
          }
        }, 60);
        return () => clearTimeout(id);
      }, [messages, dividerActive]);

      // 已經跟上最新訊息時（沒有分隔線暫停、且使用者目前停留在底部），持續把新訊息捲到畫面下方，維持原本「即時聊天」的體感
      useEffect(() => {
        if (pendingScrollRef.current) return;
        if (followBottom && chatBoxRef.current) {
          chatBoxRef.current.scrollTop = chatBoxRef.current.scrollHeight;
        }
      }, [messages]);

      // 監測使用者手動捲動：只要捲到接近底部，視為「已跟上」，恢復自動跟隨並讓↓按鈕消失
      const handleScroll = useCallback(() => {
        const el = chatBoxRef.current;
        if (!el) return;
        const nearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 32;
        setFollowBottom(nearBottom);
      }, [chatBoxRef]);

      const jumpToBottom = useCallback(() => {
        pendingScrollRef.current = null;
        if (chatBoxRef.current) chatBoxRef.current.scrollTop = chatBoxRef.current.scrollHeight;
        setFollowBottom(true);
      }, [chatBoxRef]);


      const btnPositionStyle = btnDragPos
        ? { left: `${btnDragPos.left}px`, top: `${btnDragPos.top}px`, right: 'auto', bottom: 'auto' }
        : { bottom: '80px', right: '16px' };
      const panelPositionStyle = dragPos
        ? { left: `${dragPos.left}px`, top: `${dragPos.top}px`, right: 'auto', bottom: 'auto' }
        : { bottom: '140px', right: '16px' };

      return (
        <React.Fragment>
          {/* 聊天按鈕（可拖曳，收合狀態下也能移到不會擋到卡牌的位置） */}
          <button
            ref={btnRef}
            onPointerDown={handleBtnDragStart}
            onClick={handleBtnClick}
            style={{ position: 'fixed', ...btnPositionStyle, zIndex: 9000, width: '48px', height: '48px', borderRadius: '50%', background: 'rgba(15,23,42,0.85)', border: '2px solid rgba(99,102,241,0.5)', color: '#a5b4fc', fontSize: '1.4rem', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'grab', backdropFilter: 'blur(8px)', boxShadow: '0 4px 20px rgba(0,0,0,0.5)', transition: 'background 0.2s', touchAction: 'none' }}>
            💬
            {unread > 0 && <span style={{ position: 'absolute', top: '-4px', right: '-4px', background: '#e74c3c', color: '#fff', borderRadius: '50%', padding: '1px 5px', fontSize: '0.65rem', fontWeight: 'bold', border: '1px solid #fff', minWidth: '18px', textAlign: 'center' }}>{unread > 9 ? '9+' : unread}</span>}
          </button>
          {/* 聊天面板 */}
          {open && (
            <div ref={panelRef} style={{ position: 'fixed', ...panelPositionStyle, width: '300px', maxWidth: '90vw', height: '400px', maxHeight: 'calc(100dvh - 160px)', background: 'rgba(15,23,42,0.96)', border: '1.5px solid rgba(99,102,241,0.4)', borderRadius: '16px', zIndex: 9001, display: 'flex', flexDirection: 'column', overflow: 'hidden', boxShadow: '0 10px 40px rgba(0,0,0,0.8)', backdropFilter: 'blur(12px)' }}>
              {/* 標題（可拖曳） */}
              <div
                onPointerDown={handleDragStart}
                style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px 14px', borderBottom: '1px solid rgba(99,102,241,0.3)', background: 'rgba(30,27,75,0.7)', cursor: 'grab', userSelect: 'none', touchAction: 'none' }}
              >
                <span style={{ fontWeight: 'bold', color: '#a5b4fc', fontSize: '0.9rem', display: 'flex', alignItems: 'center', gap: '6px' }}><span style={{ letterSpacing: '-2px', color: '#64748b', fontSize: '0.9rem' }}>⠿</span>💬 {lang === 'zh' ? '聊天室' : lang === 'ja' ? 'チャット' : 'Chat'}</span>
                <button onClick={onToggle} onPointerDown={e => e.stopPropagation()} style={{ background: 'none', border: 'none', color: '#64748b', fontSize: '1.1rem', cursor: 'pointer', padding: '2px 6px', borderRadius: '4px' }}>✕</button>
              </div>
              {/* 頻道分頁：世界（所有人）／戰鬥（同房間）／組隊（同隊伍） */}
              <div style={{ display: 'flex', borderBottom: '1px solid rgba(99,102,241,0.25)', background: 'rgba(15,23,42,0.5)' }}>
                {['world', 'battle', 'team'].map(ch => {
                  const disabled = (ch === 'battle' && !canBattle) || (ch === 'team' && !canTeam);
                  const label = ch === 'world' ? t.chanWorld : ch === 'battle' ? t.chanBattle : t.chanTeam;
                  const color = CHANNEL_COLORS[ch];
                  const active = channel === ch && !disabled;
                  return (
                    <button key={ch} disabled={disabled} onClick={() => setChannel(ch)}
                      title={disabled ? (ch === 'battle' ? t.chanBattleLocked : t.chanTeamLocked) : undefined}
                      style={{ flex: 1, padding: '6px 4px', fontSize: '0.72rem', fontWeight: 'bold', border: 'none', borderBottom: active ? `2px solid ${color}` : '2px solid transparent', background: active ? 'rgba(255,255,255,0.06)' : 'transparent', color: disabled ? '#3f4a5f' : (active ? color : '#94a3b8'), cursor: disabled ? 'not-allowed' : 'pointer', transition: 'all 0.15s' }}>
                      {label}
                    </button>
                  );
                })}
              </div>
              {/* 訊息列表 */}
              <div style={{ flex: 1, position: 'relative', minHeight: 0 }}>
                <div ref={chatBoxRef} onScroll={handleScroll} style={{ position: 'absolute', inset: 0, padding: '10px 12px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '6px', scrollBehavior: 'smooth' }} className="custom-scroll">
                  {messages.length === 0 && <div style={{ textAlign: 'center', color: '#475569', fontSize: '0.8rem', marginTop: '20px' }}>{lang === 'zh' ? '尚無訊息，來打個招呼吧！' : lang === 'ja' ? 'メッセージがありません' : 'No messages yet. Say hi!'}</div>}
                  {messages.map((m, i) => {
                    const dividerHere = dividerActive && i === dividerIndex;
                    if (m.isLocalRule) return (
                      <React.Fragment key={m.id || i}>
                        {dividerHere && <div ref={dividerElRef} style={{ display: 'flex', alignItems: 'center', gap: '8px', margin: '4px 0' }}><div style={{ flex: 1, height: '1px', background: 'rgba(248,113,113,0.4)' }} /><span style={{ fontSize: '0.68rem', color: '#f87171', fontWeight: 'bold', whiteSpace: 'nowrap' }}>{lang === 'zh' ? '以下為未讀訊息' : lang === 'ja' ? '以下は未読メッセージ' : 'Unread messages below'}</span><div style={{ flex: 1, height: '1px', background: 'rgba(248,113,113,0.4)' }} /></div>}
                        <div style={{ textAlign: 'center', marginBottom: '4px' }}>
                          <span style={{ fontSize: '0.75rem', color: '#fff', background: 'rgba(231,76,60,0.8)', padding: '4px 10px', borderRadius: '8px', display: 'inline-block', lineHeight: '1.4', border: '1px solid #c0392b' }}>🛡️ {m.text}</span>
                        </div>
                      </React.Fragment>
                    );
                    const isMe = m.isSystem === undefined && m.uid && m.uid === window._currentUid;
                    const timeStr = new Date(m.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const accentColor = CHANNEL_COLORS[m.channel || 'world'];
                    return (
                      <React.Fragment key={m.id || i}>
                        {dividerHere && <div ref={dividerElRef} style={{ display: 'flex', alignItems: 'center', gap: '8px', margin: '4px 0' }}><div style={{ flex: 1, height: '1px', background: 'rgba(248,113,113,0.4)' }} /><span style={{ fontSize: '0.68rem', color: '#f87171', fontWeight: 'bold', whiteSpace: 'nowrap' }}>{lang === 'zh' ? '以下為未讀訊息' : lang === 'ja' ? '以下は未読メッセージ' : 'Unread messages below'}</span><div style={{ flex: 1, height: '1px', background: 'rgba(248,113,113,0.4)' }} /></div>}
                        <div style={{ textAlign: isMe ? 'right' : 'left' }}>
                          <span style={{ fontSize: '0.65rem', color: '#64748b' }}>{timeStr}</span> <span style={{ fontWeight: 'bold', color: isMe ? '#67e8f9' : '#fbbf24', fontSize: '0.75rem' }}>{m.name || '?'}</span>
                          <div style={{ display: 'inline-block', background: isMe ? '#1e3a5f' : '#1e293b', padding: '6px 10px', borderRadius: '8px', fontSize: '0.85rem', maxWidth: '85%', wordWrap: 'break-word', textAlign: 'left', marginTop: '2px', borderLeft: `3px solid ${accentColor}`, border: isMe ? '1px solid rgba(103,232,249,0.2)' : '1px solid rgba(99,102,241,0.2)', borderLeftWidth: '3px', borderLeftColor: accentColor, display: 'block', marginLeft: isMe ? 'auto' : '0', marginRight: isMe ? '0' : 'auto' }}>{m.text}</div>
                        </div>
                      </React.Fragment>
                    );
                  })}
                </div>
                {/* 捲到最新訊息：不在底部（或正暫停在未讀分隔線）時顯示，點擊直接跳到聊天室最下方 */}
                {!followBottom && (
                  <button onClick={jumpToBottom} title={lang === 'zh' ? '跳到最新訊息' : lang === 'ja' ? '最新のメッセージへ' : 'Jump to latest'} style={{ position: 'absolute', right: '10px', bottom: '10px', width: '32px', height: '32px', borderRadius: '50%', background: '#4f46e5', color: '#fff', border: '1px solid rgba(255,255,255,0.3)', boxShadow: '0 2px 10px rgba(0,0,0,0.5)', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.95rem', zIndex: 2 }}>
                    ↓
                  </button>
                )}
              </div>
              {/* 快捷面板：訊息／表情／月相／方向，點擊即直接送出 */}
              {quickOpen && (
                <div style={{ borderTop: '1px solid rgba(99,102,241,0.25)', background: 'rgba(10,15,30,0.9)', padding: '6px 8px' }}>
                  <div style={{ display: 'flex', gap: '4px', marginBottom: '6px' }}>
                    {[['msg','💬'],['emoji','😊'],['moon','🌙'],['dir','🧭']].map(([k, ic]) => (
                      <button key={k} onClick={() => setQuickTab(k)} style={{ flex: 1, padding: '4px', borderRadius: '6px', border: 'none', background: quickTab === k ? 'rgba(99,102,241,0.35)' : 'rgba(255,255,255,0.05)', fontSize: '0.9rem', cursor: 'pointer' }}>{ic}</button>
                    ))}
                  </div>
                  {quickTab === 'msg' && (
                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '5px', maxHeight: '110px', overflowY: 'auto' }} className="custom-scroll">
                      {quickMessages.map((q, i) => (
                        <button key={i} onClick={() => onQuickSend(q)} style={{ fontSize: '0.72rem', padding: '5px 9px', borderRadius: '999px', background: '#1e293b', border: '1px solid rgba(99,102,241,0.35)', color: '#cbd5e1', cursor: 'pointer', whiteSpace: 'nowrap' }}>{q}</button>
                      ))}
                    </div>
                  )}
                  {/* 表情／月相／方向：點擊後只插入輸入框（不直接送出），需按下方「發送」才會整串送出；快捷訊息(msg分頁)則維持點擊即直接送出 */}
                  {quickTab === 'emoji' && (
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(8, 1fr)', gap: '4px' }}>
                      {QUICK_EMOJIS.map((e, i) => <button key={i} onClick={() => setInput(prev => (prev + e).slice(0, 60))} style={{ fontSize: '1.2rem', padding: '4px 0', borderRadius: '6px', border: 'none', background: 'rgba(255,255,255,0.05)', cursor: 'pointer' }}>{e}</button>)}
                    </div>
                  )}
                  {quickTab === 'moon' && (
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(8, 1fr)', gap: '4px' }}>
                      {QUICK_MOONS.map((e, i) => <button key={i} onClick={() => setInput(prev => (prev + e).slice(0, 60))} style={{ fontSize: '1.2rem', padding: '4px 0', borderRadius: '6px', border: 'none', background: 'rgba(255,255,255,0.05)', cursor: 'pointer' }}>{e}</button>)}
                    </div>
                  )}
                  {quickTab === 'dir' && (
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(8, 1fr)', gap: '4px' }}>
                      {QUICK_DIRECTIONS.map((e, i) => <button key={i} onClick={() => setInput(prev => (prev + e).slice(0, 60))} style={{ fontSize: '1.2rem', padding: '4px 0', borderRadius: '6px', border: 'none', background: 'rgba(255,255,255,0.05)', cursor: 'pointer' }}>{e}</button>)}
                    </div>
                  )}
                </div>
              )}
              {/* 輸入欄 */}
              <div style={{ display: 'flex', padding: '8px 10px', background: 'rgba(15,20,40,0.8)', borderTop: '1px solid rgba(99,102,241,0.2)', gap: '6px' }}>

      useEffect(() => {
        // 注意：這裡刻意不把 gameState.mode 放進依賴陣列。
        // lobby_wait -> online 只是「同一個房間」內的狀態切換，監聽器應該持續存活；
        // 如果把 mode 放進依賴，每次開始遊戲都會把舊監聽器關掉、重新訂閱一個全新的 onSnapshot，
        // 而全新的監聽器第一次回呼幾乎一定是 fromCache:true，畫面就會在「準備開始遊戲」的瞬間
        // 卡進「連線不穩」的阻擋畫面，運氣不好時甚至久久等不到伺服器確認、看起來像卡死。
        if (!roomId || !user || !db) return;
        const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId);
        const unsubscribe = onSnapshot(roomRef, (snap) => {
          // metadata.fromCache 為 true 代表這筆資料是本地快取而非伺服器最新狀態（通常發生在斷線／網路不穩時），
          // 此時畫面上的棋盤可能與其他玩家不同步，必須顯示提醒並暫停操作。
          setIsSyncing(!!(snap.metadata && snap.metadata.fromCache));
          if (!snap.exists()) return; const data = snap.data();
          setOnlineRoomData(data);
          if (data.seats) { const pid = getPidForKey(data.seats, mySessionKey); if (pid) setMyPlayerId(pid); } // 房主換位後，同步自己目前的出牌順序
          if (data.status === 'playing') {
            audioManager.startModeBGM('battle'); // 非房主的客戶端原本沒有任何地方會切換音樂，導致進入對戰後仍持續播放大廳音樂
            setGameState(prev => {
              if (prev.mode !== 'online' && prev.mode !== 'lobby_wait') return prev; // 已經離開線上房間，不要再套用房間更新
              if (prev.mode !== 'online' || (data.round && data.round !== prev.round)) {
                lastProcessedMoveTs.current = 0; 
                setRemoteMoveQueue([]); // 新局開始，清空上一局殘留、尚未套用的舊落子佇列
                return { ...prev, mode: 'online', boardType: data.initialState.boardType, ...data.initialState, turn: 1, finalBaseScores: null, isAnimating: false, gameOver: false, tallyState: 'none', selectedCardIdx: null, scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null, round: data.round || 1 };
              }
              return prev;
            });
            // 只負責「排隊」：同一個 ts 只排一次，實際套用交給下面專門的 effect（依序、且只在沒有動畫時套用），
            // 這樣就算本機這一刻正忙著跑上一步的計分動畫，這一步也不會被跳過、遺失。
            if (data.lastMove && data.lastMove.player !== myPlayerId && data.lastMove.ts > lastProcessedMoveTs.current) {
              lastProcessedMoveTs.current = data.lastMove.ts;
              setRemoteMoveQueue(q => [...q, data.lastMove]);
            }
          }
        }, (err) => { console.error('Room sync error', err); setIsSyncing(true); });
        return () => unsubscribe();
      }, [roomId, user, myPlayerId]);

      const fetchLeaderboard = async () => {
        if (!user || !db) return; setIsLoadingLb(true);
        try {
          const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'moonphase_leaderboard'));
          let data = []; snap.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
          data.sort((a, b) => { if (b.level !== a.level) return b.level - a.level; return b.totalScore - a.totalScore; });
          
          data.forEach((entry, index) => {
            if (index > 0 && entry.level === data[index - 1].level && entry.totalScore === data[index - 1].totalScore) {
              entry.rank = data[index - 1].rank;
            } else {
              entry.rank = index + 1;
            }
          });

          setLeaderboard(data.slice(0, 50));
        } catch(e) { console.error(e); } setIsLoadingLb(false);
      };
      useEffect(() => { if (gameState.mode === 'leaderboard') fetchLeaderboard(); }, [gameState.mode]);

      const getActualBoardId = (playerCount) => {
        const pool = getBoardPool(playerCount);
        if (boardTypePref !== 'random' && pool[boardTypePref]) return boardTypePref;
        const choices = Object.keys(pool); return choices[Math.floor(Math.random() * choices.length)];
      };

      const getChallengeBoardId = (level) => {
        const boardIndex = Math.floor((level - 1) / 5);
        return CHALLENGE_BOARDS_ORDERED[Math.min(boardIndex, 19)];
      };
      
      const getChallengeAiDifficulty = (level) => {
        const cycle = (level - 1) % 5;
        if (cycle <= 1) return 'low'; if (cycle <= 3) return 'medium'; return 'high';
      };

      const generateInitData = (mode, totalPlayers, humanCount, boardId, teamMode = false, teams = null, slotTypes = null) => {
        const boardConfig = ALL_BOARDS[boardId] || ALL_BOARDS['classic'];
        const genDeck = () => { let d = []; for(let i=0; i<3; i++) d.push(0,1,2,3,4,5,6,7); return d.sort(()=>Math.random()-0.5); };
        let decks = {}, hands = {}, scores = {}, playersInfo = {};
        for (let i = 1; i <= totalPlayers; i++) {
          let d = genDeck(); decks[i] = d.slice(3); hands[i] = d.slice(0,3); scores[i] = 0;
          if (mode === 'challenge') { playersInfo[i] = { type: i === 1 ? 'human' : 'ai', difficulty: getChallengeAiDifficulty(1) }; }
          else if (mode === 'local') { const type = slotTypes ? (slotTypes[i] || 'ai') : (i <= humanCount ? 'human' : 'ai'); playersInfo[i] = { type, difficulty: aiDifficulty }; }
        }
        return { boardType: boardId, board: Array(boardConfig.nodes.length).fill(null), totalPlayers, playersInfo, hands, decks, scores, teamMode: !!teamMode, teams: teamMode ? teams : null };
      };

      const initGame = (mode) => {
        audioManager.init();

        if (mode === 'challenge') audioManager.startModeBGM('challenge');

        let teamMode = false; let teams = null;
        if (mode === 'challenge') { totalP = 2; humanC = 1; }
        else if (mode === 'local' && localTeamMode) { totalP = 4; teamMode = true; teams = localTeams; }
        let bId = mode === 'challenge' ? getChallengeBoardId(1) : getActualBoardId(totalP);
        const initData = generateInitData(mode, totalP, humanC, bId, teamMode, teams, (mode === 'local' && localTeamMode) ? localSlotTypes : null);
        setAiThinkingPlayer(null);
        setUploadStatus('idle');
        setGameState(prev => ({ ...prev, mode, ...initData, turn: 1, finalBaseScores: null, isAnimating: false, gameOver: false, tallyState: 'none', selectedCardIdx: null, scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null, challengeData: newChallengeData }));
      };

      const nextChallengeLevel = () => {
        const nextLevel = gameState.challengeData.currentLevel + 1; const accScore = gameState.challengeData.totalScore + gameState.scores[1];
        if (nextLevel > 100) {

        const nextBId = getChallengeBoardId(nextLevel);
        const initData = generateInitData('challenge', 2, 1, nextBId);
        initData.playersInfo[2].difficulty = getChallengeAiDifficulty(nextLevel);
        setAiThinkingPlayer(null);
        setGameState(prev => ({ ...prev, ...initData, turn: 1, finalBaseScores: null, isAnimating: false, gameOver: false, tallyState: 'none', challengeData: { currentLevel: nextLevel, totalScore: accScore } }));
      };

      const submitChallengeScore = async () => {
        if (uploadStatus === 'uploading' || uploadStatus === 'success') return;
        if (typeof db === 'undefined' || !db) {
          console.error("【上傳失敗】找不到 Firestore (db) 連線物件！");
          setUploadStatus('error');
          return;
        }
        setUploadStatus('uploading');
        try { 
          const safeUid = (typeof user !== 'undefined' && user && user.uid) ? user.uid : 'anonymous_' + Math.floor(Math.random() * 100000);
          const safeAppId = (typeof appId !== 'undefined' && appId) ? appId : 'moonphase-app';
          // 名稱直接沿用設定中的暱稱，不再另外詢問；若尚未設定暱稱則以 GUEST 代替
          const submitName = (nickname.trim() || 'GUEST').toUpperCase().slice(0, 10);
          
          const docRef = await addDoc(collection(db, 'artifacts', safeAppId, 'public', 'data', 'moonphase_leaderboard'), { 
            name: submitName, 
            level: gameState.challengeData.currentLevel || 1, 
            totalScore: gameState.challengeData.totalScore || 0, 
            uid: safeUid, 
            ts: Date.now() 
          }); 
          
          console.log("【上傳成功】資料庫文件 ID:", docRef.id);
          setUploadStatus('success');
          
          setTimeout(() => {
            setUploadStatus('restart');
          }, 2000);
          
        } catch(e) { 
          console.error("【上傳失敗詳細原因】:", e.message || e); 
          setUploadStatus('error');
        }
      };

      const handleScoreCardAction = () => {
        if (uploadStatus === 'restart') {
           setUploadStatus('idle');
           initGame('challenge');
        } else {
           submitChallengeScore();
        }
      };

      const createRoom = async () => {
        if (!user || !db) return alert("Firebase Offline");
        const newRoomId = Math.floor(1000 + Math.random() * 9000).toString();
        const maxP = onlineTeamMode ? 4 : onlineMaxPlayers;
        try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', newRoomId), { status: 'waiting', createdAt: Date.now(), host: mySessionKey, maxPlayers: maxP, boardPref: onlineBoardPref, teamMode: onlineTeamMode, teams: onlineTeamMode ? { 1: 'A', 2: 'B', 3: 'A', 4: 'B' } : null, aiDifficulty: onlineAiDifficulty, seats: { 1: mySessionKey, 2: null, 3: null, 4: null }, players: { [mySessionKey]: { ready: true, uid: user.uid } }, round: 1 }); setRoomId(newRoomId); setMyPlayerId(1); setGameState(prev => ({ ...prev, mode: 'lobby_wait' })); } catch (e) { console.error(e); }
      };

      // 依 seats（pId -> session key）反查某個 key 目前坐在哪個 pId；找不到回傳 null
      const getPidForKey = (seats, key) => {
        if (!seats || !key) return null;
        const found = Object.entries(seats).find(([, k]) => k === key);
        return found ? parseInt(found[0], 10) : null;
      };

      const joinRoom = async (code) => {
        if (!user || !code || !db) return;
        try {
          const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', code);
          // 用交易（transaction）讀取＋寫入，避免兩個人幾乎同時按下加入時，
          // 各自根據「加入前」讀到的舊座位表算出同一個空位（pId），
          // 導致兩個真人被分到同一個座位、之後每次輪到那個座位兩邊都會各自出牌，棋盤就對不起來。
          const newPid = await runTransaction(db, async (tx) => {
            const snap = await tx.get(roomRef);
            if (!snap.exists() || snap.data().status !== 'waiting') throw new Error('NOT_FOUND');
            const data = snap.data();
            const seats = data.seats || {};
            const occupied = Object.values(seats).filter(Boolean).length;
            if (occupied >= data.maxPlayers) throw new Error('ROOM_FULL');
            let pid = 2; while (seats[pid]) pid++;
            tx.update(roomRef, { [`players.${mySessionKey}`]: { ready: false, uid: user.uid }, [`seats.${pid}`]: mySessionKey });
            return pid;
          });
          setRoomId(code); setMyPlayerId(newPid); setGameState(prev => ({ ...prev, mode: 'lobby_wait' }));
        } catch (e) {
          if (e && e.message === 'ROOM_FULL') alert("Room Full");
          else if (e && e.message === 'NOT_FOUND') alert("Not Found");
          else console.error(e);
        }
      };

      const toggleReadyOnline = async () => {
        if (!roomId || !user || !db || !onlineRoomData) return;
        const isReady = onlineRoomData.players[mySessionKey].ready;
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId), { [`players.${mySessionKey}.ready`]: !isReady });
      };

      // 以下三個函式僅供房主在「連線大廳」（lobby_wait）使用：隨機分組／點隊伍顏色換隊／點 P 換出牌順序。
      // 邏輯與單機多人模式的 swapLocalTeam 相同：一律採「與另一位互換」的方式，確保永遠維持 2v2，不會出現 3v1。
      const randomizeOnlineTeams = async () => {
        if (!roomId || !user || !db || !onlineRoomData || onlineRoomData.host !== mySessionKey) return;
        const shuffled = [1, 2, 3, 4].sort(() => Math.random() - 0.5);
        const half = new Set(shuffled.slice(0, 2));
        const nt = {}; [1, 2, 3, 4].forEach(p => nt[p] = half.has(p) ? 'A' : 'B');
        try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId), { teams: nt }); } catch (e) { console.error(e); }
      };

      const swapOnlineTeam = async (pId) => {
        if (!roomId || !user || !db || !onlineRoomData || onlineRoomData.host !== mySessionKey) return;
        const teams = onlineRoomData.teams || { 1: 'A', 2: 'B', 3: 'A', 4: 'B' };
        const otherTeam = teams[pId] === 'A' ? 'B' : 'A';
        const partnerId = [1, 2, 3, 4].find(x => x !== pId && teams[x] === otherTeam);
        if (partnerId === undefined) return; // 保底：找不到可交換對象時不變動，維持 2v2
        try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId), { [`teams.${pId}`]: otherTeam, [`teams.${partnerId}`]: teams[pId] }); } catch (e) { console.error(e); }
      };

      // 房主在等待室內調整電腦難度；寫進房間層級的 aiDifficulty 欄位，讓所有人都能即時看到目前設定，
      // 開始遊戲時所有電腦座位都會套用這個難度。
      const setRoomAiDifficulty = async (diff) => {
        if (!roomId || !user || !db || !onlineRoomData || onlineRoomData.host !== mySessionKey) return;
        try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId), { aiDifficulty: diff }); } catch (e) { console.error(e); }
      };

      // 點擊某個 P 位：第一次點選記住該位，第二次點選另一個「有玩家」的 P 位，兩者互換出牌順序（互換 pId）
      const handleOrderSwapClick = async (pId) => {
        if (!roomId || !user || !db || !onlineRoomData || onlineRoomData.host !== mySessionKey) return;
        const seats = onlineRoomData.seats || {};
        const clickedKey = seats[pId] || null;
        if (orderSwapPid === null) {
          if (!clickedKey) return; // 第一次點選必須是「有人」的位置，才有東西可以移動
          setOrderSwapPid(pId);
          return;
        }
        if (orderSwapPid === pId) { setOrderSwapPid(null); return; } // 再點一次同一個位置：取消選取
        const sourceKey = seats[orderSwapPid] || null;
        setOrderSwapPid(null);
        if (!sourceKey) return;
        try {
          // 只寫房間層級的 seats 欄位（跟 teams 欄位性質一樣），完全不去碰任何玩家自己的 players.{key} 子欄位。
          // 之前是直接寫 players.{對方的key}.pId，如果資安規則限制「玩家只能寫自己那一筆資料」，
          // 房主想搬動別人的座位就會被擋下來——這正是「只有沒人的位置能換，換到真人那格就沒反應」的原因。
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId), {
            [`seats.${pId}`]: sourceKey,
            [`seats.${orderSwapPid}`]: clickedKey, // clickedKey 為 null 也沒關係，代表原本是空位
          });
        } catch (e) { console.error(e); }
      };

      const startOnlineGame = async () => {
        if (!roomId || !user || !db || !onlineRoomData) return;
        audioManager.startModeBGM('battle');
        const seats = onlineRoomData.seats || {};
        const humanCount = Object.values(seats).filter(Boolean).length; const totalP = onlineRoomData.maxPlayers;
        const teamMode = !!onlineRoomData.teamMode;
        const teams = teamMode ? (onlineRoomData.teams || { 1: 'A', 2: 'B', 3: 'A', 4: 'B' }) : null;
        let bId = onlineRoomData.boardPref;
        if (!bId || bId === 'random') bId = getActualBoardId(totalP);
        const initData = generateInitData('online', totalP, humanCount, bId, teamMode, teams);
        const aiDiff = onlineRoomData.aiDifficulty || 'medium';
        for(let i=1; i<=totalP; i++) initData.playersInfo[i] = { type: 'ai', difficulty: aiDiff };
        Object.entries(seats).forEach(([pidStr, key]) => { if (key) initData.playersInfo[parseInt(pidStr, 10)] = { type: 'human', uid: key }; });
        try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId), { status: 'playing', initialState: initData, round: (onlineRoomData.round || 1) + 1, lastMove: null }); } catch (e) { console.error(e); }
      };

      const handlePlayAgain = () => { if (gameState.mode === 'online' && onlineRoomData && onlineRoomData.host === mySessionKey) { startOnlineGame(); } else if (gameState.mode !== 'online') { initGame(gameState.mode); } };

      // 離開房間／回主選單：務必清掉 roomId，onSnapshot 監聽器才會確實斷線，
      // 避免舊房間的更新繼續套用到畫面上，或留著一個沒人用的監聽器。
      const leaveOnlineRoom = () => {
        audioManager.startLobbyBGM();
        if (roomId) { setRoomId(''); setOnlineRoomData(null); setMyPlayerId(1); setOrderSwapPid(null); lastProcessedMoveTs.current = 0; setRemoteMoveQueue([]); setIsSyncing(false); setSyncStuck(false); lastHandledResyncReq.current = 0; lastAppliedSnapshotTs.current = 0; setResyncPending(false); }
        setGameState(prev => ({ ...prev, mode: 'menu' }));
      };

      const getNextTurn = (curr, hands) => { let n = curr; let count = 0; do { n = (n % gameState.totalPlayers) + 1; count++; } while (hands[n] && hands[n].length === 0 && count < gameState.totalPlayers); return n; };
      const drawCard = (deck, hand) => (deck.length === 0 ? { newDeck: deck, finalHand: hand } : { newDeck: deck.slice(1), finalHand: [...hand, deck[0]] });

      const applyResolveTurn = (prevState, captured, newHand, turn) => {
        let newBoard = [...prevState.board]; captured.forEach(idx => { if (newBoard[idx]) newBoard[idx].player = turn; });
        let newHands = {...prevState.hands}; let newDecks = {...prevState.decks};
        const { newDeck, finalHand } = drawCard(prevState.decks[turn]||[], newHand);
        newHands[turn] = finalHand; newDecks[turn] = newDeck;
        
        const isBoardFull = !newBoard.includes(null); const allHandsEmpty = Object.values(newHands).every(h => h.length === 0);
        const gameOver = isBoardFull || allHandsEmpty;
        let finalBaseScores = prevState.finalBaseScores; if (gameOver && !finalBaseScores) finalBaseScores = { ...prevState.scores };
        const nextT = gameOver ? turn : getNextTurn(turn, newHands);

        return { board: newBoard, decks: newDecks, hands: newHands, isAnimating: false, turn: nextT, gameOver, finalBaseScores, tallyState: gameOver ? 'start' : 'none', scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null };
      };

      const playCard = useCallback((cardIdx, boardIdx, isRemote = false, movePlayer = null) => {
        audioManager.init(); audioManager.playPlaceCard();
        setGameState(prev => {
          if (prev.isAnimating || prev.gameOver || !prev.board || prev.board[boardIdx] !== null) return prev;
          // 遠端（對方／房主廣播）的落子一律以訊息裡明確帶的 player 為準，不要相信本機當下的 prev.turn；
          // 這樣就算本機的回合狀態不小心跟房間的權威狀態有一點落差，套用對方那步時也一定會記到正確的人頭上，
          // 不會因為認錯人而讓兩邊棋盤越走越歪。
          const actingPlayer = (isRemote && movePlayer != null) ? movePlayer : prev.turn;
          const hand = prev.hands[actingPlayer]; if (!hand || hand[cardIdx] === undefined) return prev;
          
          const playedPhase = hand[cardIdx]; let newHand = [...hand]; newHand.splice(cardIdx, 1);
          let newBoard = [...prev.board]; newBoard[boardIdx] = { phase: playedPhase, player: 0 }; 

          if (!isRemote && prev.mode === 'online' && roomIdRef.current && db) { updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomIdRef.current), { lastMove: { cardIdx, boardIdx, player: actingPlayer, ts: Date.now() } }).catch(console.error); }

          const edges = ALL_BOARDS[prev.boardType]?.edges || []; 
          let events = []; let totalCaptured = new Set();
          getNeighbors(boardIdx, edges).forEach(n => {
            const neighbor = newBoard[n];
            if (neighbor) {
              if (isIdentical(playedPhase, neighbor.phase)) { events.push({ id: `ev-${Date.now()}-${n}`, type: 'identical', cells: [boardIdx, n], points: 1, name: t.phaseSame }); totalCaptured.add(boardIdx); totalCaptured.add(n); } 
              else if (isMatch(playedPhase, neighbor.phase)) { events.push({ id: `ev-${Date.now()}-${n}`, type: 'complementary', cells: [boardIdx, n], points: 2, name: t.phaseComp }); totalCaptured.add(boardIdx); totalCaptured.add(n); }
            }
          });
          findSequences(newBoard, boardIdx, edges).forEach((seq, i) => { events.push({ id: `seq-${Date.now()}-${i}`, type: 'sequence', cells: seq, points: seq.length, name: t.phaseSeq }); seq.forEach(n => totalCaptured.add(n)); });

          // 團戰模式：若本回合佔領的地盤先前屬於「對手隊伍」（非隊友、非中立），每塊地盤額外 +1 分（同一地盤不重複疊加）
          if (prev.teamMode && prev.teams) {
            const myTeam = prev.teams[actingPlayer];
            const bonusCells = Array.from(totalCaptured).filter(idx => {
              const cell = newBoard[idx];
              if (!cell || !cell.player) return false; // 中立或剛落下的牌，不算
              return prev.teams[cell.player] !== myTeam; // 僅對手隊伍的地盤才有加成
            });
            if (bonusCells.length > 0) {
              events.push({ id: `team-${Date.now()}`, type: 'teamBonus', cells: bonusCells, points: bonusCells.length, name: t.teamBonus });
            }
          }

          return { ...prev, board: newBoard, hands: {...prev.hands, [actingPlayer]: newHand}, selectedCardIdx: null, isAnimating: true, scoringQueue: events.length > 0 ? events.slice(1) : [], currentScoringEvent: events.length > 0 ? events[0] : null, pendingResolveInfo: { captured: Array.from(totalCaptured), newHand, turn: actingPlayer } };
        });
      }, [t]);

      // 依序套用遠端落子佇列：一次只取出最前面那一步，且必須等本機目前沒有在跑計分動畫（isAnimating）才套用，
      // 套用後動畫會把 isAnimating 設回 true，等這步跑完、isAnimating 再度變回 false 時，這個 effect 才會
      // 接著處理佇列裡的下一步。如此一來即使短時間內連續收到好幾步（例如電腦連續幾回合快速出牌），
      // 也會照順序一步一步套用，不會有任何一步被「正在動畫中」的 guard 悄悄吃掉。
      useEffect(() => {
        if (gameState.mode !== 'online') return;
        if (gameState.isAnimating) return;
        if (remoteMoveQueue.length === 0) return;
        const nextMove = remoteMoveQueue[0];
        setRemoteMoveQueue(q => q.slice(1));
        playCard(nextMove.cardIdx, nextMove.boardIdx, true, nextMove.player);
      }, [remoteMoveQueue, gameState.isAnimating, gameState.mode, playCard]);

      // 房主把「自己當下」的完整棋盤狀態發布出去，不改動本機任何東西，純粹讓其他人有一份可以對照、覆蓋的權威資料
      const publishHostSnapshot = useCallback(() => {
        if (!roomIdRef.current || !db) return;
        setGameState(prev => {
          updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomIdRef.current), {
            hostSnapshot: { board: prev.board, hands: prev.hands, decks: prev.decks, scores: prev.scores, turn: prev.turn, gameOver: prev.gameOver, finalBaseScores: prev.finalBaseScores || null, ts: Date.now() }
          }).catch(console.error);
          return prev;
        });
      }, [db]);

      // 房主端：監看房間文件裡的重新同步請求，一有新的請求就把目前狀態發布出去
      useEffect(() => {
        if (!onlineRoomData || onlineRoomData.host !== mySessionKey) return;
        const req = onlineRoomData.resyncRequest;
        if (req && req.ts > lastHandledResyncReq.current) {
          lastHandledResyncReq.current = req.ts;
          publishHostSnapshot();
        }
      }, [onlineRoomData, mySessionKey, publishHostSnapshot]);

      // 所有人（含房主自己）：收到 hostSnapshot 就整份覆蓋本機狀態，並清空還沒套用的舊佇列／動畫卡住的旗標，強制對齊到房主當下的進度
      useEffect(() => {
        if (gameState.mode !== 'online' || !onlineRoomData) return;
        const snap = onlineRoomData.hostSnapshot;
        if (!snap || snap.ts <= lastAppliedSnapshotTs.current) return;
        lastAppliedSnapshotTs.current = snap.ts;
        lastProcessedMoveTs.current = Date.now(); // 之後才發生的 lastMove 才需要再套用，避免把已經包含在這份快照裡的舊步伐重複疊加
        setRemoteMoveQueue([]);
        setGameState(prev => ({
          ...prev, board: snap.board, hands: snap.hands, decks: snap.decks, scores: snap.scores, turn: snap.turn, gameOver: snap.gameOver,
          finalBaseScores: snap.finalBaseScores, isAnimating: false, scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null, selectedCardIdx: null,
          tallyState: snap.gameOver ? (prev.tallyState === 'none' ? 'start' : prev.tallyState) : 'none'
        }));
        setResyncPending(false);
      }, [onlineRoomData, gameState.mode]);

      // 重整鍵：房主直接發布自己的狀態；其他玩家則發出請求，等房主回應
      const requestResync = useCallback(() => {
        if (!roomIdRef.current || !db || !onlineRoomData) return;
        audioManager.init();
        if (onlineRoomData.host === mySessionKey) {
          publishHostSnapshot();
        } else {
          setResyncPending(true);
          updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomIdRef.current), { resyncRequest: { by: mySessionKey, ts: Date.now() } }).catch(console.error);
          setTimeout(() => setResyncPending(false), 6000); // 保底：房主若沒回應（例如已離線），6 秒後自動恢復按鈕原狀，不會一直卡在「同步中」
        }
      }, [db, onlineRoomData, mySessionKey, publishHostSnapshot]);

      useEffect(() => {
        if (!gameState.isAnimating) return;
        if (gameState.currentScoringEvent) {
          const type = gameState.currentScoringEvent.type;
          if (type === 'identical') audioManager.playIdentical(); else if (type === 'complementary') audioManager.playComplementary(); else if (type === 'sequence') audioManager.playSequence(); else if (type === 'teamBonus') audioManager.playComplementary();
          const timer = setTimeout(() => { setGameState(prev => { let newS = { ...prev.scores }; newS[prev.pendingResolveInfo.turn] += prev.currentScoringEvent.points; return { ...prev, scores: newS, currentScoringEvent: null }; }); }, 1500); return () => clearTimeout(timer);
        } else if (gameState.pendingResolveInfo) {
          if (gameState.scoringQueue.length > 0) { const gapTimer = setTimeout(() => { setGameState(prev => ({ ...prev, currentScoringEvent: prev.scoringQueue[0], scoringQueue: prev.scoringQueue.slice(1) })); }, 100); return () => clearTimeout(gapTimer); } 
          else { const finishTimer = setTimeout(() => { setGameState(prev => { if (!prev.pendingResolveInfo) return prev; return { ...prev, ...applyResolveTurn(prev, prev.pendingResolveInfo.captured, prev.pendingResolveInfo.newHand, prev.pendingResolveInfo.turn) }; }); }, 200); return () => clearTimeout(finishTimer); }
        }
      }, [gameState.currentScoringEvent, gameState.isAnimating, gameState.scoringQueue.length, gameState.pendingResolveInfo]);

      useEffect(() => {
        if (gameState.tallyState === 'start') { setTimeout(() => setGameState(p => ({ ...p, tallyState: 'tally_1' })), 1000); } 
        else if (gameState.tallyState && gameState.tallyState.startsWith('tally_')) {
          const pId = parseInt(gameState.tallyState.split('_')[1]);
          audioManager.playTone(880, 'sine', 0.1, 0.2); 
          setGameState(p => { const territory = p.board.filter(c => c && c.player === pId).length; return { ...p, scores: { ...p.scores, [pId]: (p.scores[pId]||0) + territory } }; });
          setTimeout(() => {
            const nextP = pId + 1;
            if (nextP <= gameState.totalPlayers) setGameState(p => ({ ...p, tallyState: `tally_${nextP}` }));
            else { 
              setGameState(p => ({ ...p, tallyState: 'done' })); 
              if (gameState.mode === 'challenge') { const p1Score = gameState.scores[1] + gameState.board.filter(c=>c&&c.player===1).length; const p2Score = gameState.scores[2] + gameState.board.filter(c=>c&&c.player===2).length; if (p1Score < p2Score) { audioManager.stopBGM(); audioManager.playLose(); audioManager.startGameOverBGM(); } else { audioManager.playWin(); /* 同分視為玩家勝利，一樣播放勝利音效；BGM continues */ } }
              else { audioManager.stopBGM(); audioManager.playWin(); audioManager.startGameOverBGM(); }
            }
          }, 1200);
        }
      }, [gameState.tallyState, gameState.totalPlayers, gameState.mode]);

      useEffect(() => {
        if (gameState.gameOver || gameState.isAnimating || gameState.mode === 'menu') { setAiThinkingPlayer(null); return; }
        const currentP = gameState.playersInfo[gameState.turn];
        if (currentP && currentP.type === 'ai') {
          // 連線對戰時，AI 的回合只能由「房主」的客戶端計算並透過 lastMove 廣播出去；
          // 如果每個客戶端各自獨立模擬 AI 出牌（Math.random 結果不會一樣），會造成兩邊棋盤各自往不同方向發展、
          // 進而整場棋盤不同步。非房主客戶端在這裡什麼都不做，乖乖等房主那份 lastMove 同步過來即可。
          if (gameState.mode === 'online' && onlineRoomData && onlineRoomData.host !== mySessionKey) { setAiThinkingPlayer(null); return; }
          setAiThinkingPlayer(gameState.turn);
          const thinkTime = Math.random() * 1500 + 1000; 
          const timer = setTimeout(() => {
            const edges = ALL_BOARDS[gameState.boardType]?.edges || [];
            const emptyCells = gameState.board.map((c, i) => c === null ? i : -1).filter(i => i !== -1);
            const myHand = gameState.hands[gameState.turn];
            if (myHand && myHand.length > 0 && emptyCells.length > 0) {
              let allMoves = [];
              myHand.forEach((phase, cardIdx) => {
                emptyCells.forEach(boardIdx => {
                  let simBoard = [...gameState.board]; simBoard[boardIdx] = { phase, player: 0 };
                  let simCapture = new Set(); let comboPts = 0;
                  getNeighbors(boardIdx, edges).forEach(n => {
                    const neighbor = simBoard[n];
                    if (neighbor) {
                      if (isIdentical(phase, neighbor.phase)) { simCapture.add(boardIdx); simCapture.add(n); comboPts += 1; }
                      else if (isMatch(phase, neighbor.phase)) { simCapture.add(boardIdx); simCapture.add(n); comboPts += 2; }
                    }
                  });
                  findSequences(simBoard, boardIdx, edges).forEach(seqCells => { seqCells.forEach(n => simCapture.add(n)); comboPts += seqCells.length; });
                  let pts = comboPts; simCapture.forEach(idx => { const owner = gameState.board[idx] && gameState.board[idx].player; if (owner && owner !== gameState.turn) { const isEnemyTeam = !(gameState.teamMode && gameState.teams && gameState.teams[owner] === gameState.teams[gameState.turn]); if (isEnemyTeam) pts += 1.5; } });
                  allMoves.push({ cardIdx, boardIdx, score: pts });
                });
              });

              if (allMoves.length > 0) {
                let selectedMove = null; const diff = currentP.difficulty;
                if (diff === 'low') { selectedMove = allMoves[Math.floor(Math.random() * allMoves.length)]; } 
                else if (diff === 'medium') { if (Math.random() < 0.5) { allMoves.sort((a, b) => b.score - a.score); const bests = allMoves.filter(m => m.score === allMoves[0].score); selectedMove = bests[Math.floor(Math.random() * bests.length)]; } else { selectedMove = allMoves[Math.floor(Math.random() * allMoves.length)]; } } 
                else { allMoves.sort((a, b) => b.score - a.score); const bests = allMoves.filter(m => m.score === allMoves[0].score); selectedMove = bests[Math.floor(Math.random() * bests.length)]; }
                if (selectedMove) { setAiThinkingPlayer(null); playCard(selectedMove.cardIdx, selectedMove.boardIdx); }
              }
            }
          }, thinkTime); 
          return () => clearTimeout(timer);
        } else { setAiThinkingPlayer(null); }
      }, [gameState.turn, gameState.mode, gameState.isAnimating, gameState.gameOver, gameState.board, gameState.hands, gameState.boardType, playCard, gameState.playersInfo, gameState.totalPlayers, onlineRoomData, mySessionKey]); 

      const P_COLORS = {
        1: { base: 'indigo', hex: '99,102,241', text: 'text-indigo-300', bgText: 'text-indigo-100', border: 'border-indigo-500', ring: 'ring-indigo-400', bg: 'bg-indigo-900', shadow: 'rgba(99,102,241,0.5)' },
        2: { base: 'rose', hex: '244,63,94', text: 'text-rose-300', bgText: 'text-rose-100', border: 'border-rose-500', ring: 'ring-rose-400', bg: 'bg-rose-900', shadow: 'rgba(244,63,94,0.5)' },
        3: { base: 'emerald', hex: '52,211,153', text: 'text-emerald-300', bgText: 'text-emerald-100', border: 'border-emerald-500', ring: 'ring-emerald-400', bg: 'bg-emerald-900', shadow: 'rgba(52,211,153,0.5)' },
        4: { base: 'amber', hex: '251,191,36', text: 'text-amber-300', bgText: 'text-amber-100', border: 'border-amber-500', ring: 'ring-amber-400', bg: 'bg-amber-900', shadow: 'rgba(251,191,36,0.5)' }
      };

      const getPlayerLabel = (pId) => {
        const pInfo = gameState.playersInfo[pId];
        // 自己所在的座位：連線模式看 myPlayerId，本機／單人闖關模式固定是玩家1
        const isMe = (gameState.mode === 'online' && pId === myPlayerId) || ((gameState.mode === 'local' || gameState.mode === 'challenge') && pId === 1);
        // 若已在設定中填寫暱稱，自己這個座位改用暱稱顯示，取代預設的「玩家N」
        let label = (isMe && pInfo && pInfo.type !== 'ai' && nickname.trim()) ? nickname.trim() : `${t.player} ${pId}`;
        if (pInfo && pInfo.type === 'ai') { 
          label = `${t.ai}${pId}`; 
          if(pInfo.difficulty === 'low') label+=`[${t.diffLow}]`; 
          else if(pInfo.difficulty === 'high') label+=`[${t.diffHigh}]`; 
          else label+=`[${t.diffMed}]`; 
        }
        else if (isMe) { label += ` ${t.roomYou}`; }
        let teamTag = null;
        if (gameState.teamMode && gameState.teams && gameState.teams[pId]) {
          const team = gameState.teams[pId];
          teamTag = <span className="ml-1"> {team === 'A' ? '⚪️' : '⚫️'}</span>;
        }
        return <React.Fragment>{label}{teamTag}</React.Fragment>;
      };

      const wrapperClass = `font-sans text-slate-100 selection:bg-indigo-500/30 transition-all duration-300 ${isPseudoFs ? 'fixed inset-0 z-[9999] bg-slate-950 w-screen h-[100dvh]' : 'w-full h-[100dvh] relative'}`;

      const renderCard = (phase, index, player, isBoard = false, boardIdx = -1) => {
        if (phase === undefined || phase === null) return null;
        const isNeutral = !isBoard || player === 0;
        const isTallying = gameState.tallyState === `tally_${player}` && isBoard;
        const isDimmed = isBoard && gameState.tallyState.startsWith('tally_') && !isTallying;
        const isSelected = !isBoard && gameState.selectedCardIdx === index && player === gameState.turn;
        const isScoringPulse = isBoard && gameState.currentScoringEvent?.cells.includes(boardIdx);
        
        let isHidden = false;
        if (!isBoard && index >= 0 && !gameState.gameOver) { 
          const pInfo = gameState.playersInfo[player];
          // 團戰模式下，隊友的手牌互相公開（包含隊友是電腦時），方便兩人合作規劃戰術；
          // 只有敵隊（或非團戰模式下的其他玩家／電腦）才維持蓋牌。
          const selfId = gameState.mode === 'online' ? myPlayerId : 1;
          const isTeammate = !!(gameState.teamMode && gameState.teams && player !== selfId && gameState.teams[player] && gameState.teams[player] === gameState.teams[selfId]);
          if (!isTeammate) {
            if (pInfo && pInfo.type === 'ai') isHidden = true;
            else if (gameState.mode === 'online' && player !== myPlayerId) isHidden = true; 
          }
        }

        let cInfo = P_COLORS[player] || P_COLORS[1];
        let colorClasses = isNeutral ? (isBoard ? 'bg-slate-700/60 border-slate-500 ring-1 ring-slate-500' : 'bg-gradient-to-br from-slate-700/80 to-slate-800 border-slate-500 shadow-lg') : `${cInfo.bg}/90 ${cInfo.border} ring-2 ${cInfo.ring} shadow-[0_0_15px_${cInfo.shadow}]`;
        if (isHidden) colorClasses = 'bg-slate-800 border-slate-600 shadow-inner';
        // 團戰模式：棋盤上的卡牌外框改用黑白兩色區分隊伍（白隊＝白框、黑隊＝純黑框，不加白色描邊）
        if (isBoard && !isNeutral && !isHidden && gameState.teamMode && gameState.teams && gameState.teams[player]) {
          const team = gameState.teams[player];
          colorClasses = team === 'A'
            ? `${cInfo.bg}/90 !border-[4px] !border-white ring-2 ring-white shadow-[0_0_16px_rgba(255,255,255,0.85)]`
            : `${cInfo.bg}/90 !border-[4px] !border-black ring-2 ring-black shadow-[0_0_16px_rgba(0,0,0,0.95)]`;
        }
        let animClasses = '';
        if (isScoringPulse) animClasses = 'animate-score-pulse ring-[3px] ring-yellow-400 z-50'; 
        else if (isTallying) animClasses = `scale-110 shadow-[0_0_40px_${cInfo.shadow}] z-20 ring-[3px] ${cInfo.ring} transition-all duration-300`; 
        else if (isDimmed) animClasses = 'opacity-30 grayscale transition-all duration-500';

        return (
          <div key={isBoard ? `board-${boardIdx}` : `hand-${player}-${index}`} onClick={(e) => { e.stopPropagation(); const canSelect = (gameState.mode === 'online') ? (gameState.turn === myPlayerId && player === myPlayerId && !isConnUnstable) : (player === gameState.turn && gameState.playersInfo[player].type !== 'ai'); if (!isBoard && canSelect && !gameState.isAnimating && gameState.tallyState === 'none') { setGameState(prev => ({ ...prev, selectedCardIdx: prev.selectedCardIdx === index ? null : index })); } }}
            className={`relative flex flex-col items-center justify-center rounded-lg sm:rounded-xl md:rounded-2xl transition-all duration-300 cursor-pointer border ${colorClasses} ${isSelected ? 'ring-2 ring-yellow-400 -translate-y-2 shadow-[0_10px_20px_rgba(250,204,21,0.4)]' : ''} ${animClasses} ${isBoard ? 'absolute inset-0 w-full h-full' : 'card-item shrink-0'}`}>
            {!isHidden ? ( <React.Fragment><MoonSvg phase={phase} className="w-[50%] h-[50%] mb-[2%]" /><span className={`card-text font-medium tracking-wide ${isNeutral ? 'text-slate-300' : cInfo.bgText}`}>{t.phases[phase] || ''}</span></React.Fragment> ) : ( <div className="w-[60%] h-[60%] rounded-full bg-slate-700/50 border border-slate-600/50 flex items-center justify-center"><span className="card-text text-slate-400 opacity-50 font-bold">?</span></div> )}
          </div>
        );
      };

      const getPlayerLayoutClasses = (pId, total) => {
        if (total === 2) {
          if (pId === 1) return "portrait:bottom-6 portrait:left-1/2 portrait:-translate-x-1/2 portrait:flex-col landscape:right-6 landscape:top-1/2 landscape:-translate-y-1/2 landscape:flex-col";
          if (pId === 2) return "portrait:top-24 portrait:left-1/2 portrait:-translate-x-1/2 portrait:flex-col-reverse landscape:left-6 landscape:top-1/2 landscape:-translate-y-1/2 landscape:flex-col-reverse";
        }
        if (total === 3) {
          if (pId === 1) return "portrait:bottom-6 portrait:left-1/2 portrait:-translate-x-1/2 portrait:flex-col landscape:right-6 landscape:top-1/2 landscape:-translate-y-1/2 landscape:flex-col";
          if (pId === 2) return "portrait:top-24 portrait:left-6 portrait:flex-col-reverse landscape:top-24 landscape:left-6 landscape:flex-col-reverse";
          if (pId === 3) return "portrait:top-24 portrait:right-6 portrait:flex-col-reverse landscape:bottom-6 landscape:left-6 landscape:flex-col";
        }
        if (total === 4) {
          if (pId === 1) return "bottom-6 right-6 flex-col";
          if (pId === 2) return "bottom-6 left-6 flex-col";
          if (pId === 3) return "top-24 left-6 flex-col-reverse";
          if (pId === 4) return "top-24 right-6 flex-col-reverse";
        }
        return "";
      };

      const getPlayerContainerStyle = (pId) => {
        const cInfo = P_COLORS[pId];
        // 外框常亮（使用代表色）；輪到該玩家時背景也亮起
        const isActive = gameState.turn === pId && gameState.tallyState === 'none';
        if (isActive) return `bg-${cInfo.base}-900/30 border-2 border-${cInfo.base}-400 shadow-[0_0_24px_${cInfo.shadow}]`;
        return `bg-transparent border-2 border-${cInfo.base}-500/50`;
      };

      // === Non-Playing Views ===
      if (['splash', 'menu', 'lobby', 'lobby_wait', 'name_input', 'leaderboard', 'local_setup', 'moonInfo'].includes(gameState.mode)) {
        // 排行榜送出按鈕的文字／樣式：依上傳狀態變化，取代原本鍵盤面板內建的邏輯
        let scoreBtnText = t.btnSubmit, scoreBtnDisabled = false, scoreBtnClass = "bg-emerald-600 hover:bg-emerald-500 text-white";
        if (uploadStatus === 'uploading') { scoreBtnText = t.btnUploading; scoreBtnDisabled = true; }
        else if (uploadStatus === 'success') { scoreBtnText = t.btnUploadDone; scoreBtnDisabled = true; }
        else if (uploadStatus === 'restart') { scoreBtnText = t.btnRestartChallenge; scoreBtnClass = "bg-indigo-600 hover:bg-indigo-500 text-white"; }
        else if (uploadStatus === 'error') { scoreBtnText = t.btnUploadFail || '上傳失敗 (重試)'; scoreBtnClass = "bg-rose-600 hover:bg-rose-500 text-white"; }
        return (
          <div className={`${wrapperClass} flex flex-col items-center justify-center overflow-y-auto custom-scroll px-4 sm:px-6 lg:px-10`}>
            <StarryBackground />
            <MoonPhasesBackdrop />
            
            <div className="fixed top-4 right-4 z-[9999]">
              <button onClick={() => setShowSettings(true)} className="p-3 text-indigo-300 hover:text-white bg-slate-800/80 rounded-full border border-white/10 shadow-lg hover:rotate-90 transition-all"><SettingsIcon className="w-6 h-6"/></button>
            </div>

            {showSettings && <SettingsModal onClose={() => setShowSettings(false)} lang={lang} setLang={setLang} bgmVol={bgmVol} setBgmVol={setBgmVol} sfxVol={sfxVol} setSfxVol={setSfxVol} toggleFs={toggleFullscreen} showTutorial={showTutorialInner} setShowTutorial={setShowTutorialInner} t={t} quickMessages={quickMessages} setQuickMessages={setQuickMessages} nickname={nickname} setNickname={setNickname} />}

            {/* 聊天室（浮動按鈕） */}
            {user && <ChatPanel open={chatOpen} messages={visibleChatMessages} inputVal={chatInput} setInput={setChatInput} onSend={sendChatMessage} onToggle={toggleChat} unread={totalChatUnread} chatBoxRef={chatBoxRef} t={t} lang={lang} channel={chatChannel} setChannel={setChatChannel} canBattle={chatCanBattle} canTeam={chatCanTeam} quickMessages={quickMessages} onQuickSend={sendQuickChat} divider={chatDivider} />}

            {gameState.mode === 'name_input' && (
              <div className="z-10 flex flex-col items-center p-6 sm:p-10 landscape:p-5 bg-slate-900/80 backdrop-blur-xl rounded-3xl border border-yellow-500/50 shadow-[0_0_40px_rgba(234,179,8,0.2)] relative w-full max-w-xl landscape:max-w-3xl my-4 landscape:my-3 mx-4 text-center max-h-[95vh] overflow-y-auto custom-scroll">
                <Trophy className="w-14 h-14 sm:w-20 sm:h-20 landscape:w-14 landscape:h-14 text-yellow-400 mb-3 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]" />
                <h2 className="text-2xl sm:text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500">{t.nameInputTitle}</h2>
                <p className="text-indigo-200 mb-5 sm:mb-7 text-sm sm:text-lg">{t.txtLvl} {gameState.challengeData.currentLevel} {t.txtLayer} &nbsp;|&nbsp; {t.totalScore}: {gameState.challengeData.totalScore}</p>
                <div className="w-full max-w-sm mx-auto bg-slate-950 p-3 sm:p-5 rounded-2xl border border-indigo-500/30 mb-3"><div className="h-12 sm:h-16 flex items-center justify-center text-3xl sm:text-4xl font-[Rubik] tracking-[0.3em] font-bold text-white">{nickname.trim() || <span className="text-slate-600 animate-pulse">{t.nameInputPlaceholder}</span>}</div></div>
