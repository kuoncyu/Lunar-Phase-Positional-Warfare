                    <div className="flex-1 bg-slate-900/80 backdrop-blur-xl rounded-3xl border border-indigo-500/30 p-5 sm:p-7 shadow-2xl flex flex-col gap-4 justify-center">
                      <h2 className="text-base sm:text-xl font-black text-indigo-300 border-b border-indigo-500/20 pb-3">{t.lobbyOr} — {t.btnJoin}</h2>
                      <div>
                        <label className="block text-xs sm:text-sm font-bold text-slate-400 mb-2 uppercase tracking-widest">{t.lobbyPlaceholder}</label>
                        <input type="text" inputMode="numeric" maxLength="4"
                          placeholder="_ _ _ _"
                          value={joinCode} onChange={(e) => setJoinCode(e.target.value.replace(/\D/g, ''))}
                          className="w-full bg-slate-800 border-2 border-slate-600 rounded-2xl py-5 sm:py-6 px-4 text-center text-3xl sm:text-5xl font-mono tracking-[0.4em] text-white outline-none focus:border-indigo-400 transition-all" />
                      </div>
                      <button onClick={() => joinRoom(joinCode)}
                        className="w-full py-4 sm:py-5 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white rounded-2xl font-black shadow-lg text-base sm:text-2xl transition-all mt-auto border border-indigo-400/30">
                        {t.btnJoin}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}

            {gameState.mode === 'lobby_wait' && onlineRoomData && (
              <div className="z-10 flex flex-col w-full max-w-2xl landscape:max-w-5xl lg:max-w-5xl my-4 mx-4 max-h-[95vh] overflow-y-auto custom-scroll gap-4">
                {/* 標題：房間代碼 */}
                <div className="bg-slate-900/80 backdrop-blur-xl rounded-3xl border border-emerald-500/30 p-5 sm:p-7 shadow-2xl text-center">
                  <p className="text-xs sm:text-sm font-bold text-slate-400 uppercase tracking-widest mb-1">{t.roomCode}</p>
                  <div className="text-6xl sm:text-8xl font-black font-mono tracking-widest text-emerald-400 drop-shadow-[0_0_20px_rgba(52,211,153,0.6)] select-all leading-none py-2">{roomId}</div>
                  <div className="mt-3 inline-flex items-center gap-2 text-xs sm:text-sm text-emerald-200 bg-emerald-900/40 px-4 py-1.5 rounded-full border border-emerald-700/50">
                    <span className="text-slate-400">{t.localBoard}:</span>
                    <span className="font-bold">{onlineRoomData.boardPref === 'random' ? t.localRandom : (t.boardNames[onlineRoomData.boardPref] || onlineRoomData.boardPref)}</span>
                  </div>
                  {onlineRoomData.teamMode && (
                    <div className="mt-2 inline-flex items-center gap-2 text-xs sm:text-sm text-orange-200 bg-orange-900/40 px-4 py-1.5 rounded-full border border-orange-700/50">
                      <span className="font-bold">{t.teamModeOn}</span>
                    </div>
                  )}
                  <div className="mt-2 inline-flex items-center gap-2 text-xs sm:text-sm text-indigo-200 bg-indigo-900/40 px-4 py-1.5 rounded-full border border-indigo-700/50">
                    <span className="text-slate-400">{t.localDifficulty}:</span>
                    {onlineRoomData.host === mySessionKey ? (
                      <select value={onlineRoomData.aiDifficulty || 'medium'} onChange={e => setRoomAiDifficulty(e.target.value)}
                        className="bg-slate-800 border border-slate-600 text-white rounded-lg px-2 py-0.5 outline-none text-xs sm:text-sm">
                        <option value="low">{t.diffLow}</option>
                        <option value="medium">{t.diffMed}</option>
                        <option value="high">{t.diffHigh}</option>
                      </select>
                    ) : (
                      <span className="font-bold">{{ low: t.diffLow, medium: t.diffMed, high: t.diffHigh }[onlineRoomData.aiDifficulty || 'medium']}</span>
                    )}
                  </div>
                </div>

                {/* 主體：玩家列表 + 按鈕 (portrait: 上下, landscape: 左右) */}
                <div className="flex flex-col landscape:flex-row gap-4">
                  {/* 玩家列表 */}
                  <div className="flex-1 bg-slate-900/80 backdrop-blur-xl rounded-3xl border border-slate-600/50 p-5 sm:p-6 shadow-2xl">
                    <div className="flex items-center justify-between mb-1.5 sm:mb-2 gap-2">
                      <h3 className="font-black text-slate-300 text-sm sm:text-lg uppercase tracking-widest">
                        {t.roomPlayers} <span className="text-emerald-400">({Object.keys(onlineRoomData.players).length}/{onlineRoomData.maxPlayers})</span>
                      </h3>
                      {onlineRoomData.host === mySessionKey && onlineRoomData.teamMode && (
                        <button onClick={randomizeOnlineTeams} className="text-xs sm:text-sm px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-white font-bold whitespace-nowrap">{t.teamRandomize}</button>
                      )}
                    </div>
                    {onlineRoomData.host === mySessionKey && (
                      <p className="text-center text-[11px] sm:text-xs text-amber-300/90 font-bold mb-3">
                        {orderSwapPid !== null ? t.roomOrderSelectHint : t.roomHostHint}
                      </p>
                    )}
                    <div className="flex flex-col gap-2 sm:gap-3">
                      {Array.from({length: onlineRoomData.maxPlayers}, (_,i)=>i+1).map(pId => {
                        const occupantKey = (onlineRoomData.seats || {})[pId] || null;
                        const pEntry = (occupantKey && onlineRoomData.players[occupantKey]) ? [occupantKey, onlineRoomData.players[occupantKey]] : null;
                        const isMe = pEntry && pEntry[0] === mySessionKey;
                        const isHost = pEntry && pEntry[0] === onlineRoomData.host;
                        const amHost = onlineRoomData.host === mySessionKey;
                        const cInfo = P_COLORS[pId];
                        const teams = onlineRoomData.teams || { 1: 'A', 2: 'B', 3: 'A', 4: 'B' };
                        const isTeamA = teams[pId] === 'A';
                        const isSelectedForSwap = orderSwapPid === pId;
                        return (
                          <div key={pId} className={`flex justify-between items-center p-3 sm:p-4 rounded-2xl border transition-all ${isSelectedForSwap ? 'ring-2 ring-amber-400' : ''} ${pEntry ? `bg-${cInfo.base}-900/20 border-${cInfo.base}-500/40` : 'bg-slate-800/50 border-slate-700 border-dashed'}`}>
                            <span className={`font-black flex items-center gap-2 text-base sm:text-xl ${pEntry ? cInfo.text : 'text-slate-600'}`}>
                              {isHost && <span>👑</span>}
                              {amHost ? (
                                <button onClick={() => handleOrderSwapClick(pId)} className={`px-1.5 rounded-lg hover:bg-white/10 ${isSelectedForSwap ? 'bg-amber-500/30' : ''}`}>P{pId}</button>
                              ) : (
                                <span>P{pId}</span>
                              )}
                              <span className="font-normal text-sm sm:text-base">{pEntry ? (isMe ? t.roomYou : '') : t.roomAI}</span>
                              {onlineRoomData.teamMode && (
                                amHost ? (
                                  <button onClick={() => swapOnlineTeam(pId)} className={`text-xs sm:text-sm font-bold px-2 py-0.5 rounded-full border hover:opacity-80 ${isTeamA ? 'bg-slate-100 border-white text-slate-900' : 'bg-neutral-950 border-slate-400 text-slate-100'}`}>
                                    {isTeamA ? t.teamA : t.teamB}
                                  </button>
                                ) : (
                                  <span className={`text-xs sm:text-sm font-bold px-2 py-0.5 rounded-full border ${isTeamA ? 'bg-slate-100 border-white text-slate-900' : 'bg-neutral-950 border-slate-400 text-slate-100'}`}>
                                    {isTeamA ? t.teamA : t.teamB}
                                  </span>
                                )
                              )}
                            </span>
                            {pEntry && (
                              <span className={`text-sm sm:text-base font-bold flex items-center gap-1.5 ${pEntry[1].ready ? 'text-emerald-400':'text-amber-400'}`}>
                                {pEntry[1].ready ? <><CheckCircle className="w-4 h-4 sm:w-5 sm:h-5"/>{t.roomReady}</> : t.roomNotReady}
                              </span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* 操作按鈕區 */}
                  <div className="flex flex-col gap-3 landscape:w-56 sm:landscape:w-72 justify-center">
                    {onlineRoomData.host === mySessionKey ? (
                      <button onClick={startOnlineGame}
                        disabled={Object.entries(onlineRoomData.players).some(([k, p]) => !p.ready && k !== onlineRoomData.host)}
                        className="w-full py-4 sm:py-5 bg-emerald-600 hover:bg-emerald-500 disabled:bg-slate-700 disabled:text-slate-500 text-white rounded-2xl font-black transition-all shadow-lg text-base sm:text-xl border border-emerald-400/30 disabled:border-transparent">
                        {Object.entries(onlineRoomData.players).some(([k, p]) => !p.ready && k !== onlineRoomData.host) ? t.btnWait : t.btnStartAll}
                      </button>
                    ) : (
                      <button onClick={toggleReadyOnline}
                        className={`w-full py-4 sm:py-5 rounded-2xl font-black transition-all shadow-lg text-base sm:text-xl ${onlineRoomData.players[mySessionKey]?.ready ? 'bg-slate-700 hover:bg-slate-600 text-slate-300 border border-slate-500' : 'bg-indigo-600 hover:bg-indigo-500 text-white border border-indigo-400/30'}`}>
                        {onlineRoomData.players[mySessionKey]?.ready ? t.btnCancelReady : t.btnReady}
                      </button>
                    )}
                    <button onClick={leaveOnlineRoom}
                      className="w-full py-3 sm:py-4 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded-2xl font-bold text-sm sm:text-lg flex items-center justify-center gap-2 border border-slate-600 transition-all">
                      <RotateCcw className="w-4 h-4 sm:w-5 sm:h-5" /> {t.btnLeave}
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const currentBoardConfig = ALL_BOARDS[gameState.boardType] || ALL_BOARDS['classic'];
      const isConnUnstable = gameState.mode === 'online' && (isOffline || isSyncing);
      let currentScoreTextClass = ''; let currentScoreNumClass = '';
      if (gameState.currentScoringEvent) {
        if (gameState.currentScoringEvent.type === 'identical') { currentScoreTextClass = 'score-identical'; currentScoreNumClass = 'score-num-identical'; }
        else if (gameState.currentScoringEvent.type === 'complementary') { currentScoreTextClass = 'score-complementary'; currentScoreNumClass = 'score-num-complementary'; }
        else if (gameState.currentScoringEvent.type === 'teamBonus') { currentScoreTextClass = 'score-teambonus'; currentScoreNumClass = 'score-num-teambonus'; }
        else { currentScoreTextClass = 'score-sequence'; currentScoreNumClass = 'score-num-sequence'; }
      }
      
      // 排名同分處理：多人連線／多人遊戲同分時，「後手」（玩家編號較大者，即較晚出手）視為敗方，因此排序時以玩家編號小者優先；
      // 團隊競賽同分則以「p4玩家所在隊伍」視為敗方。註：單人百塔挑戰模式的同分規則在上方 challenge 音效判斷處另外處理（同分玩家勝）。
      const sortedPlayers = Object.keys(gameState.scores).map(pId => parseInt(pId)).sort((a,b) => (gameState.scores[b] - gameState.scores[a]) || (a - b));
      const playerRanks = {};
      sortedPlayers.forEach((pId, idx) => { playerRanks[pId] = idx + 1; });

      const teamTotals = (gameState.teamMode && gameState.teams) ? Object.keys(gameState.scores).reduce((acc, pIdStr) => {
        const pId = parseInt(pIdStr); const team = gameState.teams[pId];
        if (team) acc[team] = (acc[team] || 0) + gameState.scores[pId];
        return acc;
      }, {}) : null;
      const sortedTeams = teamTotals ? Object.keys(teamTotals).sort((a, b) => {
        const diff = teamTotals[b] - teamTotals[a];
        if (diff !== 0) return diff;
        const p4Team = gameState.teams && gameState.teams[4];
        if (a === p4Team) return 1; if (b === p4Team) return -1; // 同分時，p4 玩家所在隊伍排在後面（視為敗方）
        return 0;
      }) : null;

      return (
        <div className={`game-wrapper ${gameState.mode === "challenge" ? "challenge-mode" : ""} ${wrapperClass} flex flex-col`}>
          <StarryBackground />
          
          {showSettings && <SettingsModal onClose={() => setShowSettings(false)} lang={lang} setLang={setLang} bgmVol={bgmVol} setBgmVol={setBgmVol} sfxVol={sfxVol} setSfxVol={setSfxVol} toggleFs={toggleFullscreen} showTutorial={showTutorialInner} setShowTutorial={setShowTutorialInner} t={t} quickMessages={quickMessages} setQuickMessages={setQuickMessages} nickname={nickname} setNickname={setNickname} />}

          {/* 聊天室（遊戲中） */}
          {user && <ChatPanel open={chatOpen} messages={visibleChatMessages} inputVal={chatInput} setInput={setChatInput} onSend={sendChatMessage} onToggle={toggleChat} unread={totalChatUnread} chatBoxRef={chatBoxRef} t={t} lang={lang} channel={chatChannel} setChannel={setChatChannel} canBattle={chatCanBattle} canTeam={chatCanTeam} quickMessages={quickMessages} onQuickSend={sendQuickChat} divider={chatDivider} />}

          {/* === 網路不同步提醒（阻擋操作，避免各客戶端棋盤不同步） === */}
          {isConnUnstable && (
            <div className="absolute inset-0 z-[998] flex items-center justify-center bg-slate-950/70 backdrop-blur-sm">
              <div className="bg-slate-900/95 text-white px-6 py-5 sm:px-10 sm:py-7 rounded-2xl border border-amber-400/60 shadow-2xl flex flex-col items-center text-center max-w-[85%] sm:max-w-sm">
                <div className="w-9 h-9 sm:w-11 sm:h-11 mb-3 rounded-full border-4 border-amber-400/30 border-t-amber-400 animate-spin"></div>
                <span className="text-base sm:text-xl font-black text-amber-300 tracking-wide">{t.txtSyncing}</span>
                <span className="mt-2 text-xs sm:text-sm text-slate-300">{syncStuck ? t.txtSyncStuckSub : t.txtSyncingSub}</span>
                {syncStuck && (
                  <div className="mt-4 flex gap-3 w-full">
                    <button onClick={() => window.location.reload()} className="flex-1 py-2.5 bg-amber-500 hover:bg-amber-400 text-slate-900 rounded-xl font-black text-sm sm:text-base transition-all">{t.btnReconnect}</button>
                    <button onClick={leaveOnlineRoom} className="flex-1 py-2.5 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold text-sm sm:text-base transition-all">{t.btnLeaveRoom}</button>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* === 全新頂部工具列 (Top Toolbar) === */}
          <div className="absolute top-0 left-0 w-full h-14 sm:h-20 landscape:h-12 z-[999] flex items-center justify-between px-3 sm:px-6 pointer-events-none">
            {/* 左側：棋盤名稱 */}
            <div className="pointer-events-auto bg-slate-900/80 px-3 sm:px-4 py-1 sm:py-1.5 rounded-full border border-slate-600/50 shadow-lg backdrop-blur-md flex items-center shrink-0">
              <span className="text-[10px] sm:text-sm text-slate-300 uppercase tracking-widest font-bold">{t.boardNames[gameState.boardType] || gameState.boardType}</span>
            </div>

            {/* 中央：遊戲資訊 (挑戰模式 / 線上模式) */}
            <div className="absolute left-1/2 -translate-x-1/2 pointer-events-auto flex items-center justify-center whitespace-nowrap">
              {gameState.mode === 'challenge' && (
                <div className="bg-slate-900/80 px-3 sm:px-6 py-1 sm:py-2 rounded-full border border-yellow-500/50 shadow-[0_0_20px_rgba(234,179,8,0.2)] backdrop-blur-md flex items-center gap-2 sm:gap-4">
                  <span className="text-xs sm:text-lg font-black text-yellow-400 tracking-widest drop-shadow-md">{t.txtLvl} <span className="text-white text-sm sm:text-xl">{gameState.challengeData.currentLevel}</span> {t.txtLayer}</span>
                  <div className="w-px h-3 sm:h-5 bg-slate-600"></div>
                  <span className="text-xs sm:text-lg font-bold text-slate-300">{t.totalScore}: <span className="text-emerald-400 text-sm sm:text-xl font-mono">{gameState.challengeData.totalScore}</span></span>
                </div>
              )}
              {gameState.mode === 'online' && (
                <div className="bg-slate-900/80 px-3 sm:px-6 py-1 sm:py-2 rounded-full border border-emerald-500/50 shadow-lg backdrop-blur-md">
                  <span className="text-xs sm:text-base font-bold text-emerald-400">{t.txtRoom} <span className="text-white tracking-widest font-mono ml-1">{roomId}</span></span>
                </div>
              )}
            </div>

            {/* 右側：回首頁與設定；線上對戰時設定下方會多一個「重新同步」按鈕 */}
            <div className="pointer-events-auto flex items-start gap-1 sm:gap-2 shrink-0">
              <button onClick={leaveOnlineRoom} className="p-1.5 sm:p-2.5 text-slate-300 hover:text-white bg-slate-900/80 hover:bg-rose-900/80 rounded-full border border-slate-600/50 hover:border-rose-500/50 shadow-lg backdrop-blur-md transition-all group" title={t.back}>
                <Home className="w-4 h-4 sm:w-5 sm:h-5 group-hover:scale-110" />
              </button>
              <div className="flex flex-col items-center gap-1 sm:gap-1.5">
                <button onClick={() => setShowSettings(true)} className="p-1.5 sm:p-2.5 text-indigo-300 hover:text-white bg-slate-900/80 hover:bg-indigo-900/80 rounded-full border border-slate-600/50 hover:border-indigo-500/50 shadow-lg backdrop-blur-md transition-all group" title={t.settings}>
                  <SettingsIcon className="w-4 h-4 sm:w-5 sm:h-5 group-hover:rotate-90 transition-transform" />
                </button>
                {gameState.mode === 'online' && (
                  <button onClick={requestResync} disabled={resyncPending} className={`p-1.5 sm:p-2 rounded-full border shadow-lg backdrop-blur-md transition-all group ${resyncPending ? 'bg-amber-900/60 border-amber-500/50 text-amber-300 cursor-wait' : 'bg-slate-900/80 hover:bg-amber-900/80 border-slate-600/50 hover:border-amber-500/50 text-amber-300 hover:text-white'}`} title={t.btnResync}>
                    <RefreshIcon className={`w-3.5 h-3.5 sm:w-4 sm:h-4 ${resyncPending ? 'animate-spin' : 'group-hover:rotate-180 transition-transform'}`} />
                  </button>
                )}
              </div>
            </div>
          </div>

          {/* ================================ */}

          {gameState.tallyState !== 'none' && gameState.tallyState !== 'done' && (
            <div className="absolute inset-0 z-[100] flex items-center justify-center pointer-events-none">
               <div className="bg-slate-900/95 text-white px-6 py-4 rounded-full text-lg sm:text-xl font-bold animate-pulse shadow-2xl border border-slate-500 text-center">
                  {gameState.tallyState === 'start' && <span>{t.gameOver}</span>}
                  {gameState.tallyState.startsWith('tally_') && (() => {
                    const tId = parseInt(gameState.tallyState.split('_')[1]); const cInfo = P_COLORS[tId];
                    return <span>{t.tallyBase} {getPlayerLabel(tId)}... <span className={`${cInfo.text} ml-2`}>+{gameState.board.filter(c => c && c.player === tId).length}</span></span>;
                  })()}
               </div>
            </div>
          )}

          {gameState.tallyState === 'done' && (
            <div className="absolute inset-0 z-[200] flex items-center justify-center bg-slate-950/80 backdrop-blur-md">
              <div className="bg-slate-900 border border-indigo-500/50 p-6 sm:p-8 rounded-3xl shadow-[0_0_50px_rgba(99,102,241,0.2)] flex flex-col items-center text-center w-full max-w-xl mx-4 max-h-[90vh] overflow-y-auto">
                {gameState.mode === 'challenge' ? (
                  <React.Fragment>
                    {sortedPlayers[0] === 1 && gameState.scores[1] >= gameState.scores[2] ? (
                      <React.Fragment>
                        <Trophy className="w-16 h-16 text-emerald-400 mb-2 drop-shadow-[0_0_15px_rgba(52,211,153,0.5)]" />
                        <h2 className="text-3xl font-black mb-4 text-emerald-300">{t.challengeSuccess}</h2>
                        <div className="text-lg text-slate-300 mb-6 bg-slate-800/50 px-6 py-4 rounded-xl border border-slate-600 w-full">
                          <p>{t.txtYou} <span className="text-indigo-300 font-bold">{gameState.scores[1]}</span> {t.txtVsAI} <span className="text-rose-300">{gameState.scores[2]}</span></p>
                          <p className="mt-2">{t.totalScore}: <span className="text-yellow-400 font-bold text-2xl">{gameState.challengeData.totalScore + gameState.scores[1]}</span></p>
                        </div>
                        <button onClick={nextChallengeLevel} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg transition-all">{gameState.challengeData.currentLevel >= 100 ? t.btnFinish100 : t.btnNextLvl}</button>
                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        <div className="w-16 h-16 rounded-full bg-rose-900/50 flex items-center justify-center mb-2 border-2 border-rose-500"><XIcon className="w-8 h-8 text-rose-400" /></div>
                        <h2 className="text-3xl font-black mb-4 text-rose-400">{t.challengeFail}</h2>
                        <div className="text-lg text-slate-300 mb-6 bg-slate-800/50 px-6 py-4 rounded-xl border border-slate-600 w-full">
                          <p>{t.totalScore}: <span className="text-yellow-400 font-bold text-2xl">{gameState.challengeData.totalScore + gameState.scores[1]}</span></p>
                        </div>
                        <button onClick={() => { setUploadStatus('idle'); setGameState(prev => ({...prev, mode: 'name_input', challengeData: {...prev.challengeData, totalScore: prev.challengeData.totalScore + gameState.scores[1]}})); }} className="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-lg transition-all">{t.btnSaveRecord}</button>
                      </React.Fragment>
                    )}
                  </React.Fragment>
                ) : (
                  <React.Fragment>
                    <Trophy className="w-12 h-12 text-yellow-400 mb-2 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]" />
                    <h2 className="text-2xl sm:text-3xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500">{t.rankTitle}</h2>
                    {sortedTeams ? (
                      <div className="w-full flex flex-col gap-3 mb-6">
                        {sortedTeams.map((team, tIdx) => {
                          const isTeamA = team === 'A';
                          const teamPlayers = sortedPlayers.filter(pId => gameState.teams[pId] === team);
                          return (
                            <div key={team} className={`rounded-2xl border-2 overflow-hidden transition-all ${tIdx === 0 ? (isTeamA ? 'border-white shadow-lg scale-105' : 'border-slate-300 shadow-lg scale-105') : 'border-slate-600'}`}>
                              <div className={`flex justify-between items-center px-4 py-2.5 ${isTeamA ? 'bg-slate-100 text-slate-900' : 'bg-neutral-950 text-slate-100'}`}>
                                <div className="flex items-center gap-2 font-black text-base sm:text-lg"><span className="text-xl">{tIdx === 0 ? '👑' : tIdx + 1}</span><span>{isTeamA ? t.teamA : t.teamB}</span></div>
                                <span className="text-xl sm:text-2xl font-black">{teamTotals[team]}</span>
                              </div>
                              <div className="flex flex-col divide-y divide-slate-700 bg-slate-800/50">
                                {teamPlayers.map(pId => {
                                  const cInfo = P_COLORS[pId];
                                  return (
                                    <div key={pId} className="flex justify-between items-center px-4 py-2 sm:py-2.5">
                                      <span className={`font-bold ${cInfo.text}`}>{getPlayerLabel(pId)}</span>
                                      <span className={`text-lg sm:text-xl font-black ${cInfo.bgText}`}>{gameState.scores[pId]}</span>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    ) : (
                      <div className="w-full flex flex-col gap-2 mb-6">
                        {sortedPlayers.map((pId, idx) => {
                          const cInfo = P_COLORS[pId];
                          return (
                            <div key={pId} className={`flex justify-between items-center p-3 rounded-xl border ${playerRanks[pId] === 1 ? `bg-${cInfo.base}-900/40 border-${cInfo.base}-400 scale-105 shadow-lg` : 'bg-slate-800/50 border-slate-600'}`}>
                              <div className="flex items-center gap-3"><span className="text-2xl">{playerRanks[pId]===1?'👑':playerRanks[pId]}</span><span className={`font-bold ${cInfo.text}`}>{getPlayerLabel(pId)}</span></div>
                              <span className={`text-2xl font-black ${cInfo.bgText}`}>{gameState.scores[pId]}</span>
                            </div>
                          )
                        })}
                      </div>
                    )}
                    <div className="flex w-full space-x-4">
                      {((gameState.mode==='online' && myPlayerId===1) || gameState.mode!=='online') && <button onClick={handlePlayAgain} className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold flex items-center justify-center space-x-2"><RotateCcw className="w-5 h-5" /> <span>{t.btnPlayAgain}</span></button>}
                      <button onClick={leaveOnlineRoom} className="flex-1 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold flex items-center justify-center space-x-2"><Home className="w-5 h-5" /> <span>{t.back}</span></button>
                    </div>
                  </React.Fragment>
                )}
              </div>
            </div>
          )}

          {/* === 玩家面板渲染函式 === */}
          {(() => {
            const total = gameState.totalPlayers;
            // 決定哪些玩家在哪個區域
            // portrait: p1=底, p2=頂, p3=頂右, p4=頂右
            // landscape: p1=右, p2=左, p3=左下, p4=左下
            const renderPlayerPanel = (pId, dir) => {
              const cInfo = P_COLORS[pId];
              const isAiThinking = aiThinkingPlayer === pId;
              if (!gameState.hands[pId]) return null;
              const isActive = gameState.turn === pId && gameState.tallyState === 'none';
              const isRow = (dir === 'top' || dir === 'bottom');
              return (
                <div key={pId} className={`flex ${isRow ? 'flex-col items-center' : 'flex-row items-center'} gap-1 p-1.5 rounded-2xl transition-all duration-300 shrink-0 ${getPlayerContainerStyle(pId)}`}>
                  {(dir === 'bottom' || dir === 'right') && (
                    <div className={`relative flex flex-row justify-between items-center gap-2 bg-slate-950/60 rounded-full border border-${cInfo.base}-500/30 px-3 py-1 shadow-md ${isRow ? 'w-full' : 'flex-col h-full py-3 px-1'}`}>
                      <span className={`player-name-text font-bold truncate max-w-[100px] sm:max-w-[140px] ${cInfo.text}`}>{getPlayerLabel(pId)}</span>
                      {isAiThinking && <span className="text-[9px] font-bold text-yellow-300 animate-ai-think whitespace-nowrap bg-slate-900/80 px-1.5 py-0.5 rounded-full border border-yellow-500/50">{t.txtThinking}</span>}
                      <span className={`player-score-text font-black ${cInfo.bgText}`}>{gameState.scores[pId]}</span>
                    </div>
                  )}
                  <div className={`flex ${isRow ? 'flex-row' : 'flex-col'} justify-center gap-1 sm:gap-1.5`}>
                    {gameState.hands[pId].map((phase, i) => renderCard(phase, i, pId))}
                  </div>
                  {(dir === 'top' || dir === 'left') && (
                    <div className={`relative flex flex-row justify-between items-center gap-2 bg-slate-950/60 rounded-full border border-${cInfo.base}-500/30 px-3 py-1 shadow-md ${isRow ? 'w-full' : 'flex-col h-full py-3 px-1'}`}>
                      <span className={`player-name-text font-bold truncate max-w-[100px] sm:max-w-[140px] ${cInfo.text}`}>{getPlayerLabel(pId)}</span>
                      {isAiThinking && <span className="text-[9px] font-bold text-yellow-300 animate-ai-think whitespace-nowrap bg-slate-900/80 px-1.5 py-0.5 rounded-full border border-yellow-500/50">{t.txtThinking}</span>}
                      <span className={`player-score-text font-black ${cInfo.bgText}`}>{gameState.scores[pId]}</span>
                    </div>
                  )}
                </div>
              );
            };

            // 棋盤元件
            const boardEl = (
              <div className="relative bg-slate-900/40 rounded-[2rem] sm:rounded-[3rem] backdrop-blur-md border border-slate-700/50 shadow-2xl shrink-0 board-container flex items-center justify-center">
                {gameState.currentScoringEvent && (
                  <div key={gameState.currentScoringEvent.id} className="absolute inset-0 flex items-center justify-center pointer-events-none z-[100]">
                    <div className="animate-float-score flex flex-col items-center">
                      <span className={`text-[length:clamp(1.5rem,5vmin,3rem)] font-black tracking-widest scoring-text pb-1 ${currentScoreTextClass}`}>{gameState.currentScoringEvent.name}</span>
                      <span className={`text-[length:clamp(2rem,6vmin,4rem)] font-black scoring-text mt-0 drop-shadow-md ${currentScoreNumClass}`}>+{gameState.currentScoringEvent.points}</span>
                    </div>
                  </div>
                )}
                <svg viewBox="0 0 100 100" className="absolute inset-0 w-full h-full pointer-events-none z-0 overflow-visible">
                  {currentBoardConfig.edges.map((edge, i) => {
                    const n1 = currentBoardConfig.nodes[edge[0]]; const n2 = currentBoardConfig.nodes[edge[1]];
                    let isScoringEdge = false;
                    if (gameState.currentScoringEvent) {
                      const ev = gameState.currentScoringEvent;
                      if (ev.type === 'sequence') { const idx1 = ev.cells.indexOf(edge[0]); const idx2 = ev.cells.indexOf(edge[1]); if (idx1 !== -1 && idx2 !== -1 && Math.abs(idx1 - idx2) === 1) isScoringEdge = true; }
                      else { isScoringEdge = ev.cells.includes(edge[0]) && ev.cells.includes(edge[1]); }
                    }
                    let strokeColor = "rgba(71, 85, 105, 0.3)"; let strokeW = "1.2";
                    if (isScoringEdge) { strokeColor = `rgba(${P_COLORS[gameState.turn].hex}, 0.9)`; strokeW = "2.5"; }
                    return <line key={`edge-${i}`} x1={n1.x} y1={n1.y} x2={n2.x} y2={n2.y} stroke={strokeColor} strokeWidth={strokeW} strokeLinecap="round" className="transition-all duration-500" style={isScoringEdge ? { filter: `drop-shadow(0px 0px 4px ${strokeColor})` } : {}} />;
                  })}
                </svg>
                {gameState.board.map((cell, idx) => {
                  const node = currentBoardConfig.nodes[idx];
                  return (
                    <div key={`node-${idx}`} className={`absolute z-10 flex items-center justify-center transition-colors ${cell === null ? 'border-2 border-dashed border-slate-500/50 bg-slate-800/30 hover:bg-slate-700/60 cursor-pointer backdrop-blur-sm shadow-inner rounded-full sm:rounded-2xl' : ''}`} style={{ left: `${node.x}%`, top: `${node.y}%`, transform: 'translate(-50%, -50%)', width: `min(var(--card-w), calc(var(--board-size) * ${currentBoardConfig.cardScale * 0.72}))`, height: `min(var(--card-h), calc(var(--board-size) * ${currentBoardConfig.cardScale * 0.72} * 1.25))`, '--cell-w': `min(var(--card-w), calc(var(--board-size) * ${currentBoardConfig.cardScale * 0.72}))` }} onClick={(e) => { e.stopPropagation(); if (cell === null && gameState.selectedCardIdx !== null && (!gameState.isAnimating)) { const pType = gameState.playersInfo[gameState.turn].type; const canPlay = (gameState.mode === 'online') ? (gameState.turn === myPlayerId && !isConnUnstable) : pType !== 'ai'; if (canPlay) playCard(gameState.selectedCardIdx, idx, false); } }}>
                      {cell && renderCard(cell.phase, -1, cell.player, true, idx)}
                    </div>
                  );
                })}
              </div>
            );

            if (total === 2) {
              // portrait: 上(p2) 棋盤 下(p1) — flex-col
              // landscape: 左(p2) 棋盤 右(p1) — flex-row
              return (
                <React.Fragment>
                  {/* portrait */}
                  <div className="portrait:flex landscape:hidden z-10 w-full flex-1 min-h-0 flex flex-col items-center justify-center gap-2 overflow-visible pt-14 sm:pt-20 pb-2 px-2">
                    {renderPlayerPanel(2, 'top')}
                    {boardEl}
                    {renderPlayerPanel(1, 'bottom')}
                  </div>
                  {/* landscape */}
                  <div className="portrait:hidden landscape:flex z-10 w-full flex-1 min-h-0 flex flex-row items-center justify-center gap-2 overflow-visible pt-14 pb-2 px-2">
                    <div className="flex flex-col justify-center shrink-0">{renderPlayerPanel(2, 'left')}</div>
                    {boardEl}
                    <div className="flex flex-col justify-center shrink-0">{renderPlayerPanel(1, 'right')}</div>
                  </div>
                </React.Fragment>
              );
            }
            if (total === 3) {
              return (
                <React.Fragment>
                  {/* portrait: 上列(p2,p3) + 棋盤 + 下(p1) */}
                  <div className="portrait:flex landscape:hidden z-10 w-full flex-1 min-h-0 flex flex-col items-center justify-center gap-1.5 overflow-visible pt-14 sm:pt-20 pb-2 px-2">
                    <div className="flex flex-row gap-2 justify-center w-full">
                      {renderPlayerPanel(2, 'top')}
                      {renderPlayerPanel(3, 'top')}
                    </div>
                    {boardEl}
                    {renderPlayerPanel(1, 'bottom')}
                  </div>
                  {/* landscape: 左(p2上,p3下) + 棋盤 + 右(p1) */}
                  <div className="portrait:hidden landscape:flex z-10 w-full flex-1 min-h-0 flex flex-row items-center justify-center gap-2 overflow-visible pt-14 pb-2 px-2">
                    <div className="flex flex-col gap-2 justify-center shrink-0">
                      {renderPlayerPanel(2, 'left')}
                      {renderPlayerPanel(3, 'left')}
                    </div>
                    {boardEl}
                    <div className="flex flex-col justify-center shrink-0">{renderPlayerPanel(1, 'right')}</div>
                  </div>
                </React.Fragment>
              );
            }
            // total === 4
            return (
              <React.Fragment>
                {/* portrait: 上列(p3,p4) + 棋盤 + 下列(p1,p2) */}
                <div className="portrait:flex landscape:hidden z-10 w-full flex-1 min-h-0 flex flex-col items-center justify-center gap-1.5 overflow-visible pt-14 sm:pt-20 pb-2 px-2">
                  <div className="flex flex-row gap-2 justify-center w-full">
                    {renderPlayerPanel(3, 'top')}
                    {renderPlayerPanel(4, 'top')}
                  </div>
                  {boardEl}
                  <div className="flex flex-row gap-2 justify-center w-full">
                    {renderPlayerPanel(1, 'bottom')}
                    {renderPlayerPanel(2, 'bottom')}
                  </div>
                </div>
                {/* landscape: 左列(p2,p3) + 棋盤 + 右列(p1,p4) */}
                <div className="portrait:hidden landscape:flex z-10 w-full flex-1 min-h-0 flex flex-row items-center justify-center gap-2 overflow-visible pt-14 pb-2 px-2">
                  <div className="flex flex-col gap-2 justify-center shrink-0">
                    {renderPlayerPanel(2, 'left')}
                    {renderPlayerPanel(3, 'left')}
                  </div>
                  {boardEl}
                  <div className="flex flex-col gap-2 justify-center shrink-0">
                    {renderPlayerPanel(1, 'right')}
                    {renderPlayerPanel(4, 'right')}
                  </div>
                </div>
              </React.Fragment>
            );
          })()}
        </div>
      );
    }

    function mountApp() {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    }
    mountApp();
  </script>

  <script type="module">
    // Wait for Firebase module to load, then manually transpile and run the app
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, getDocs, addDoc, runTransaction, query, orderBy, limit, deleteDoc, getCountFromServer } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    window._firebase = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, getDocs, addDoc, runTransaction, query, orderBy, limit, deleteDoc, getCountFromServer };

    function runApp() {
      try {
        const src = document.getElementById('app-src').textContent;
        const compiled = Babel.transform(src, {
          presets: [['react', { runtime: 'classic' }]]
        }).code;
        // eslint-disable-next-line no-eval
        (0, eval)(compiled);
      } catch(e) {
        document.getElementById('root').innerHTML = '<div style="color:red;padding:20px;font-family:monospace">錯誤：' + e.message + '</div>';
        console.error(e);
      }
    }

    if (typeof Babel !== 'undefined') {
      runApp();
    } else {
      // Wait for Babel to load
      const babelScript = document.querySelector('script[src*="babel"]');
      babelScript.addEventListener('load', runApp);
    }
  </script>
  <script>
    // 動態縮放：確保遊戲在極小螢幕上也能完整顯示
    (function() {
      function applyScale() {
        const minW = 320; // minimum design width
        const w = window.innerWidth;
        if (w < minW) {
          const scale = w / minW;
          document.documentElement.style.fontSize = (13 * scale) + 'px';
        } else {
          document.documentElement.style.fontSize = '';
        }
      }
      applyScale();
      window.addEventListener('resize', applyScale);
      window.addEventListener('orientationchange', function() { setTimeout(applyScale, 200); });
    })();
  </script>

</body>
  </html>
