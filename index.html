<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Board Game Engine v2.0</title>
    <style>
        /* 四方 UI 佈局 CSS */
        :root {
            --p1-color: #6366f1; /* Indigo */
            --p2-color: #f43f5e; /* Rose */
            --p3-color: #10b981; /* Emerald */
            --p4-color: #f59e0b; /* Amber */
        }
        /* 此處省略詳細樣式，保留結構預覽 */
        .player-info { border: 2px solid #ccc; padding: 10px; }
        .active { border-color: gold; box-shadow: 0 0 10px gold; }
    </style>
</head>
<body>

<div id="game-lobby">
    <h2>連線大廳</h2>
    <div id="room-setup">
        <label>玩家人數: <select id="player-count">
            <option value="2">2 人</option>
            <option value="3">3 人</option>
            <option value="4">4 人</option>
        </select></label>
        <button onclick="startGame()">開始遊戲 (自動填補 AI)</button>
    </div>
</div>

<div id="game-container" style="display:none;">
    <div id="p1-ui" class="player-info">P1 (Blue)</div>
    <div id="p2-ui" class="player-info">P2 (Red)</div>
    <div id="p3-ui" class="player-info">P3 (Green)</div>
    <div id="p4-ui" class="player-info">P4 (Yellow)</div>

    <div id="board-container">
        </div>
</div>

<script>
    // 遊戲核心數據
    const GameState = {
        players: [],
        currentPlayerIndex: 0,
        playerCount: 2,
        isOnline: false,
        boards: {
            mode3: [/* 5張15格棋盤數據 */],
            mode4: [/* 5張20格棋盤數據 */]
        }
    };

    // 1. 初始化人數與 AI 替補
    function initPlayers(count) {
        GameState.players = [];
        for (let i = 1; i <= count; i++) {
            GameState.players.push({
                id: i,
                type: 'human', // 之後可切換為 'ai'
                color: getPlayerColor(i),
                position: 0
            });
        }
        // 若人數不足，自動填補 AI 的邏輯在此處實作
    }

    // 2. 棋盤鎖定與選擇機制
    function selectBoard(count) {
        if (count === 3) return GameState.boards.mode3[Math.floor(Math.random()*5)];
        if (count === 4) return GameState.boards.mode4[Math.floor(Math.random()*5)];
        // 預設 2 人模式邏輯...
    }

    // 3. 連線大廳準備機制 (Socket.io 邏輯預留)
    function onPlayerReady(id) {
        // 更新 UI 與準備狀態
    }

    // 啟動遊戲
    function startGame() {
        const count = parseInt(document.getElementById('player-count').value);
        GameState.playerCount = count;
        initPlayers(count);
        // 切換 UI，渲染棋盤...
        document.getElementById('game-lobby').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        console.log(`遊戲開始：${count} 人模式`);
    }

    function getPlayerColor(index) {
        const colors = ['#6366f1', '#f43f5e', '#10b981', '#f59e0b'];
        return colors[index - 1];
    }
</script>
</body>
</html>
