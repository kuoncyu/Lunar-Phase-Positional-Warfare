  <style>
    body, html { margin: 0; padding: 0; background-color: #020617; overflow: hidden; touch-action: none; font-family: 'Noto Sans TC', sans-serif; }
    
    /* === 響應式棋盤引擎 === */
    .game-wrapper {
      --board-size-portrait: min(calc(100vw - 32px), calc((100dvh - 280px) / var(--portrait-mult)));
      --board-size-landscape: min(calc(100dvh - 40px), calc((100vw - 300px) / var(--landscape-mult)));
    }
    @media (orientation: portrait) { .game-wrapper { --board-size: var(--board-size-portrait); } }
    @media (orientation: landscape) { .game-wrapper { --board-size: var(--board-size-landscape); } }
    
    .board-container { width: var(--board-size); height: var(--board-size); }
    .card-item { width: calc(var(--board-size) * var(--card-scale)); height: calc(var(--board-size) * var(--card-scale) * 1.25); }
    .card-text { font-size: max(9px, calc(var(--board-size) * var(--card-scale) * 0.15)); }

    /* === 結算特效文字 === */
    .scoring-text { font-family: 'Zen Maru Gothic', sans-serif; paint-order: stroke fill; line-height: 1.2; }
    .score-identical { background: linear-gradient(180deg, #a5f3fc 0%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #164e63; filter: drop-shadow(0px 0px 8px rgba(6,182,212,0.9)); }
    .score-num-identical { color: #22d3ee; -webkit-text-stroke: 1px #164e63; }
    .score-complementary { background: linear-gradient(180deg, #fef08a 0%, #eab308 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #713f12; filter: drop-shadow(0px 0px 8px rgba(234,179,8,0.9)); }
    .score-num-complementary { color: #facc15; -webkit-text-stroke: 1px #713f12; }
    .score-sequence { background: linear-gradient(180deg, #f5d0fe 0%, #d946ef 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; -webkit-text-stroke: 1.5px #4a044e; filter: drop-shadow(0px 0px 8px rgba(217,70,239,0.9)); }
    .score-num-sequence { color: #e879f9; -webkit-text-stroke: 1px #4a044e; }

    @keyframes score-pulse { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.15); filter: brightness(1.3); box-shadow: 0 0 40px rgba(254,240,138,1); } 100% { transform: scale(1); filter: brightness(1); } }
    .animate-score-pulse { animation: score-pulse 1.5s ease-in-out forwards; }
    @keyframes float-score { 0% { opacity: 0; transform: translateY(30px) scale(0.5); } 15%, 85% { opacity: 1; transform: translateY(0) scale(1.1); } 100% { opacity: 0; transform: translateY(-30px) scale(0.8); } }
    .animate-float-score { animation: float-score 1.5s ease-in-out forwards; }
    @keyframes ai-think { 0%, 100% { opacity: 0.5; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
    .animate-ai-think { animation: ai-think 1s infinite ease-in-out; }
    
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); border-radius: 4px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.5); border-radius: 4px; }
    
    .keyboard-btn { transition: all 0.1s; border-bottom-width: 4px; }
    .keyboard-btn:active { transform: translateY(4px); border-bottom-width: 0px; margin-top: 4px; }
  </style>
</head>

        const nextBId = getChallengeBoardId(nextLevel);
        const initData = generateInitData('challenge', 2, 1, nextBId);
        initData.playersInfo[2].difficulty = getChallengeAiDifficulty(nextLevel);
        setGameState(prev => ({ ...prev, ...initData, turn: 1, finalBaseScores: null, isAnimating: false, gameOver: false, tallyState: 'none', challengeData: { currentLevel: nextLevel, totalScore: accScore } }));
        setAiThinkingPlayer(null);
      };

      const submitChallengeScore = async () => {
        if (!user || !db || playerName.trim().length < 3) return;
        try { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'moonphase_leaderboard'), { name: playerName.toUpperCase(), level: gameState.challengeData.currentLevel, totalScore: gameState.challengeData.totalScore, uid: user.uid, ts: Date.now() }); setPlayerName(''); setGameState(prev => ({...prev, mode: 'leaderboard'})); } catch(e) { console.error(e); }
      };

      // --- Online Lobby Logic ---
      const createRoom = async () => {
        if (!user || !db) return alert("Firebase Offline");
        const newRoomId = Math.floor(100000 + Math.random() * 900000).toString();
        try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', newRoomId), { status: 'waiting', createdAt: Date.now(), host: user.uid, maxPlayers: onlineMaxPlayers, players: { [user.uid]: { pId: 1, ready: true } }, round: 1 }); setRoomId(newRoomId); setMyPlayerId(1); setGameState(prev => ({ ...prev, mode: 'lobby_wait' })); } catch (e) { console.error(e); }
      };
      
      const joinRoom = async (code) => {
        if (!user || !code || !db) return;
        try {
          const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', code); const snap = await getDoc(roomRef);
          if (snap.exists() && snap.data().status === 'waiting') {
            const data = snap.data(); const currentPlayers = Object.keys(data.players).length;
            if (currentPlayers >= data.maxPlayers) return alert("房間已滿");
            let usedPids = Object.values(data.players).map(p=>p.pId); let newPid = 2; while(usedPids.includes(newPid)) newPid++;
            await updateDoc(roomRef, { [`players.${user.uid}`]: { pId: newPid, ready: false } });
            setRoomId(code); setMyPlayerId(newPid); setGameState(prev => ({ ...prev, mode: 'lobby_wait' }));
          } else { alert("找不到房間，或遊戲已開始"); }
        } catch (e) { console.error(e); }
      };

      const toggleReadyOnline = async () => {
        if (!roomId || !user || !db || !onlineRoomData) return;
        const isReady = onlineRoomData.players[user.uid].ready;
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId), { [`players.${user.uid}.ready`]: !isReady });
      };

      const startOnlineGame = async () => {
        if (!roomId || !user || !db || !onlineRoomData) return;
        const humanCount = Object.keys(onlineRoomData.players).length; const totalP = onlineRoomData.maxPlayers;
        let bId = getActualBoardId(totalP); const initData = generateInitData('online', totalP, humanCount, bId);
        for(let i=1; i<=totalP; i++) initData.playersInfo[i] = { type: 'ai', difficulty: 'medium' };
        Object.entries(onlineRoomData.players).forEach(([uid, p]) => { initData.playersInfo[p.pId] = { type: 'human', uid }; });
        try { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomId), { status: 'playing', initialState: initData, round: (onlineRoomData.round || 1) + 1, lastMove: null }); } catch (e) { console.error(e); }
      };

      const handlePlayAgain = () => { if (gameState.mode === 'online' && myPlayerId === 1) { startOnlineGame(); } else if (gameState.mode !== 'online') { initGame(gameState.mode); } };

      // --- Core Game Engine ---
      const getNextTurn = (curr, hands) => { let n = curr; let count = 0; do { n = (n % gameState.totalPlayers) + 1; count++; } while (hands[n].length === 0 && count < gameState.totalPlayers); return n; };
      const drawCard = (deck, hand) => (deck.length === 0 ? { newDeck: deck, finalHand: hand } : { newDeck: deck.slice(1), finalHand: [...hand, deck[0]] });

      const applyResolveTurn = (prevState, captured, newHand, turn) => {
        let newBoard = [...prevState.board]; captured.forEach(idx => { if (newBoard[idx]) newBoard[idx].player = turn; });
        let newHands = {...prevState.hands}; let newDecks = {...prevState.decks};
        const { newDeck, finalHand } = drawCard(prevState.decks[turn], newHand);
        newHands[turn] = finalHand; newDecks[turn] = newDeck;
        
        const isBoardFull = !newBoard.includes(null); const allHandsEmpty = Object.values(newHands).every(h => h.length === 0);
        const gameOver = isBoardFull || allHandsEmpty;
        let finalBaseScores = prevState.finalBaseScores; if (gameOver && !finalBaseScores) finalBaseScores = { ...prevState.scores };
        const nextT = gameOver ? turn : getNextTurn(turn, newHands);

        return { board: newBoard, decks: newDecks, hands: newHands, isAnimating: false, turn: nextT, gameOver, finalBaseScores, tallyState: gameOver ? 'start' : 'none', scoringQueue: [], currentScoringEvent: null, pendingResolveInfo: null };
      };

      const playCard = useCallback((cardIdx, boardIdx, isRemote = false) => {
        audioManager.init(); audioManager.playPlaceCard();
        setGameState(prev => {
          if (prev.isAnimating || prev.gameOver || prev.board[boardIdx] !== null) return prev;
          const hand = prev.hands[prev.turn]; if (hand[cardIdx] === undefined) return prev;
          
          const playedPhase = hand[cardIdx]; let newHand = [...hand]; newHand.splice(cardIdx, 1);
          let newBoard = [...prev.board]; newBoard[boardIdx] = { phase: playedPhase, player: 0 }; 

          if (!isRemote && prev.mode === 'online' && roomIdRef.current && db) {
            updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moonphase_rooms', roomIdRef.current), { lastMove: { cardIdx, boardIdx, player: prev.turn, ts: Date.now() } }).catch(console.error);
          }

          const edges = (prev.mode === 'challenge' ? ALL_BOARDS : getBoardPool(prev.totalPlayers))[prev.boardType].edges; 
          let events = []; let totalCaptured = new Set();
          getNeighbors(boardIdx, edges).forEach(n => {
            const neighbor = newBoard[n];
            if (neighbor) {
              if (isIdentical(playedPhase, neighbor.phase)) { events.push({ id: `ev-${Date.now()}-${n}`, type: 'identical', cells: [boardIdx, n], points: 1, name: '相同月相' }); totalCaptured.add(boardIdx); totalCaptured.add(n); } 
              else if (isMatch(playedPhase, neighbor.phase)) { events.push({ id: `ev-${Date.now()}-${n}`, type: 'complementary', cells: [boardIdx, n], points: 2, name: '互補滿月' }); totalCaptured.add(boardIdx); totalCaptured.add(n); }
            }
          });
          findSequences(newBoard, boardIdx, edges).forEach((seq, i) => { events.push({ id: `seq-${Date.now()}-${i}`, type: 'sequence', cells: seq, points: seq.length, name: '月相變化' }); seq.forEach(n => totalCaptured.add(n)); });

          return { ...prev, board: newBoard, hands: {...prev.hands, [prev.turn]: newHand}, selectedCardIdx: null, isAnimating: true, scoringQueue: events.length > 0 ? events.slice(1) : [], currentScoringEvent: events.length > 0 ? events[0] : null, pendingResolveInfo: { captured: Array.from(totalCaptured), newHand, turn: prev.turn } };
        });
      }, []);

      useEffect(() => {
        if (!gameState.isAnimating) return;
        if (gameState.currentScoringEvent) {
          const type = gameState.currentScoringEvent.type;
          if (type === 'identical') audioManager.playIdentical(); else if (type === 'complementary') audioManager.playComplementary(); else if (type === 'sequence') audioManager.playSequence();
          const timer = setTimeout(() => { setGameState(prev => { let newS = { ...prev.scores }; newS[prev.pendingResolveInfo.turn] += prev.currentScoringEvent.points; return { ...prev, scores: newS, currentScoringEvent: null }; }); }, 1500); return () => clearTimeout(timer);
        } else if (gameState.pendingResolveInfo) {
          if (gameState.scoringQueue.length > 0) { const gapTimer = setTimeout(() => { setGameState(prev => ({ ...prev, currentScoringEvent: prev.scoringQueue[0], scoringQueue: prev.scoringQueue.slice(1) })); }, 100); return () => clearTimeout(gapTimer); } 
          else { const finishTimer = setTimeout(() => { setGameState(prev => { if (!prev.pendingResolveInfo) return prev; return { ...prev, ...applyResolveTurn(prev, prev.pendingResolveInfo.captured, prev.pendingResolveInfo.newHand, prev.pendingResolveInfo.turn) }; }); }, 200); return () => clearTimeout(finishTimer); }
        }
      }, [gameState.currentScoringEvent, gameState.isAnimating, gameState.scoringQueue.length, gameState.pendingResolveInfo]);

      useEffect(() => {
        if (gameState.tallyState === 'start') { setTimeout(() => setGameState(p => ({ ...p, tallyState: 'tally_1' })), 1000); } 
        else if (gameState.tallyState && gameState.tallyState.startsWith('tally_')) {
          const pId = parseInt(gameState.tallyState.split('_')[1]);
          audioManager.playTone(880, 'sine', 0.1, 0.2); 
          setGameState(p => { const territory = p.board.filter(c => c && c.player === pId).length; return { ...p, scores: { ...p.scores, [pId]: p.scores[pId] + territory } }; });
          setTimeout(() => {
            const nextP = pId + 1;
            if (nextP <= gameState.totalPlayers) setGameState(p => ({ ...p, tallyState: `tally_${nextP}` }));
            else { 
              setGameState(p => ({ ...p, tallyState: 'done' })); 
              if (gameState.mode === 'challenge') { if(gameState.scores[1] + gameState.board.filter(c=>c&&c.player===1).length <= gameState.scores[2] + gameState.board.filter(c=>c&&c.player===2).length) audioManager.playLose(); else audioManager.playWin(); }
              else { audioManager.playWin(); }
            }
          }, 1200);
        }
      }, [gameState.tallyState, gameState.totalPlayers, gameState.mode]);

      // --- AI Logic (With Thinking Simulation) ---
      useEffect(() => {
        if (gameState.gameOver || gameState.isAnimating || gameState.mode === 'menu') { setAiThinkingPlayer(null); return; }
        const currentP = gameState.playersInfo[gameState.turn];
        if (currentP && currentP.type === 'ai') {
          setAiThinkingPlayer(gameState.turn);
          const thinkTime = Math.random() * 1500 + 1000; // AI pauses for 1 to 2.5 seconds
          const timer = setTimeout(() => {
            const edges = (gameState.mode === 'challenge' ? ALL_BOARDS : getBoardPool(gameState.totalPlayers))[gameState.boardType].edges;
            const emptyCells = gameState.board.map((c, i) => c === null ? i : -1).filter(i => i !== -1);
            const myHand = gameState.hands[gameState.turn];
            if (myHand && myHand.length > 0 && emptyCells.length > 0) {
              let allMoves = [];
              myHand.forEach((phase, cardIdx) => {
                emptyCells.forEach(boardIdx => {
                  let simBoard = [...gameState.board]; simBoard[boardIdx] = { phase, player: 0 };
                  let simCapture = new Set(); let comboPts = 0;
                  getNeighbors(boardIdx, edges).forEach(n => {
                    const neighbor = simBoard[n];
                    if (neighbor) {
                      if (isIdentical(phase, neighbor.phase)) { simCapture.add(boardIdx); simCapture.add(n); comboPts += 1; }
                      else if (isMatch(phase, neighbor.phase)) { simCapture.add(boardIdx); simCapture.add(n); comboPts += 2; }
                    }
                  });
                  findSequences(simBoard, boardIdx, edges).forEach(seqCells => { seqCells.forEach(n => simCapture.add(n)); comboPts += seqCells.length; });
                  let pts = comboPts; simCapture.forEach(idx => { if (gameState.board[idx] && gameState.board[idx].player !== gameState.turn) pts += 1.5; });
                  allMoves.push({ cardIdx, boardIdx, score: pts });
                });
              });

              if (allMoves.length > 0) {
                let selectedMove = null; const diff = currentP.difficulty;
                if (diff === 'low') { selectedMove = allMoves[Math.floor(Math.random() * allMoves.length)]; } 
                else if (diff === 'medium') { if (Math.random() < 0.5) { allMoves.sort((a, b) => b.score - a.score); const bests = allMoves.filter(m => m.score === allMoves[0].score); selectedMove = bests[Math.floor(Math.random() * bests.length)]; } else { selectedMove = allMoves[Math.floor(Math.random() * allMoves.length)]; } } 
                else { allMoves.sort((a, b) => b.score - a.score); const bests = allMoves.filter(m => m.score === allMoves[0].score); selectedMove = bests[Math.floor(Math.random() * bests.length)]; }
                if (selectedMove) { setAiThinkingPlayer(null); playCard(selectedMove.cardIdx, selectedMove.boardIdx); }
              }
            }
          }, thinkTime); 
          return () => clearTimeout(timer);
        } else { setAiThinkingPlayer(null); }
      }, [gameState.turn, gameState.mode, gameState.isAnimating, gameState.gameOver, gameState.board, gameState.hands, gameState.boardType, playCard, gameState.playersInfo, gameState.totalPlayers]); 

      // --- Rendering Helpers ---
      const P_COLORS = {
        1: { base: 'indigo', hex: '99,102,241', text: 'text-indigo-300', bgText: 'text-indigo-100', border: 'border-indigo-500', ring: 'ring-indigo-400', bg: 'bg-indigo-900', shadow: 'rgba(99,102,241,0.5)' },
        2: { base: 'rose', hex: '244,63,94', text: 'text-rose-300', bgText: 'text-rose-100', border: 'border-rose-500', ring: 'ring-rose-400', bg: 'bg-rose-900', shadow: 'rgba(244,63,94,0.5)' },
        3: { base: 'emerald', hex: '52,211,153', text: 'text-emerald-300', bgText: 'text-emerald-100', border: 'border-emerald-500', ring: 'ring-emerald-400', bg: 'bg-emerald-900', shadow: 'rgba(52,211,153,0.5)' },
        4: { base: 'amber', hex: '251,191,36', text: 'text-amber-300', bgText: 'text-amber-100', border: 'border-amber-500', ring: 'ring-amber-400', bg: 'bg-amber-900', shadow: 'rgba(251,191,36,0.5)' }
      };

      const getPlayerLabel = (pId) => {
        let label = `玩家 ${pId}`; const pInfo = gameState.playersInfo[pId];
        if (pInfo && pInfo.type === 'ai') { label = `電腦${pId}`; if(pInfo.difficulty === 'low') label+='[低]'; else if(pInfo.difficulty === 'high') label+='[高]'; else label+='[中]'; }
        else if (gameState.mode === 'online' && pId === myPlayerId) label += ' (你)';
        else if (gameState.mode === 'local' || gameState.mode === 'challenge') { if(pId === 1) label+='(你)'; }
        return label;
      };

      const wrapperClass = `font-sans text-slate-100 selection:bg-indigo-500/30 transition-all duration-300 ${isPseudoFs ? 'fixed inset-0 z-[9999] bg-slate-950 w-screen h-[100dvh]' : 'w-full h-[100dvh] relative'}`;
      const FullscreenIcon = (nativeFs || isPseudoFs) ? Minimize : Maximize;
      const VolumeIcon = isMuted ? VolumeX : Volume2;

      // Global Top-Right Tools
      const GlobalTools = () => (
        <div className="fixed top-4 right-4 flex space-x-2 items-center z-[9999]">
          <div className="flex items-center space-x-2 bg-slate-800/80 backdrop-blur-md rounded-full px-3 py-1.5 border border-white/10 hover:border-white/30 transition-all shadow-lg">
            <button onClick={toggleMute} className="text-indigo-300 hover:text-white transition-colors flex-shrink-0"><VolumeIcon className="w-5 h-5" /></button>
            <input type="range" min="0" max="1" step="0.01" value={isMuted ? 0 : volume} onChange={handleVolumeChange} className="w-16 sm:w-24 h-1.5 bg-slate-900 rounded-lg appearance-none cursor-pointer accent-indigo-400 outline-none" />
          </div>
          <button onClick={toggleFullscreen} className="p-2 text-indigo-300 hover:text-white bg-slate-800/80 rounded-full border border-white/10 transition-colors flex-shrink-0 shadow-lg"><FullscreenIcon className="w-5 h-5" /></button>
        </div>
      );

      const renderCard = (phase, index, player, isBoard = false, boardIdx = -1) => {
        if (phase === undefined || phase === null) return null;
        const isNeutral = !isBoard || player === 0;
        const isTallying = gameState.tallyState === `tally_${player}` && isBoard;
        const isDimmed = isBoard && gameState.tallyState.startsWith('tally_') && !isTallying;
        const isSelected = !isBoard && gameState.selectedCardIdx === index && player === gameState.turn;
        const isScoringPulse = isBoard && gameState.currentScoringEvent?.cells.includes(boardIdx);
        
        let isHidden = false;
        if (!isBoard && index >= 0 && !gameState.gameOver) { 
          const pInfo = gameState.playersInfo[player];
          if (pInfo && pInfo.type === 'ai') isHidden = true;
          else if (gameState.mode === 'online' && player !== myPlayerId) isHidden = true; 
        }

        let cInfo = P_COLORS[player] || P_COLORS[1];
        let colorClasses = isNeutral ? (isBoard ? 'bg-slate-700/60 border-slate-500 ring-1 ring-slate-500' : 'bg-gradient-to-br from-slate-700/80 to-slate-800 border-slate-500 shadow-lg') : `${cInfo.bg}/90 ${cInfo.border} ring-2 ${cInfo.ring} shadow-[0_0_15px_${cInfo.shadow}]`;
        if (isHidden) colorClasses = 'bg-slate-800 border-slate-600 shadow-inner';
        
        let animClasses = '';
        if (isScoringPulse) animClasses = 'animate-score-pulse ring-[3px] ring-yellow-400 z-50'; 
        else if (isTallying) animClasses = `scale-110 shadow-[0_0_40px_${cInfo.shadow}] z-20 ring-[3px] ${cInfo.ring} transition-all duration-300`; 
        else if (isDimmed) animClasses = 'opacity-30 grayscale transition-all duration-500';

        return (
          <div key={isBoard ? `board-${boardIdx}` : `hand-${player}-${index}`} onClick={(e) => { e.stopPropagation(); const canSelect = (gameState.mode === 'online') ? (gameState.turn === myPlayerId && player === myPlayerId) : (player === gameState.turn && gameState.playersInfo[player].type !== 'ai'); if (!isBoard && canSelect && !gameState.isAnimating && gameState.tallyState === 'none') { setGameState(prev => ({ ...prev, selectedCardIdx: prev.selectedCardIdx === index ? null : index })); } }}
            className={`relative flex flex-col items-center justify-center rounded-lg sm:rounded-xl md:rounded-2xl transition-all duration-300 cursor-pointer border ${colorClasses} ${isSelected ? 'ring-2 ring-yellow-400 -translate-y-2 shadow-[0_10px_20px_rgba(250,204,21,0.4)]' : ''} ${animClasses} ${isBoard ? 'absolute inset-0 w-full h-full' : 'card-item shrink-0'}`}>
            {!isHidden ? ( <React.Fragment><MoonSvg phase={phase} className="w-[50%] h-[50%] mb-[2%]" /><span className={`card-text font-medium tracking-wide ${isNeutral ? 'text-slate-300' : cInfo.bgText}`}>{PHASES[phase].name}</span></React.Fragment> ) : ( <div className="w-[60%] h-[60%] rounded-full bg-slate-700/50 border border-slate-600/50 flex items-center justify-center"><span className="card-text text-slate-400 opacity-50 font-bold">?</span></div> )}
          </div>
        );
      };

      const getPlayerLayoutClasses = (pId, total) => {
        // 全新四方佈局：依據人數完美對齊四個角落，保證順時針出牌視覺動線
        if (total === 2) {
          // Portrait: 敵上我下 | Landscape: 敵左我右
          if (pId === 1) return "portrait:bottom-6 portrait:left-1/2 portrait:-translate-x-1/2 portrait:flex-col landscape:right-6 landscape:top-1/2 landscape:-translate-y-1/2 landscape:flex-col";
          if (pId === 2) return "portrait:top-6 portrait:left-1/2 portrait:-translate-x-1/2 portrait:flex-col-reverse landscape:left-6 landscape:top-1/2 landscape:-translate-y-1/2 landscape:flex-col-reverse";
        }
        if (total === 3) {
          // Portrait: 我下, 敵左上, 敵右上 | Landscape: 我右, 敵左下, 敵左上 (確保視覺順時針 1->2->3->1)
          if (pId === 1) return "portrait:bottom-6 portrait:left-1/2 portrait:-translate-x-1/2 portrait:flex-col landscape:right-6 landscape:top-1/2 landscape:-translate-y-1/2 landscape:flex-col";
          if (pId === 2) return "portrait:top-6 portrait:left-6 portrait:flex-col-reverse landscape:bottom-6 landscape:left-6 landscape:flex-col";
          if (pId === 3) return "portrait:top-6 portrait:right-6 portrait:flex-col-reverse landscape:top-6 landscape:left-6 landscape:flex-col-reverse";
        }
        if (total === 4) {
          // 皆適用: P1右下, P2左下, P3左上, P4右上
          if (pId === 1) return "bottom-6 right-6 flex-col";
          if (pId === 2) return "bottom-6 left-6 flex-col";
          if (pId === 3) return "top-6 left-6 flex-col-reverse";
          if (pId === 4) return "top-6 right-6 flex-col-reverse";
        }
        return "";
      };

      // === Non-Playing Views ===
      if (['menu', 'lobby', 'lobby_wait', 'name_input', 'leaderboard', 'local_setup'].includes(gameState.mode)) {
        return (
          <div className={`${wrapperClass} flex flex-col items-center justify-center overflow-y-auto`}>
            <StarryBackground />
            <GlobalTools />
            {showTutorial && <TutorialModal onClose={() => setShowTutorial(false)} />}

            {gameState.mode === 'name_input' && (
              <div className="z-10 flex flex-col items-center p-8 bg-slate-900/80 backdrop-blur-xl rounded-3xl border border-yellow-500/50 shadow-[0_0_40px_rgba(234,179,8,0.2)] relative w-full max-w-2xl my-10 mx-4 text-center">
                <Trophy className="w-16 h-16 text-yellow-400 mb-2 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]" />
                <h2 className="text-3xl font-black mb-1 text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500">挑戰結束！記錄你的傳奇</h2>
                <p className="text-indigo-200 mb-6">抵達層數：第 {gameState.challengeData.currentLevel} 層 &nbsp;|&nbsp; 總積分：{gameState.challengeData.totalScore}</p>
                <div className="w-full max-w-sm mx-auto bg-slate-950 p-4 rounded-xl border border-indigo-500/30 mb-2"><div className="h-12 flex items-center justify-center text-3xl font-[Rubik] tracking-[0.3em] font-bold text-white">{playerName || <span className="text-slate-600 animate-pulse">請輸入代號</span>}</div></div>
                <VirtualKeyboard onKeyPress={(k) => setPlayerName(p => p.length < 8 ? p + k : p)} onDelete={() => setPlayerName(p => p.slice(0, -1))} onSubmit={submitChallengeScore} disabledSubmit={playerName.length < 3} />
                <button onClick={() => setGameState(prev => ({...prev, mode: 'menu'}))} className="mt-6 text-slate-400 hover:text-white underline text-sm">不儲存，直接回首頁</button>
              </div>
            )}

            {gameState.mode === 'leaderboard' && (
              <div className="z-10 flex flex-col items-center p-6 sm:p-8 bg-slate-900/80 backdrop-blur-xl rounded-3xl border border-indigo-500/30 shadow-2xl relative w-full max-w-3xl my-10 mx-4 custom-scroll overflow-y-auto max-h-[80vh]">
                <h2 className="text-3xl sm:text-4xl font-black mb-6 text-center text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500 flex items-center gap-3"><Trophy className="w-8 h-8"/> 單人極限闖關排行榜</h2>
                {isLoadingLb ? ( <div className="text-indigo-300 animate-pulse py-10">載入資料中...</div> ) : (
                  <div className="w-full bg-slate-950/50 rounded-2xl border border-slate-700 overflow-hidden">
                    <table className="w-full text-left border-collapse">
                      <thead><tr className="bg-slate-800 text-slate-300 text-sm sm:text-base border-b border-slate-700"><th className="p-3 text-center w-16">排名</th><th className="p-3">代號</th><th className="p-3 text-center">層數</th><th className="p-3 text-right">積分</th></tr></thead>
                      <tbody>
                        {leaderboard.length === 0 ? ( <tr><td colSpan="4" className="text-center p-6 text-slate-500">目前尚無挑戰紀錄</td></tr> ) : (
                          leaderboard.map((entry, idx) => (
                            <tr key={entry.id} className={`border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors ${idx < 3 ? 'font-bold' : ''}`}>

                  let isScoringEdge = false;
                  if (gameState.currentScoringEvent) {
                    const ev = gameState.currentScoringEvent;
                    if (ev.type === 'sequence') { const idx1 = ev.cells.indexOf(edge[0]); const idx2 = ev.cells.indexOf(edge[1]); if (idx1 !== -1 && idx2 !== -1 && Math.abs(idx1 - idx2) === 1) isScoringEdge = true; } 
                    else { isScoringEdge = ev.cells.includes(edge[0]) && ev.cells.includes(edge[1]); }
                  }
                  let strokeColor = "rgba(71, 85, 105, 0.3)"; let strokeW = "1.2";
                  if (isScoringEdge) { strokeColor = `rgba(${P_COLORS[gameState.turn].hex}, 0.9)`; strokeW = "2.5"; }
                  return <line key={`edge-${i}`} x1={n1.x} y1={n1.y} x2={n2.x} y2={n2.y} stroke={strokeColor} strokeWidth={strokeW} strokeLinecap="round" className="transition-all duration-500" style={isScoringEdge ? { filter: `drop-shadow(0px 0px 4px ${strokeColor})` } : {}} />;
                })}
              </svg>
              {gameState.board.map((cell, idx) => {
                const node = currentBoardConfig.nodes[idx];
                return (
                  <div key={`node-${idx}`} className={`absolute z-10 flex items-center justify-center transition-colors card-item ${cell === null ? 'border-2 border-dashed border-slate-500/50 bg-slate-800/30 hover:bg-slate-700/60 cursor-pointer backdrop-blur-sm shadow-inner rounded-full sm:rounded-2xl' : ''}`} style={{ left: `${node.x}%`, top: `${node.y}%`, transform: 'translate(-50%, -50%)' }} onClick={(e) => { e.stopPropagation(); if (cell === null && gameState.selectedCardIdx !== null && (!gameState.isAnimating)) { const pType = gameState.playersInfo[gameState.turn].type; const canPlay = (gameState.mode === 'online') ? gameState.turn === myPlayerId : pType !== 'ai'; if (canPlay) playCard(gameState.selectedCardIdx, idx, false); } }}>
                    {cell && renderCard(cell.phase, -1, cell.player, true, idx)}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
